function ellipsePos(tier,angleFrac){

  const a=(angleFrac||0)*Math.PI*2;

  return new THREE.Vector3(lx*Math.cos(TILT)-lz*Math.sin(TILT),TIER_Y[tier]||0,lx*Math.sin(TILT)+lz*Math.cos(TILT));

function drawEllipse(rx,rz,op,col,y){
  const pts=[];

  scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),new THREE.LineBasicMaterial({color:col,transparent:true,opacity:op})));
}

function addLabel(text,x,y,z,color,fs){

}

  scene.add(oM);nodeObjects.push({mesh:oM,node:oN});
  const grPts=[];for(let i=0;i<=64;i++){const a=i/64*Math.PI*2;grPts.push(new THREE.Vector3(Math.cos(a)*1.1,0,Math.sin(a)*1.1));}
  scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(grPts),new THREE.LineBasicMaterial({color:0xf0ece2,transparent:true,opacity:0.14})));
  // spokes
  NODES.filter(n=>n.id!=='origin').forEach(n=>{
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0),n._pos.clone()]),new THREE.LineBasicMaterial({color:tcol(n.type),transparent:true,opacity:0.05})));
  });
  // nodes
  NODES.filter(n=>n.id!=='origin').forEach(n=>{
    const pos=n._pos,cfg=tcfg(n.type);
    const da=0.018,a1=((n.angle||0)-da)*Math.PI*2,a2=((n.angle||0)+da)*Math.PI*2;
    const e=ELLIPSES[n.tier]||ELLIPSES.mid;
    function eP(a){const lx=e.rx*Math.cos(a),lz=e.rz*Math.sin(a);return new THREE.Vector3(lx*Math.cos(TILT)-lz*Math.sin(TILT),pos.y,lx*Math.sin(TILT)+lz*Math.cos(TILT));}
    const tang=eP(a2).sub(eP(a1)).normalize(),tL=0.36;
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([pos.clone().addScaledVector(tang,-tL),pos.clone().addScaledVector(tang,tL)]),new THREE.LineBasicMaterial({color:cfg.color,transparent:true,opacity:0.55})));
    [-0.55,0.55].forEach(off=>{const m=pos.clone().addScaledVector(tang,off*0.18);scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([m.clone().addScaledVector(tang,-tL*0.38),m.clone().addScaledVector(tang,tL*0.38)]),new THREE.LineBasicMaterial({color:cfg.color,transparent:true,opacity:0.18})));});
    const mesh=new THREE.Mesh(new THREE.SphereGeometry(cfg.size,12,12),new THREE.MeshBasicMaterial({color:cfg.color,transparent:true,opacity:0.82}));
    mesh.position.copy(pos);mesh.userData={node:n,origColor:cfg.color,origOpacity:0.82};

  const mX=ELLIPSES.mid.rx*Math.cos(TILT),  mZ=ELLIPSES.mid.rx*Math.sin(TILT);
  const oX=ELLIPSES.outer.rx*Math.cos(TILT),oZ=ELLIPSES.outer.rx*Math.sin(TILT);
  addLabel('Case Studies',iX+0.4,0.1,iZ,'rgba(176,122,204,0.32)',6);
  addLabel('Career',      mX+0.4,0.1,mZ,'rgba(200,112,74,0.32)', 6);

}

// MOON SYSTEM
// ═══════════════════════════════════════════
let activeMoons=[];   // { mesh, connLine, labelSpr, moonData, parentNode, orbitAngle, orbitRadius, orbitSpeed }
let moonMeshList=[];  // flat list for raycaster
let hoveredMoon=null;
let moonBirth=0;
const MOON_R=0.058, MOON_ORBIT=2.0, MOON_FADEDUR=0.65;

function spawnMoons(node){
  const moons=MOON_DATA[node.id];
  if(!moons||!moons.length) return;
  moonBirth=performance.now()/1000;
  const col=tcol(node.type);
  moons.forEach((md,i)=>{
    const startAngle=(i/moons.length)*Math.PI*2 + 0.4;
    const speed=0.22+i*0.07;
    // sphere
    const mesh=new THREE.Mesh(
      new THREE.SphereGeometry(MOON_R,8,8),
      new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0,depthWrite:false})
    );
    mesh.userData={isMoon:true,moonData:md,parentNode:node,origColor:col,origOpacity:0.7};
    scene.add(mesh);
    // connector
    const cGeo=new THREE.BufferGeometry().setFromPoints([node._pos.clone(),node._pos.clone()]);
    const cLine=new THREE.Line(cGeo,new THREE.LineBasicMaterial({color:col,transparent:true,opacity:0,depthWrite:false}));
    scene.add(cLine);
    // label sprite
    const lSpr=makeMoonLabel(md.label,col);
    lSpr.material.opacity=0;
    scene.add(lSpr);

    activeMoons.push({mesh,connLine:cLine,labelSpr:lSpr,moonData:md,parentNode:node,orbitAngle:startAngle,orbitRadius:MOON_ORBIT,orbitSpeed:speed});
    moonMeshList.push(mesh);
  });
}

function makeMoonLabel(text,color){
  const c=document.createElement('canvas');c.width=280;c.height=36;
  const ctx=c.getContext('2d');
  ctx.fillStyle='#'+color.toString(16).padStart(6,'0')+'aa';
  ctx.font='16px "DM Mono",monospace';
  ctx.fillText(text.toUpperCase(),6,24);
  const spr=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c),transparent:true,depthWrite:false}));
  spr.scale.set(2.2,0.28,1);
  return spr;
}

function clearMoons(){
  activeMoons.forEach(m=>{
    scene.remove(m.mesh);scene.remove(m.connLine);scene.remove(m.labelSpr);
    m.mesh.geometry.dispose();m.mesh.material.dispose();
    m.connLine.geometry.dispose();m.connLine.material.dispose();
    m.labelSpr.material.map.dispose();m.labelSpr.material.dispose();
  });
  activeMoons=[];moonMeshList=[];hoveredMoon=null;
  document.getElementById('moon-card').classList.remove('on');
}

function tickMoons(elapsed,dt){
  if(!activeMoons.length) return;
  const age=elapsed-moonBirth;
  const fadeT=Math.min(age/MOON_FADEDUR,1);
  const eased=fadeT*fadeT*(3-2*fadeT);

  activeMoons.forEach(m=>{
    m.orbitAngle+=m.orbitSpeed*dt;
    const pp=m.parentNode._pos;
    // Orbit in XZ plane, slight Y wobble for depth
    const ox=pp.x+Math.cos(m.orbitAngle)*m.orbitRadius;
    const oy=pp.y+Math.sin(m.orbitAngle*0.5)*0.25;
    const oz=pp.z+Math.sin(m.orbitAngle)*m.orbitRadius*0.52;
    m.mesh.position.set(ox,oy,oz);
    m.labelSpr.position.set(ox+0.18,oy+0.15,oz);

    const isHov=hoveredMoon===m;
    const tOp=isHov?1.0:0.70;
    const tSc=isHov?1.9:1.0;
    m.mesh.material.opacity=eased*tOp;
    m.connLine.material.opacity=eased*0.16;
    m.labelSpr.material.opacity=eased*(isHov?0.92:0.52);

    // Smooth scale lerp
    const cs=m.mesh.scale.x;
    m.mesh.scale.setScalar(cs+(tSc-cs)*0.14);

    // Update connector positions
    const pa=m.connLine.geometry.attributes.position.array;
    pa[0]=pp.x;pa[1]=pp.y;pa[2]=pp.z;
    pa[3]=ox;  pa[4]=oy;  pa[5]=oz;
    m.connLine.geometry.attributes.position.needsUpdate=true;
  });
}

  document.getElementById('gc-era').textContent=node.era||'';
  document.getElementById('gc-title').textContent=node.title||'';
  document.getElementById('gc-role').textContent=node.role||'';
  document.getElementById('gc-body').textContent=node.body||'';
  document.getElementById('gc-tier').textContent=tier;
  document.getElementById('gc-type-v').textContent=lbl;
  const gcTag=document.getElementById('gc-tag');gcTag.textContent=lbl;gcTag.style.color=col;
  document.querySelector('.gc').style.borderColor=`rgba(${hexToRgb(col)},0.18)`;
  positionGhost(node);
  document.getElementById('ghost').classList.add('on');
  document.getElementById('ms-bar').style.background=col;
  document.getElementById('ms-era').textContent=node.era||'';
  document.getElementById('ms-title').textContent=node.title||'';
  document.getElementById('ms-role').textContent=node.role||'';
  document.getElementById('ms-body').textContent=node.body||'';
  const msTag=document.getElementById('ms-tag');msTag.textContent=lbl;msTag.style.color=col;
  document.getElementById('msheet').classList.add('on');
}

function hexToRgb(h){return `${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)}`;}

function positionGhost(node){
  const ghost=document.getElementById('ghost');
  const vp=node._pos.clone().project(cam);
  const sx=(vp.x*0.5+0.5)*innerWidth,sy=(-vp.y*0.5+0.5)*innerHeight;
  const cw=310,mg=20;
  let left=sx+28;if(left+cw+mg>innerWidth) left=sx-cw-28;
  left=Math.max(mg,Math.min(innerWidth-cw-mg,left));
  let top=sy-60;top=Math.max(mg+60,Math.min(innerHeight-420,top));
  ghost.style.left=left+'px';ghost.style.top=top+'px';
}

window.closePanel=function(){exitFocus();};

// ═══════════════════════════════════════════
// INTERACTION
// ═══════════════════════════════════════════
const tooltip=document.getElementById('tooltip');
let hoveredMesh=null,mouse=new THREE.Vector2(),drag=false;
let pointerStart={x:0,y:0},lastMouse={x:0,y:0},lastXY={x:0,y:0};
let autoRotate=false,autoTimer=null,hintFaded=false;

function posTooltip(cx,cy){tooltip.style.transform=`translate(${cx+18}px,${cy-10}px)`;}

function checkHover(){
  raycaster.setFromCamera(mouse,cam);

  // moons first
  if(moonMeshList.length){
    const mHits=raycaster.intersectObjects(moonMeshList);
    if(mHits.length){
      const hitMesh=mHits[0].object;
      const mo=activeMoons.find(m=>m.mesh===hitMesh);
      if(mo&&mo!==hoveredMoon){
        hoveredMoon=mo;
        showMoonCard(mo.moonData,mo.parentNode,lastXY.x,lastXY.y);
      }
      // clear main hover
      if(hoveredMesh){hoveredMesh.material.color.setHex(hoveredMesh.userData.origColor);hoveredMesh.material.opacity=hoveredMesh.userData.origOpacity;hoveredMesh.scale.setScalar(1);hoveredMesh=null;}
      tooltip.classList.remove('vis');
      canvas.style.cursor='pointer';
      return;
    }
  }
  // no moon hit
  if(hoveredMoon){hoveredMoon=null;document.getElementById('moon-card').classList.remove('on');}

  // main nodes
  const hits=raycaster.intersectObjects(nodeObjects.map(o=>o.mesh));
  if(hits.length){
    const obj=nodeObjects.find(o=>o.mesh===hits[0].object);
    if(obj&&obj.mesh!==hoveredMesh){
      if(hoveredMesh){hoveredMesh.material.color.setHex(hoveredMesh.userData.origColor);hoveredMesh.material.opacity=hoveredMesh.userData.origOpacity;hoveredMesh.scale.setScalar(1);}
      hoveredMesh=obj.mesh;
      hoveredMesh.material.color.setHex(0xffffff);hoveredMesh.material.opacity=1;hoveredMesh.scale.setScalar(2.6);
      const n=obj.node;
      document.getElementById('tt-era').textContent=n.era||'';
      document.getElementById('tt-title').textContent=n.title;
      document.getElementById('tt-type').style.color=thex(n.type);
      document.getElementById('tt-type').textContent=tcfg(n.type).label;
      tooltip.classList.add('vis');canvas.style.cursor='pointer';
    }
  } else {
    if(hoveredMesh){hoveredMesh.material.color.setHex(hoveredMesh.userData.origColor);hoveredMesh.material.opacity=hoveredMesh.userData.origOpacity;hoveredMesh.scale.setScalar(1);hoveredMesh=null;}
    tooltip.classList.remove('vis');canvas.style.cursor='default';
  }
}

canvas.addEventListener('pointerdown',e=>{
  drag=true;pointerStart={x:e.clientX,y:e.clientY};lastMouse={x:e.clientX,y:e.clientY};
  if(!hintFaded){document.getElementById('hint').style.opacity='0';hintFaded=true;}
});
window.addEventListener('pointerup',e=>{
  const dx=Math.abs(e.clientX-pointerStart.x),dy=Math.abs(e.clientY-pointerStart.y);
  if(drag&&dx<5&&dy<5){
    if(hoveredMoon){
      // tap on moon — card already shown on hover, no-op
    } else if(hoveredMesh){
      const node=hoveredMesh.userData.node;
      if(isFocused&&focusNode===node){exitFocus();}else{enterFocus(node);}
    } else if(isFocused){exitFocus();}
  }
  drag=false;
  if(!isFocused){clearTimeout(autoTimer);autoTimer=setTimeout(()=>{autoRotate=true;},9000);}
});
window.addEventListener('pointermove',e=>{
  mouse.set((e.clientX/innerWidth)*2-1,-(e.clientY/innerHeight)*2+1);
  lastXY={x:e.clientX,y:e.clientY};
  posTooltip(e.clientX,e.clientY);
  if(!drag||isFocused) return;
  const dx=e.clientX-lastMouse.x,dy=e.clientY-lastMouse.y;
  lastMouse={x:e.clientX,y:e.clientY};
  autoRotate=false;clearTimeout(autoTimer);
  camTarget.theta-=dx*0.006;
  camTarget.phi=Math.max(0.01,Math.min(Math.PI*0.48,camTarget.phi+dy*0.005));
});
canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  camTarget.radius=Math.max(5,Math.min(150,camTarget.radius+e.deltaY*0.06));
  if(!isFocused){autoRotate=false;clearTimeout(autoTimer);autoTimer=setTimeout(()=>{autoRotate=true;},5000);}
},{passive:false});
let lastPinch=null;
canvas.addEventListener('touchstart',e=>{if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;lastPinch=Math.sqrt(dx*dx+dy*dy);}},{passive:true});
canvas.addEventListener('touchmove',e=>{if(e.touches.length===2&&lastPinch){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY,d=Math.sqrt(dx*dx+dy*dy);camTarget.radius=Math.max(5,Math.min(150,camTarget.radius*(lastPinch/d)));lastPinch=d;}},{passive:true});
document.querySelectorAll('.hud-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const v=btn.dataset.view;if(!VIEWS[v]) return;
    if(isFocused) exitFocus();
    camTarget={...VIEWS[v]};
    document.querySelectorAll('.hud-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    autoRotate=false;clearTimeout(autoTimer);autoTimer=setTimeout(()=>{autoRotate=true;},9000);
  });
});

// ═══════════════════════════════════════════
// RENDER LOOP
// ═══════════════════════════════════════════
const LERP=0.065,PIVL=0.055;
let lt=0;
const pA=pGeo.getAttribute('position');

function tick(t){
  requestAnimationFrame(tick);
  const dt=Math.min((t-lt)/1000,0.05);lt=t;
  const el=t*0.001;

  // particles
  for(let i=0;i<PC;i++){
    const ox=pOrig[i*3],oy=pOrig[i*3+1],oz=pOrig[i*3+2],ph=pPh[i],sp=pSp[i];
    pA.array[i*3]  =ox+Math.sin(el*sp*0.31+ph)*0.55;
    pA.array[i*3+1]=oy+Math.sin(el*sp*0.19+ph*1.3)*0.28;
    pA.array[i*3+2]=oz+Math.cos(el*sp*0.27+ph*0.7)*0.55;
  }
  pA.needsUpdate=true;
  pMat.opacity=0.14+Math.sin(el*0.11)*0.04;

  // moons
  tickMoons(el,dt);

  // update moon card position as camera orbits
  if(hoveredMoon&&isFocused){
    showMoonCard(hoveredMoon.moonData,hoveredMoon.parentNode,lastXY.x,lastXY.y);
  }

  if(isFocused){
    focusOrbit+=dt*0.30;camTarget.theta=focusOrbit;
    if(focusNode) positionGhost(focusNode);
  } else if(autoRotate){camTarget.theta+=dt*0.032;}

  camState.phi   +=(camTarget.phi   -camState.phi)  *LERP;
  camState.theta +=(camTarget.theta -camState.theta) *LERP;
  camState.radius+=(camTarget.radius-camState.radius)*LERP;
  scenePivot.lerp(scenePivotTgt,PIVL);

  applyCam();checkHover();
  renderer.render(scene,cam);
}
requestAnimationFrame(tick);

window.addEventListener('resize',()=>{
  cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,2));
});
</script>
