<head>

<title>Zack Gort · Spatial Resume</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#030308;}
#bg-mesh{position:fixed;inset:0;z-index:0;pointer-events:none;}
canvas{display:block;width:100vw;height:100vh;position:relative;z-index:1;}
#brand{position:fixed;top:24px;left:28px;z-index:100;pointer-events:none;font-family:'DM Mono',monospace;}
#brand-name{font-size:10px;letter-spacing:0.26em;text-transform:uppercase;color:rgba(240,236,226,0.65);}
#brand-sub{font-size:7.5px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(240,236,226,0.24);margin-top:5px;}
#hud{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);display:flex;gap:1px;background:rgba(240,236,226,0.03);border:1px solid rgba(240,236,226,0.08);border-radius:4px;overflow:hidden;z-index:100;}
.hud-btn{background:none;border:none;cursor:pointer;color:rgba(240,236,226,0.3);font-family:'DM Mono',monospace;font-size:8px;letter-spacing:0.18em;text-transform:uppercase;padding:9px 18px;border-right:1px solid rgba(240,236,226,0.06);transition:color 0.2s,background 0.2s;}
.hud-btn:last-child{border-right:none;}
.hud-btn:hover{color:rgba(240,236,226,0.7);background:rgba(240,236,226,0.04);}
.hud-btn.active{color:#f0ece2;background:rgba(240,236,226,0.07);}
#hint{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.16em;text-transform:uppercase;color:rgba(240,236,226,0.12);z-index:100;pointer-events:none;white-space:nowrap;transition:opacity 1.2s;}
#focus-hint{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.22em;text-transform:uppercase;color:rgba(240,236,226,0.22);z-index:100;pointer-events:none;white-space:nowrap;opacity:0;transition:opacity 0.5s;}
#focus-hint.vis{opacity:1;}
#tooltip{position:fixed;top:0;left:0;pointer-events:none;opacity:0;transition:opacity 0.15s;z-index:200;}
#tooltip.vis{opacity:1;}
#tt-inner{background:rgba(8,7,6,0.96);border:1px solid rgba(240,236,226,0.12);border-radius:4px;padding:12px 16px;backdrop-filter:blur(12px);max-width:240px;}
.tt-era{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(240,236,226,0.3);margin-bottom:5px;}
.tt-title{font-family:'DM Serif Display',serif;font-size:15px;color:#f0ece2;line-height:1.2;margin-bottom:5px;letter-spacing:-0.01em;}
.tt-type{font-family:'DM Mono',monospace;font-size:6.5px;letter-spacing:0.14em;text-transform:uppercase;}
/* THEME TOGGLE */
#theme-toggle{position:fixed;top:24px;left:50%;transform:translateX(-50%);z-index:100;background:none;border:1px solid rgba(240,236,226,0.12);color:rgba(240,236,226,0.25);font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.20em;text-transform:uppercase;padding:6px 14px;border-radius:2px;cursor:pointer;transition:all 0.2s;}
#theme-toggle:hover{color:rgba(240,236,226,0.6);border-color:rgba(240,236,226,0.35);}

/* ─── LIGHT THEME — INK ON PAPER ─── */
body.light{background:#f2ede6;}
body.light #bg-mesh{filter:none;}

/* Override: light theme bg is handled by JS drawMesh() in light mode */
body.light #brand-name{color:rgba(10,6,2,0.82);}
body.light #brand-sub{color:rgba(10,6,2,0.38);}
body.light #hint{color:rgba(10,6,2,0.22);}
body.light #focus-hint{color:rgba(10,6,2,0.32);}

/* HUD — ink bar */
body.light #hud{background:rgba(10,6,2,0.04);border-color:rgba(10,6,2,0.18);}
body.light .hud-btn{color:rgba(10,6,2,0.35);border-right-color:rgba(10,6,2,0.10);}
body.light .hud-btn:hover{color:rgba(10,6,2,0.80);background:rgba(10,6,2,0.06);}
body.light .hud-btn.active{color:#0a0602;background:rgba(10,6,2,0.10);}

/* Tooltip */
body.light #tt-inner{background:rgba(242,237,230,0.98);border:1px solid rgba(10,6,2,0.22);box-shadow:2px 3px 0 rgba(10,6,2,0.10);}
body.light .tt-era{color:rgba(10,6,2,0.40);}
body.light .tt-title{color:#0a0602;}
body.light .tt-type{color:#0a0602;}

/* Ghost card */
body.light .gc{background:rgba(242,237,230,0.99);border:1px solid rgba(10,6,2,0.20);box-shadow:3px 4px 0 rgba(10,6,2,0.12),0 0 0 1px rgba(10,6,2,0.06);}
body.light .gcera{color:rgba(10,6,2,0.38);}
body.light .gctitle{color:#0a0602;}
body.light .gcrole{color:rgba(10,6,2,0.44);}
body.light .gcbody{color:rgba(10,6,2,0.62);border-bottom-color:rgba(10,6,2,0.10);}
body.light .gchead{border-bottom-color:rgba(10,6,2,0.10);}
body.light .gcstat{border-bottom-color:rgba(10,6,2,0.10);}
body.light .gcst{border-right-color:rgba(10,6,2,0.10);}
body.light .gcsv{color:rgba(10,6,2,0.85);}
body.light .gcsk{color:rgba(10,6,2,0.32);}
body.light .gcclose{border-color:rgba(10,6,2,0.22);color:rgba(10,6,2,0.38);}
body.light .gcclose:hover{color:#0a0602;border-color:rgba(10,6,2,0.70);}
body.light .gc-img-wrap{background:#e2dbd2;}
body.light .gc-img-wrap img.gc-img-vis{opacity:0.60;mix-blend-mode:multiply;}

/* Moon card */
body.light .mc{background:rgba(242,237,230,0.99);border:1px solid rgba(10,6,2,0.18);box-shadow:2px 3px 0 rgba(10,6,2,0.09);}
body.light .mclabel{color:rgba(10,6,2,0.38);}
body.light .mctitle{color:#0a0602;}
body.light .mcbody{color:rgba(10,6,2,0.54);}

/* Mobile sheet */
body.light #msheet{background:rgba(242,237,230,0.99);border-top-color:rgba(10,6,2,0.14);}
body.light .msera{color:rgba(10,6,2,0.38);}
body.light .mstitle{color:#0a0602;}
body.light .msrole{color:rgba(10,6,2,0.44);}
body.light .msbody{color:rgba(10,6,2,0.58);border-bottom-color:rgba(10,6,2,0.10);}
body.light .mshandle{background:rgba(10,6,2,0.18);}
body.light .msclose{border-color:rgba(10,6,2,0.22);color:rgba(10,6,2,0.38);}
body.light .msclose:hover{color:#0a0602;border-color:rgba(10,6,2,0.70);}

/* Contact */
body.light .cl{color:rgba(10,6,2,0.32);}
body.light .cl a:hover{color:rgba(10,6,2,0.75);}

/* Theme toggle */
body.light #theme-toggle{border-color:rgba(10,6,2,0.20);color:rgba(10,6,2,0.38);}
body.light #theme-toggle:hover{color:rgba(10,6,2,0.78);border-color:rgba(10,6,2,0.55);}

/* GHOST CARD — fixed right rail */
#ghost{position:fixed;z-index:700;width:310px;pointer-events:none;opacity:0;right:24px;top:50%;transform:translateY(-50%) translateX(18px) scale(0.97);transition:opacity 0.30s,transform 0.30s;}
#ghost.on{opacity:1;transform:translateY(-50%) translateX(0) scale(1);pointer-events:all;}
.gc{background:rgba(9,9,13,0.97);border:1px solid rgba(240,236,226,0.10);border-radius:6px;box-shadow:0 18px 62px rgba(0,0,0,0.9),0 0 0 1px rgba(240,236,226,0.03);backdrop-filter:blur(26px);overflow:hidden;}
.gcscroll{max-height:82vh;overflow-y:auto;scrollbar-width:none;}
.gcscroll::-webkit-scrollbar{display:none;}
.gcbar{height:2px;width:100%;transition:background 0.4s;}
.gc-img-wrap{position:relative;width:100%;height:148px;overflow:hidden;background:#0a0a0f;}
.gc-img-wrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;opacity:0;transition:opacity 1.0s ease,transform 8s ease;transform:scale(1.06);}
.gc-img-wrap img.gc-img-vis{opacity:0.55;transform:scale(1.0);}
.gc-img-scrim{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0.1) 0%,rgba(9,9,13,0.85) 100%);pointer-events:none;z-index:1;}
.gc-img-wrap.empty{height:0;}
.gchead{padding:13px 14px 10px;border-bottom:1px solid rgba(240,236,226,0.06);}
.gcera{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.22em;text-transform:uppercase;color:rgba(240,236,226,0.28);margin-bottom:6px;}
.gctitle{font-family:'DM Serif Display',serif;font-size:16px;letter-spacing:-0.02em;color:#f0ece2;line-height:1.15;margin-bottom:4px;}
.gcrole{font-family:'DM Mono',monospace;font-size:7.5px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(240,236,226,0.3);}
.gcbody{padding:11px 14px 12px;font-family:'DM Mono',monospace;font-size:11px;line-height:1.82;color:rgba(240,236,226,0.52);border-bottom:1px solid rgba(240,236,226,0.06);}
.gcstat{display:flex;border-bottom:1px solid rgba(240,236,226,0.06);}
.gcst{flex:1;padding:9px 10px;border-right:1px solid rgba(240,236,226,0.06);text-align:center;}
.gcst:last-child{border-right:none;}
.gcsv{font-family:'DM Serif Display',serif;font-size:15px;color:rgba(240,236,226,0.7);display:block;letter-spacing:-0.01em;}
.gcsk{font-family:'DM Mono',monospace;font-size:7.5px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(240,236,226,0.22);display:block;margin-top:2px;}
.gcft{display:flex;align-items:center;justify-content:space-between;padding:9px 14px 11px;}
.gctag{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.16em;text-transform:uppercase;padding:3px 9px;border-radius:9px;border:1px solid currentColor;opacity:0.55;}
.gcclose{background:none;border:1px solid rgba(240,236,226,0.14);color:rgba(240,236,226,0.3);width:22px;height:22px;border-radius:2px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;transition:all 0.2s;pointer-events:all;}
.gcclose:hover{color:#f0ece2;border-color:rgba(240,236,226,0.45);}

/* MOON DETAIL CARD */
#moon-card{position:fixed;z-index:800;width:256px;pointer-events:none;opacity:0;transform:translateY(6px) scale(0.97);transition:opacity 0.18s,transform 0.18s;}
#moon-card.on{opacity:1;transform:none;}
.mc{background:rgba(6,6,10,0.98);border:1px solid rgba(240,236,226,0.08);border-radius:5px;box-shadow:0 10px 40px rgba(0,0,0,0.92);backdrop-filter:blur(22px);overflow:hidden;}
.mcbar{height:1.5px;width:100%;}
.mchead{padding:11px 13px 8px;}
.mclabel{font-family:'DM Mono',monospace;font-size:6.5px;letter-spacing:0.22em;text-transform:uppercase;color:rgba(240,236,226,0.24);margin-bottom:5px;}
.mctitle{font-family:'DM Serif Display',serif;font-size:13.5px;color:#f0ece2;line-height:1.2;}
.mcbody{padding:7px 13px 13px;font-family:'DM Mono',monospace;font-size:10.5px;line-height:1.76;color:rgba(240,236,226,0.44);}

/* MOBILE BOTTOM SHEET */
#msheet{display:none;position:fixed;bottom:0;left:0;right:0;z-index:700;background:rgba(9,9,13,0.98);border-top:1px solid rgba(240,236,226,0.08);border-radius:14px 14px 0 0;max-height:72vh;overflow-y:auto;scrollbar-width:none;transform:translateY(100%);transition:transform 0.38s cubic-bezier(0.22,1,0.36,1);backdrop-filter:blur(28px);}
#msheet::-webkit-scrollbar{display:none;}
#msheet.on{transform:translateY(0);}
.mshandle{width:36px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;margin:12px auto 6px;}
.msbar{height:2px;width:100%;transition:background 0.4s;}
.mshead{padding:16px 20px 12px;border-bottom:1px solid rgba(240,236,226,0.06);}
.msera{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.22em;text-transform:uppercase;color:rgba(240,236,226,0.28);margin-bottom:6px;}
.mstitle{font-family:'DM Serif Display',serif;font-size:20px;letter-spacing:-0.02em;color:#f0ece2;line-height:1.15;margin-bottom:4px;}
.msrole{font-family:'DM Mono',monospace;font-size:7.5px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(240,236,226,0.3);}
.msbody{padding:13px 20px 14px;font-family:'DM Mono',monospace;font-size:11.5px;line-height:1.82;color:rgba(240,236,226,0.52);border-bottom:1px solid rgba(240,236,226,0.06);}
.msft{display:flex;align-items:center;justify-content:space-between;padding:10px 20px 14px;}
.mstag{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.16em;text-transform:uppercase;padding:3px 9px;border-radius:9px;border:1px solid currentColor;opacity:0.55;}
.msclose{background:none;border:1px solid rgba(240,236,226,0.14);color:rgba(240,236,226,0.3);width:22px;height:22px;border-radius:2px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;transition:all 0.2s;}
.msclose:hover{color:#f0ece2;border-color:rgba(240,236,226,0.45);}
@media(max-width:768px){#ghost{display:none;}#moon-card{display:none;}#msheet{display:block;}}
#contact{position:fixed;top:24px;right:28px;z-index:100;display:flex;flex-direction:column;align-items:flex-end;gap:5px;font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.14em;text-transform:uppercase;}
.cl{color:rgba(240,236,226,0.18);}
.cl a{color:inherit;text-decoration:none;pointer-events:all;transition:color 0.2s;}
.cl a:hover{color:rgba(240,236,226,0.55);}
@media(max-width:600px){#contact{display:none;}}
</style>
</head>

<canvas id="bg-mesh"></canvas>
<canvas id="canvas"></canvas>

function drawEllipse(rx,rz,op,col,y){
  const pts=[];
  for(let i=0;i<=128;i++){const a=i/128*Math.PI*2,lx=rx*Math.cos(a),lz=rz*Math.sin(a);pts.push(new THREE.Vector3(lx*Math.cos(TILT)-lz*Math.sin(TILT),y||-0.1,lx*Math.sin(TILT)+lz*Math.cos(TILT)));}
  const mat=new THREE.LineBasicMaterial({color:col,transparent:true,opacity:op});
  const line=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),mat);

  allLines.push({line,darkColor:col,lightColor:0x0a0602,darkOp:op,lightOp:op*3.5});

const allLabels=[];

function drawLabelCanvas(text,color,fs){
  const c=document.createElement('canvas');c.width=512;c.height=64;
  const ctx=c.getContext('2d');
  ctx.fillStyle=color;
  ctx.font=`${fs*2.4}px "DM Mono",monospace`;
  ctx.fillText(text.toUpperCase(),10,42);
  return c;
}

function addLabel(text,x,y,z,darkColor,fs,lightColor){
  const lc=lightColor||'rgba(10,6,2,0.92)';
  const c=drawLabelCanvas(text,darkColor,fs);
  const spr=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c),transparent:true}));
  spr.position.set(x,y,z);spr.scale.set(9,1.15,1);scene.add(spr);
  allLabels.push({spr,text,darkColor,lightColor:lc,fs});
  return spr;
}

function redrawLabels(){
  allLabels.forEach(({spr,text,darkColor,lightColor,fs})=>{
    const color=isLight?lightColor:darkColor;
    const c=drawLabelCanvas(text,color,fs);
    spr.material.map.dispose();
    spr.material.map=new THREE.CanvasTexture(c);
    spr.material.needsUpdate=true;
  });
}

  const grad=ctx.createRadialGradient(cx,cy,0,cx,cy,sz/2);
  const r=(color>>16)&255,g=(color>>8)&255,b=color&255;
  grad.addColorStop(0,  `rgba(${r},${g},${b},0.55)`);
  grad.addColorStop(0.3,`rgba(${r},${g},${b},0.18)`);
  grad.addColorStop(0.7,`rgba(${r},${g},${b},0.04)`);
  grad.addColorStop(1,  `rgba(${r},${g},${b},0)`);
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,sz,sz);
  const spr=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c),transparent:true,depthWrite:false,blending:THREE.AdditiveBlending}));
  spr.scale.set(radius*6,radius*6,1);
  return spr;
}

// Track glow sprites for light-mode hiding
const glowSprites=[];

function buildScene(){
  drawEllipse(ELLIPSES.inner.rx,ELLIPSES.inner.rz,0.20,0xb07acc,0.04);
  drawEllipse(ELLIPSES.mid.rx,  ELLIPSES.mid.rz,  0.24,0xc8704a,0.18);
  drawEllipse(ELLIPSES.outer.rx,ELLIPSES.outer.rz,0.17,0xd4a84a,0.45);
  const gM=new THREE.LineBasicMaterial({color:0xf0ece2,transparent:true,opacity:0.013});
  for(let i=-7;i<=7;i++){
    const l1=new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(i*4,-0.5,-36),new THREE.Vector3(i*4,-0.5,36)]),gM.clone());
    const l2=new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-36,-0.5,i*4),new THREE.Vector3(36,-0.5,i*4)]),gM.clone());
    scene.add(l1);scene.add(l2);
    allLines.push({line:l1,darkColor:0xf0ece2,lightColor:0x0a0602,darkOp:0.013,lightOp:0.055});
    allLines.push({line:l2,darkColor:0xf0ece2,lightColor:0x0a0602,darkOp:0.013,lightOp:0.055});
  }
  // origin
  const oN=NODES.find(n=>n.id==='origin');
  const oM=new THREE.Mesh(new THREE.SphereGeometry(0.32,20,20),new THREE.MeshPhysicalMaterial({
    color:0xf0ece2,emissive:0xf0ece2,emissiveIntensity:2.2,
    metalness:0.0,roughness:0.04,clearcoat:1.0,clearcoatRoughness:0.0
  }));
  oM.position.copy(oN._pos);oM.userData={node:oN,origColor:0xf0ece2,origOpacity:1,lightOrigColor:0x0a0602};
  scene.add(oM);nodeObjects.push({mesh:oM,node:oN});
  // origin halos
  [3.2,2.0,1.1].forEach((scale,i)=>{
    const gs=makeGlowSprite(0xf0ece2,0.32);
    gs.scale.setScalar(scale);gs.position.copy(oN._pos);
    gs.material.opacity=[0.22,0.38,0.55][i];
    scene.add(gs);glowSprites.push(gs);
  });
  const grPts=[];for(let i=0;i<=64;i++){const a=i/64*Math.PI*2;grPts.push(new THREE.Vector3(Math.cos(a)*1.1,0,Math.sin(a)*1.1));}
  const grLine=new THREE.Line(new THREE.BufferGeometry().setFromPoints(grPts),new THREE.LineBasicMaterial({color:0xf0ece2,transparent:true,opacity:0.14}));
  scene.add(grLine);
  allLines.push({line:grLine,darkColor:0xf0ece2,lightColor:0x0a0602,darkOp:0.14,lightOp:0.65});

  // spokes
  NODES.filter(n=>n.id!=='origin').forEach(n=>{
    const spokeM=new THREE.LineBasicMaterial({color:tcfg(n.type).color,transparent:true,opacity:0.05});
    const spoke=new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0),n._pos.clone()]),spokeM);
    scene.add(spoke);
    allLines.push({line:spoke,darkColor:tcfg(n.type).color,lightColor:0x0a0602,darkOp:0.05,lightOp:0.18});
  });

  // nodes + glow
  NODES.filter(n=>n.id!=='origin').forEach(n=>{
    const pos=n._pos,cfg=tcfg(n.type);
    const da=0.018,a1=((n.angle||0)-da)*Math.PI*2,a2=((n.angle||0)+da)*Math.PI*2;
    const e=ELLIPSES[n.tier]||ELLIPSES.mid;
    function eP(a){const lx=e.rx*Math.cos(a),lz=e.rz*Math.sin(a);return new THREE.Vector3(lx*Math.cos(TILT)-lz*Math.sin(TILT),pos.y,lx*Math.sin(TILT)+lz*Math.cos(TILT));}
    const tang=eP(a2).sub(eP(a1)).normalize(),tL=0.36;
    const tM=new THREE.LineBasicMaterial({color:cfg.color,transparent:true,opacity:0.55});
    const tLine=new THREE.Line(new THREE.BufferGeometry().setFromPoints([pos.clone().addScaledVector(tang,-tL),pos.clone().addScaledVector(tang,tL)]),tM);
    scene.add(tLine);
    allLines.push({line:tLine,darkColor:cfg.color,lightColor:0x0a0602,darkOp:0.55,lightOp:0.90});

    [-0.55,0.55].forEach(off=>{
      const m=pos.clone().addScaledVector(tang,off*0.18);
      const sM=new THREE.LineBasicMaterial({color:cfg.color,transparent:true,opacity:0.18});
      const sLine=new THREE.Line(new THREE.BufferGeometry().setFromPoints([m.clone().addScaledVector(tang,-tL*0.38),m.clone().addScaledVector(tang,tL*0.38)]),sM);
      scene.add(sLine);
      allLines.push({line:sLine,darkColor:cfg.color,lightColor:0x0a0602,darkOp:0.18,lightOp:0.55});
    });

    const mesh=new THREE.Mesh(new THREE.SphereGeometry(cfg.size,16,16),new THREE.MeshPhysicalMaterial({
      color:cfg.color,
      emissive:cfg.color,
      emissiveIntensity:1.4,
      metalness:0.2,
      roughness:0.08,
      clearcoat:1.0,
      clearcoatRoughness:0.05,
      transparent:true,
      opacity:0.95
    }));
    mesh.position.copy(pos);
    mesh.userData={node:n,origColor:cfg.color,origOpacity:0.95,origEI:1.4,lightOrigColor:cfg.lightColor};
    scene.add(mesh);nodeObjects.push({mesh,node:n});

    // glow sprites (hidden in light mode)
    const gs=makeGlowSprite(cfg.color,cfg.size);
    gs.position.copy(pos);gs.material.opacity=0.72;
    scene.add(gs);glowSprites.push(gs);
    const gs2=makeGlowSprite(cfg.color,cfg.size);
    gs2.scale.setScalar(cfg.size*14);gs2.position.copy(pos);gs2.material.opacity=0.18;
    scene.add(gs2);glowSprites.push(gs2);

    addLabel(n.title.length>26?n.title.slice(0,24)+'…':n.title,pos.x+0.55,pos.y+0.5,pos.z,thex(n.type)+'cc',7.5);
  });

  const iX=ELLIPSES.inner.rx*Math.cos(TILT),iZ=ELLIPSES.inner.rx*Math.sin(TILT);
  const mX=ELLIPSES.mid.rx*Math.cos(TILT),  mZ=ELLIPSES.mid.rx*Math.sin(TILT);
  const oX=ELLIPSES.outer.rx*Math.cos(TILT),oZ=ELLIPSES.outer.rx*Math.sin(TILT);
  addLabel('Case Studies',iX+0.4,0.1,iZ,'rgba(176,122,204,0.38)',7);
  addLabel('Career',      mX+0.4,0.1,mZ,'rgba(200,112,74,0.38)', 7);
  addLabel('Independent', oX+0.4,0.1,oZ,'rgba(212,168,74,0.38)', 7);
}
buildScene();

let activeMoons=[];
let moonMeshList=[];
let hoveredMoon=null;
let moonBirth=0;
const MOON_R=0.058, MOON_ORBIT=2.0, MOON_FADEDUR=0.65;

function spawnMoons(node){
  const moons=MOON_DATA[node.id];
  if(!moons||!moons.length) return;
  moonBirth=performance.now()/1000;
  const col=tcol(node.type);
  moons.forEach((md,i)=>{
    const startAngle=(i/moons.length)*Math.PI*2 + 0.4;
    const speed=0.22+i*0.07;
    const mesh=new THREE.Mesh(
      new THREE.SphereGeometry(MOON_R,8,8),
      new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0,depthWrite:false})
    );
    mesh.userData={isMoon:true,moonData:md,parentNode:node,origColor:col,origOpacity:0.7};
    scene.add(mesh);
    const cGeo=new THREE.BufferGeometry().setFromPoints([node._pos.clone(),node._pos.clone()]);
    const cLine=new THREE.Line(cGeo,new THREE.LineBasicMaterial({color:col,transparent:true,opacity:0,depthWrite:false}));
    scene.add(cLine);
    const lSpr=makeMoonLabel(md.label,col);
    lSpr.material.opacity=0;
    scene.add(lSpr);
    activeMoons.push({mesh,connLine:cLine,labelSpr:lSpr,moonData:md,parentNode:node,orbitAngle:startAngle,orbitRadius:MOON_ORBIT,orbitSpeed:speed});
    moonMeshList.push(mesh);
  });
}

function makeMoonLabel(text,color){
  const c=document.createElement('canvas');c.width=280;c.height=36;
  const ctx=c.getContext('2d');
  ctx.fillStyle='#'+color.toString(16).padStart(6,'0')+'aa';
  ctx.font='16px "DM Mono",monospace';
  ctx.fillText(text.toUpperCase(),6,24);
  const spr=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c),transparent:true,depthWrite:false}));
  spr.scale.set(2.2,0.28,1);
  return spr;
}

function clearMoons(){
  activeMoons.forEach(m=>{
    scene.remove(m.mesh);scene.remove(m.connLine);scene.remove(m.labelSpr);
    m.mesh.geometry.dispose();m.mesh.material.dispose();
    m.connLine.geometry.dispose();m.connLine.material.dispose();
    m.labelSpr.material.map.dispose();m.labelSpr.material.dispose();
  });
  activeMoons=[];moonMeshList=[];hoveredMoon=null;
  document.getElementById('moon-card').classList.remove('on');
}

function tickMoons(elapsed,dt){
  if(!activeMoons.length) return;
  const age=elapsed-moonBirth;
  const fadeT=Math.min(age/MOON_FADEDUR,1);
  const eased=fadeT*fadeT*(3-2*fadeT);
  activeMoons.forEach(m=>{
    if(!orbitPaused) m.orbitAngle+=m.orbitSpeed*dt;
    const pp=m.parentNode._pos;
    const ox=pp.x+Math.cos(m.orbitAngle)*m.orbitRadius;
    const oy=pp.y+Math.sin(m.orbitAngle*0.5)*0.25;
    const oz=pp.z+Math.sin(m.orbitAngle)*m.orbitRadius*0.52;
    m.mesh.position.set(ox,oy,oz);
    m.labelSpr.position.set(ox+0.18,oy+0.15,oz);
    const isHov=hoveredMoon===m;
    const tOp=isHov?1.0:0.70;
    const tSc=isHov?1.9:1.0;
    m.mesh.material.opacity=eased*tOp;
    m.connLine.material.opacity=eased*0.16;
    m.labelSpr.material.opacity=eased*(isHov?0.92:0.52);
    const cs=m.mesh.scale.x;
    m.mesh.scale.setScalar(cs+(tSc-cs)*0.14);
    const pa=m.connLine.geometry.attributes.position.array;
    pa[0]=pp.x;pa[1]=pp.y;pa[2]=pp.z;
    pa[3]=ox;  pa[4]=oy;  pa[5]=oz;
    m.connLine.geometry.attributes.position.needsUpdate=true;
  });
}

// ═══════════════════════════════════════════
const tooltip=document.getElementById('tooltip');
let hoveredMesh=null,mouse=new THREE.Vector2(),drag=false;
let pointerStart={x:0,y:0},lastMouse={x:0,y:0},lastXY={x:0,y:0};
let autoRotate=false,autoTimer=null,hintFaded=false;

function posTooltip(cx,cy){tooltip.style.transform=`translate(${cx+18}px,${cy-10}px)`;}

function checkHover(){
  raycaster.setFromCamera(mouse,cam);
  if(moonMeshList.length){
    const mHits=raycaster.intersectObjects(moonMeshList);
    if(mHits.length){
      const hitMesh=mHits[0].object;
      const mo=activeMoons.find(m=>m.mesh===hitMesh);
      if(mo&&mo!==hoveredMoon){
        hoveredMoon=mo;
        showMoonCard(mo.moonData,mo.parentNode,lastXY.x,lastXY.y);
      }
      if(hoveredMesh){hoveredMesh.material.color.setHex(hoveredMesh.userData.origColor);hoveredMesh.material.emissiveIntensity=hoveredMesh.userData.origEI||1.4;hoveredMesh.material.opacity=hoveredMesh.userData.origOpacity;hoveredMesh.scale.setScalar(1);hoveredMesh=null;}
      tooltip.classList.remove('vis');
      canvas.style.cursor='pointer';
      return;
    }
  }
  if(hoveredMoon){hoveredMoon=null;document.getElementById('moon-card').classList.remove('on');}
  const hits=raycaster.intersectObjects(nodeObjects.map(o=>o.mesh));
  if(hits.length){
    const obj=nodeObjects.find(o=>o.mesh===hits[0].object);
    if(obj&&obj.mesh!==hoveredMesh){
      if(hoveredMesh){hoveredMesh.material.color.setHex(hoveredMesh.userData.origColor);hoveredMesh.material.emissiveIntensity=hoveredMesh.userData.origEI||1.4;hoveredMesh.material.opacity=hoveredMesh.userData.origOpacity;hoveredMesh.scale.setScalar(1);}
      hoveredMesh=obj.mesh;
      hoveredMesh.material.emissiveIntensity=isLight?0:3.5;
      hoveredMesh.material.color.setHex(isLight?0x000000:0xffffff);
      hoveredMesh.material.opacity=1;hoveredMesh.scale.setScalar(2.6);
      const n=obj.node;
      document.getElementById('tt-era').textContent=n.era||'';
      document.getElementById('tt-title').textContent=n.title;
      document.getElementById('tt-type').style.color=thex(n.type);
      document.getElementById('tt-type').textContent=tcfg(n.type).label;
      tooltip.classList.add('vis');canvas.style.cursor='pointer';
    }
  } else {
    if(hoveredMesh){hoveredMesh.material.color.setHex(hoveredMesh.userData.origColor);hoveredMesh.material.emissiveIntensity=hoveredMesh.userData.origEI||1.4;hoveredMesh.material.opacity=hoveredMesh.userData.origOpacity;hoveredMesh.scale.setScalar(1);hoveredMesh=null;}
    tooltip.classList.remove('vis');canvas.style.cursor='default';
  }
}

canvas.addEventListener('pointerdown',e=>{
  if(e.button===2) return;
  drag=true;pointerStart={x:e.clientX,y:e.clientY};lastMouse={x:e.clientX,y:e.clientY};
  if(!hintFaded){document.getElementById('hint').style.opacity='0';hintFaded=true;}
});
window.addEventListener('pointerup',e=>{
  if(e.button===2) return;
  const dx=Math.abs(e.clientX-pointerStart.x),dy=Math.abs(e.clientY-pointerStart.y);
  if(drag&&dx<5&&dy<5){
    if(hoveredMoon){
      // moon tap — card shown on hover
    } else if(hoveredMesh){
      const node=hoveredMesh.userData.node;
      if(isFocused&&focusNode===node){exitFocus();}else{enterFocus(node);}
    } else if(isFocused){exitFocus();}
  }
  drag=false;
});
window.addEventListener('pointermove',e=>{
  mouse.set((e.clientX/innerWidth)*2-1,-(e.clientY/innerHeight)*2+1);
  lastXY={x:e.clientX,y:e.clientY};
  posTooltip(e.clientX,e.clientY);
  if(!drag||isFocused) return;
  const dx=e.clientX-lastMouse.x,dy=e.clientY-lastMouse.y;
  lastMouse={x:e.clientX,y:e.clientY};
  autoRotate=false;clearTimeout(autoTimer);
  camTarget.theta-=dx*0.006;
  camTarget.phi=Math.max(0.01,Math.min(Math.PI*0.48,camTarget.phi+dy*0.005));
});
canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  if(isFocused){
    const delta=e.deltaY*0.004;
    activeMoons.forEach(m=>{m.orbitAngle+=delta;});
    return;
  }
  camTarget.radius=Math.max(5,Math.min(150,camTarget.radius+e.deltaY*0.06));
},{passive:false});
let lastPinch=null;
canvas.addEventListener('touchstart',e=>{if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;lastPinch=Math.sqrt(dx*dx+dy*dy);}},{passive:true});
canvas.addEventListener('touchmove',e=>{if(e.touches.length===2&&lastPinch){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY,d=Math.sqrt(dx*dx+dy*dy);camTarget.radius=Math.max(5,Math.min(150,camTarget.radius*(lastPinch/d)));lastPinch=d;}},{passive:true});

// ═══════════════════════════════════════════
// RENDER LOOP
// ═══════════════════════════════════════════
const LERP=0.065,PIVL=0.055;
let lt=0;
const pA=pGeo.getAttribute('position');

function tick(t){
  requestAnimationFrame(tick);
  const dt=Math.min((t-lt)/1000,0.05);lt=t;
  const el=t*0.001;

  // particles
  for(let i=0;i<PC;i++){
    const ox=pOrig[i*3],oy=pOrig[i*3+1],oz=pOrig[i*3+2],ph=pPh[i],sp=pSp[i];
    pA.array[i*3]  =ox+Math.sin(el*sp*0.31+ph)*0.55;
    pA.array[i*3+1]=oy+Math.sin(el*sp*0.19+ph*1.3)*0.28;
    pA.array[i*3+2]=oz+Math.cos(el*sp*0.27+ph*0.7)*0.55;
  }
  pA.needsUpdate=true;
  pMat.opacity=isLight?0:0.14+Math.sin(el*0.11)*0.04;

  // moons
  tickMoons(el,dt);

  if(hoveredMoon&&isFocused){
    showMoonCard(hoveredMoon.moonData,hoveredMoon.parentNode,lastXY.x,lastXY.y);
  }

  // Distance-based node scale
  const BASE_RADIUS=52;
  const scaleFactor=Math.max(0.45,Math.min(2.2,camState.radius/BASE_RADIUS));
  nodeObjects.forEach(o=>{
    if(o.mesh!==hoveredMesh) o.mesh.scale.setScalar(scaleFactor);
  });

  // ── ORBIT MODE: auto-rotate when in ORBIT view and not paused ──
  if(orbitMode&&!isFocused&&!orbitPaused) camTarget.theta+=0.0032;

  camState.phi   +=(camTarget.phi   -camState.phi)  *LERP;
  camState.theta +=(camTarget.theta -camState.theta) *LERP;
  camState.radius+=(camTarget.radius-camState.radius)*LERP;
  scenePivot.lerp(scenePivotTgt,PIVL);

  applyCam();checkHover();
  renderer.render(scene,cam);
}
requestAnimationFrame(tick);

window.addEventListener('resize',()=>{
  cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  drawMesh();
});

// ═══════════════════════════════════════════
// GRADIENT MESH BACKGROUND
// ═══════════════════════════════════════════
const bgCanvas=document.getElementById('bg-mesh');
const bgCtx=bgCanvas.getContext('2d');
let meshT=0;

function resizeBg(){bgCanvas.width=innerWidth;bgCanvas.height=innerHeight;}
resizeBg();

const BLOBS=[
  {x:0.18,y:0.22,vx:0.00009,vy:0.00006,r:0.62,col:[28,12,52]},
  {x:0.72,y:0.68,vx:-0.00007,vy:0.00009,r:0.55,col:[8,24,44]},
  {x:0.85,y:0.12,vx:-0.00006,vy:-0.00008,r:0.48,col:[32,18,8]},
  {x:0.25,y:0.78,vx:0.00008,vy:-0.00007,r:0.50,col:[6,28,28]},
];

// Light mode blobs — very subtle warm variations on cream
const BLOBS_LIGHT=[
  {x:0.15,y:0.20,vx:0.00009,vy:0.00006,r:0.60,col:[218,210,196]},
  {x:0.75,y:0.70,vx:-0.00007,vy:0.00009,r:0.52,col:[228,220,208]},
  {x:0.82,y:0.14,vx:-0.00006,vy:-0.00008,r:0.45,col:[210,204,194]},
  {x:0.28,y:0.80,vx:0.00008,vy:-0.00007,r:0.48,col:[220,212,200]},
];

function drawMesh(){
  const w=bgCanvas.width,h=bgCanvas.height;
  bgCtx.clearRect(0,0,w,h);
  if(isLight){
    // Paper base — warm off-white
    bgCtx.fillStyle='#f2ede6';
    bgCtx.fillRect(0,0,w,h);
    // Subtle warm ink wash blobs
    BLOBS_LIGHT.forEach(b=>{
      const cx=b.x*w,cy=b.y*h,rad=Math.max(w,h)*b.r;
      const grd=bgCtx.createRadialGradient(cx,cy,0,cx,cy,rad);
      const [r,g,bl]=b.col;
      grd.addColorStop(0,`rgba(${r},${g},${bl},0.45)`);
      grd.addColorStop(0.5,`rgba(${r},${g},${bl},0.14)`);
      grd.addColorStop(1,`rgba(${r},${g},${bl},0)`);
      bgCtx.fillStyle=grd;
      bgCtx.fillRect(0,0,w,h);
    });
    // Letterpress vignette — very slight darkening at edges
    const vig=bgCtx.createRadialGradient(w/2,h/2,h*0.3,w/2,h/2,h*0.88);
    vig.addColorStop(0,'rgba(0,0,0,0)');
    vig.addColorStop(1,'rgba(10,6,2,0.08)');
    bgCtx.fillStyle=vig;
    bgCtx.fillRect(0,0,w,h);
  } else {
    bgCtx.fillStyle='#030308';
    bgCtx.fillRect(0,0,w,h);
    BLOBS.forEach(b=>{
      const cx=b.x*w,cy=b.y*h,rad=Math.max(w,h)*b.r;
      const grd=bgCtx.createRadialGradient(cx,cy,0,cx,cy,rad);
      const [r,g,bl]=b.col;
      grd.addColorStop(0,`rgba(${r},${g},${bl},0.55)`);
      grd.addColorStop(0.5,`rgba(${r},${g},${bl},0.18)`);
      grd.addColorStop(1,`rgba(${r},${g},${bl},0)`);
      bgCtx.fillStyle=grd;
      bgCtx.fillRect(0,0,w,h);
    });
    const vig=bgCtx.createRadialGradient(w/2,h/2,h*0.28,w/2,h/2,h*0.92);
    vig.addColorStop(0,'rgba(0,0,0,0)');
    vig.addColorStop(1,'rgba(0,0,0,0.72)');
    bgCtx.fillStyle=vig;
    bgCtx.fillRect(0,0,w,h);
  }
}

function tickMesh(){
  meshT++;
  const blobs=isLight?BLOBS_LIGHT:BLOBS;
  blobs.forEach(b=>{
    b.x+=b.vx;b.y+=b.vy;
    if(b.x<0||b.x>1) b.vx*=-1;
    if(b.y<0||b.y>1) b.vy*=-1;
  });
  if(meshT%3===0) drawMesh();
  requestAnimationFrame(tickMesh);
}
drawMesh();
tickMesh();

// ═══════════════════════════════════════════
// THEME TOGGLE — INK ON PAPER
// ═══════════════════════════════════════════
const LIGHT_FOG=0xf2ede6,DARK_FOG=0x000000;

function applyLightModeToScene(){
  // Recolor all tracked lines
  allLines.forEach(({line,darkColor,lightColor,darkOp,lightOp})=>{
    line.material.color.setHex(isLight?lightColor:darkColor);
    line.material.opacity=isLight?lightOp:darkOp;
  });
  // Recolor node meshes
  nodeObjects.forEach(({mesh})=>{
    const ud=mesh.userData;
    if(isLight){
      const lc=ud.lightOrigColor||0x0a0602;
      mesh.material.color.setHex(lc);
      mesh.material.emissive.setHex(lc);
      mesh.material.emissiveIntensity=0; // no glow — pure ink
      mesh.material.metalness=0;
      mesh.material.roughness=0.55;
      mesh.material.clearcoat=0;
    } else {
      mesh.material.color.setHex(ud.origColor);
      mesh.material.emissive.setHex(ud.origColor);
      mesh.material.emissiveIntensity=ud.origEI||1.4;
      mesh.material.metalness=0.2;
      mesh.material.roughness=0.08;
      mesh.material.clearcoat=1.0;
    }
  });
  // Hide/show glow sprites
  glowSprites.forEach(gs=>{
    gs.visible=!isLight;
  });
  // Neon lights
  neonA.intensity=isLight?0:6;
  neonB.intensity=isLight?0:6;
  neonC.intensity=isLight?0:4;
  // Ambient — brighter in light mode so ink nodes read cleanly
  scene.children.filter(c=>c.isAmbientLight).forEach(l=>{l.intensity=isLight?0.85:0.15;});
  // Particle visibility
  pMat.opacity=isLight?0:0.18;
  // Fog
  scene.fog.color.setHex(isLight?LIGHT_FOG:DARK_FOG);
  renderer.setClearColor(isLight?LIGHT_FOG:0x000000,0);
  // Redraw text labels
  redrawLabels();
  // Redraw bg
  drawMesh();
}

document.getElementById('theme-toggle').addEventListener('click',()=>{
  isLight=!isLight;
  document.body.classList.toggle('light',isLight);
  document.getElementById('theme-toggle').textContent=isLight?'Dark':'Light';
  applyLightModeToScene();
});
</script>
