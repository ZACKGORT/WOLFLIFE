  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f2ee;
      --dot: rgba(0,0,0,0.12);
      --fg: #1a1a1a;
      --accent: #8a7560;
      --pill-bg: rgba(255,255,255,0.55);
      --pill-active-bg: #1a1a1a;
      --pill-active-fg: #f5f2ee;
      --page-pad: 1.5rem;
    }
    html, body {
      width: 100%; height: 100%;
      background-color: var(--bg);
      background-image: radial-gradient(circle, var(--dot) 1px, transparent 1px);
      background-size: 20px 20px;
      background-position: center center;
      overflow: hidden;
      cursor: none;
      overscroll-behavior: none;
      touch-action: none;
      transition: background-color 0.3s;
      font-family: "DM Sans", sans-serif;
      color: var(--fg);
      -webkit-font-smoothing: antialiased;
    }
    #canvas-wrap {
      position: fixed; inset: 0; touch-action: none;
    }
    #c {
      width: 100%; height: 100%; display: block;
      cursor: grab; touch-action: none;
    }
    #c.grabbing { cursor: grabbing; }

    /* ── Header ── */
    #hdr {
      position: fixed; top: 0; left: 0; width: 100%;
      padding: var(--page-pad);
      display: flex; align-items: flex-start; justify-content: space-between;
      pointer-events: none; z-index: 100;
    }
    #hdr-left { display: flex; flex-direction: column; gap: 0.25rem; }
    #title {
      font-size: clamp(1rem, 3vw, 1.5rem);
      font-weight: 300; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--fg); opacity: 0.75;
    }
    #subtitle {
      font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--accent); opacity: 0.6;
    }

    /* ── Nav pills ── */
    #nav {
      position: fixed;
      top: var(--page-pad);
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      display: flex;
      gap: 0.4rem;
      pointer-events: all;
      background: rgba(245,242,238,0.6);
      backdrop-filter: blur(12px) saturate(1.4);
      -webkit-backdrop-filter: blur(12px) saturate(1.4);
      border: 1px solid rgba(138,117,96,0.15);
      border-radius: 100px;
      padding: 0.3rem;
    }
    .pill {
      display: flex; align-items: center; gap: 0.35rem;
      padding: 0.38rem 0.9rem;
      border-radius: 100px;
      border: none;
      background: transparent;
      font-family: "DM Sans", sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--fg);
      opacity: 0.5;
      cursor: none;
      transition: opacity 0.2s, background 0.2s, color 0.2s;
      white-space: nowrap;
      user-select: none;
    }
    .pill:hover { opacity: 0.8; }
    .pill.active {
      background: var(--pill-active-bg);
      color: var(--pill-active-fg);
      opacity: 1;
    }
    .pill-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.6;
      flex-shrink: 0;
    }
    .pill.active .pill-dot { opacity: 1; }

    /* ── Canvas transition overlay ── */
    #transition-veil {
      position: fixed; inset: 0; z-index: 150;
      background: var(--bg);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.45s ease;
    }
    #transition-veil.in  { opacity: 1; pointer-events: all; }
    #transition-veil.out { opacity: 0; pointer-events: none; }

    /* ── Category label ── */
    #cat-label {
      position: fixed;
      bottom: calc(var(--page-pad) + 2rem);
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      font-size: 0.6rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }
    #cat-label.visible { opacity: 0.5; }

    /* ── Controls hint ── */
    #hint {
      position: fixed; bottom: var(--page-pad); right: var(--page-pad);
      z-index: 100; font-size: 0.65rem; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--accent); opacity: 0.4;
      pointer-events: none;
      text-align: right; line-height: 1.8;
    }

    /* ── Loader ── */
    #loader {
      position: fixed; inset: 0; z-index: 9999;
      background-color: var(--bg);
      background-image: radial-gradient(circle, var(--dot) 1px, transparent 1px);
      background-size: 20px 20px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1.5rem;
      transition: opacity 0.8s ease;
    }
    #loader.out { opacity: 0; pointer-events: none; }
    #loader-title {
      font-size: 0.75rem; letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--accent); opacity: 0.8;
    }
    #loader-bar-wrap {
      width: 160px; height: 1px;
      background: rgba(138,117,96,0.15);
      position: relative; overflow: hidden;
    }
    #loader-bar {
      position: absolute; top: 0; left: 0; height: 100%;
      width: 100%;
      background: var(--accent);
      transform: scaleX(0); transform-origin: left;
      transition: transform 0.15s linear;
    }
    #loader-count {
      font-size: 0.6rem; letter-spacing: 0.2em;
      color: var(--accent); opacity: 0.5;
    }
    #cursor {
      position: fixed; top: 0; left: 0;
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: transform 0.08s ease, opacity 0.2s;
      opacity: 0.55;
      mix-blend-mode: multiply;
      will-change: transform;
    }
    #cursor.grabbing {
      transform: translate(-50%, -50%) scale(1.8);
      opacity: 0.3;
    }
  </style>
</head>

// ─── State ─────────────────────────────────────────────────────────────────
let activeCatIdx = 0;
let IMAGES = CATEGORIES[0].images;
let N = IMAGES.length;
let transitioning = false;

// ─── Build nav pills ────────────────────────────────────────────────────────
const navEl    = document.getElementById('nav');
const veilEl   = document.getElementById('transition-veil');
const catLabel = document.getElementById('cat-label');
let labelTimer = null;

CATEGORIES.forEach((cat, i) => {
  const btn = document.createElement('button');
  btn.className = 'pill' + (i === 0 ? ' active' : '');
  btn.dataset.idx = i;
  btn.innerHTML = `<span class="pill-dot"></span>${cat.label}`;
  btn.addEventListener('click', () => switchCategory(i));
  navEl.appendChild(btn);
});

function switchCategory(idx) {
  if (idx === activeCatIdx || transitioning) return;
  transitioning = true;

  // Fade veil in
  veilEl.classList.add('in');

  setTimeout(() => {
    // Swap image set
    activeCatIdx = idx;
    IMAGES = CATEGORIES[idx].images;
    N = IMAGES.length;

    // Reset camera
    base.x = 0; base.y = 0; base.z = CAM_START_Z;
    tgt.x = 0;  tgt.y = 0;  tgt.z = 0;
    vel.x = 0;  vel.y = 0;  vel.z = 0;
    camera.position.set(0, 0, CAM_START_Z);

    // Clear all chunks so they repopulate with new images
    planeCache.clear();
    for (const k of [...chunks.keys()]) removeChunk(k);
    syncChunks(0, 0, 0);
    lastCK = '0,0,0';

    // Update pill styles
    document.querySelectorAll('.pill').forEach((p, i) => {
      p.classList.toggle('active', i === idx);
    });

    // Show category label
    clearTimeout(labelTimer);
    catLabel.textContent = CATEGORIES[idx].label;
    catLabel.classList.add('visible');
    labelTimer = setTimeout(() => catLabel.classList.remove('visible'), 2200);

    // Fade veil out
    setTimeout(() => {
      veilEl.classList.remove('in');
      setTimeout(() => { transitioning = false; }, 500);
    }, 60);
  }, 450);
}

// ─── Constants ─────────────────────────────────────────────────────────────
const CHUNK_SIZE      = 100;
const RENDER_DIST     = 2;
const FADE_MARGIN     = 1;
const MAX_VEL         = 3.0;
const KB_SPEED        = 0.18;
const VEL_LERP        = 0.14;
const VEL_DECAY       = 0.9;
const DRIFT_AMT       = 7.0;
const ITEMS_PER_CHUNK = 6;
const CAM_START_Z     = 50;
const FOG_NEAR        = 110;
const FOG_FAR         = 300;
const DEPTH_START     = 130;
const DEPTH_END       = 260;
const INVIS           = 0.01;

// ─── Seeded RNG ────────────────────────────────────────────────────────────
function hash(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = Math.imul(31, h) + s.charCodeAt(i) | 0;
  return h >>> 0;
}
function srand(seed) {
  const x = Math.sin(seed + 1) * 10000;
  return x - Math.floor(x);
}

// ─── Chunk offset table ────────────────────────────────────────────────────
const OFFSETS = [];
{
  const m = RENDER_DIST + FADE_MARGIN;
  for (let dx = -m; dx <= m; dx++)
  for (let dy = -m; dy <= m; dy++)
  for (let dz = -m; dz <= m; dz++) {
    if (Math.max(Math.abs(dx), Math.abs(dy), Math.abs(dz)) <= m)
      OFFSETS.push({ dx, dy, dz, dist: Math.max(Math.abs(dx), Math.abs(dy), Math.abs(dz)) });
  }
}

// ─── Texture cache ─────────────────────────────────────────────────────────
const texCache   = new Map();
const texWaiters = new Map();
const texAspects = new Map();
let loaded = 0;

const loaderEl    = document.getElementById('loader');
const loaderBar   = document.getElementById('loader-bar');
const loaderCount = document.getElementById('loader-count');
let visualPct = 0;
let targetPct  = 0;

// Collect all unique images across all categories
const ALL_IMAGES = [...new Set(CATEGORIES.flatMap(c => c.images))];
const TOTAL = ALL_IMAGES.length;

function updateLoader(n) {
  loaded = n;
  targetPct = Math.min(100, Math.round(n / TOTAL * 100));
  loaderCount.textContent = `${n} / ${TOTAL}`;
}

;(function tickLoader() {
  const diff = targetPct - visualPct;
  visualPct += diff * 0.1;
  loaderBar.style.transform = `scaleX(${visualPct / 100})`;
  if (!loaderEl.classList.contains('out')) requestAnimationFrame(tickLoader);
})();

// Preload all textures
let preloaded = 0;
ALL_IMAGES.forEach((url) => {
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    const aspect = img.naturalWidth / img.naturalHeight;
    texAspects.set(url, aspect);
    const tex = new THREE.Texture(img);
    tex.minFilter = THREE.LinearMipmapLinearFilter;
    tex.magFilter = THREE.LinearFilter;
    tex.generateMipmaps = true;
    tex.anisotropy = 4;
    tex.needsUpdate = true;
    texCache.set(url, tex);
    texWaiters.get(url)?.forEach(cb => cb(tex, aspect));
    texWaiters.delete(url);
    preloaded++;
    updateLoader(preloaded);
    if (preloaded >= TOTAL) {
      setTimeout(() => loaderEl.classList.add('out'), 300);
    }
  };
  img.onerror = () => {
    preloaded++;
    updateLoader(preloaded);
    if (preloaded >= TOTAL) setTimeout(() => loaderEl.classList.add('out'), 300);
  };
  img.src = url;
});

function getTexture(url, cb) {
  const cached = texCache.get(url);
  if (cached) { cb(cached, texAspects.get(url) || 1); return; }
  if (!texWaiters.has(url)) texWaiters.set(url, new Set());
  texWaiters.get(url).add(cb);
}

// ─── Chunk plane layout ────────────────────────────────────────────────────
const planeCache = new Map();
function chunkKey(cx, cy, cz) { return `${cx},${cy},${cz}`; }

function genChunkPlanes(cx, cy, cz) {
  const k = chunkKey(cx, cy, cz);
  if (planeCache.has(k)) return planeCache.get(k);

  const seed = hash(k);
  const planes = [];
  for (let i = 0; i < ITEMS_PER_CHUNK; i++) {
    const s = seed + i * 997;
    const r = n => srand(s + n);
    const imgIdx = Math.floor(r(6) * 1_000_000) % N;
    planes.push({
      id: `${k}-${i}`,
      px: cx * CHUNK_SIZE + r(0) * CHUNK_SIZE,
      py: cy * CHUNK_SIZE + r(1) * CHUNK_SIZE,
      pz: cz * CHUNK_SIZE + r(2) * CHUNK_SIZE,
      size: 10 + r(3) * 8,
      imgIdx,
      url: IMAGES[imgIdx],
    });
  }

  planeCache.set(k, planes);
  if (planeCache.size > 300) {
    planeCache.delete(planeCache.keys().next().value);
  }
  return planes;
}

// ─── Three.js setup ────────────────────────────────────────────────────────
const canvas   = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: false, powerPreference: 'high-performance', alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.5));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene  = new THREE.Scene();
scene.background = null;
scene.fog = new THREE.Fog(0xf5f2ee, FOG_NEAR, FOG_FAR);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.5, 500);
camera.position.set(0, 0, CAM_START_Z);

const planeGeo = new THREE.PlaneGeometry(1, 1);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Active chunks ─────────────────────────────────────────────────────────
const chunks = new Map();

function addChunk(cx, cy, cz) {
  const k = chunkKey(cx, cy, cz);
  if (chunks.has(k)) return;

  const planes  = genChunkPlanes(cx, cy, cz);
  const group   = new THREE.Group();
  const states  = [];

  for (const p of planes) {
    const mat = new THREE.MeshBasicMaterial({
      transparent: true, opacity: 0,
      side: THREE.DoubleSide, depthWrite: false,
    });
    const mesh = new THREE.Mesh(planeGeo, mat);
    mesh.position.set(p.px, p.py, p.pz);
    mesh.visible = false;
    group.add(mesh);

    const st = { mesh, mat, opacity: 0, ready: false, cx, cy, cz, pos: mesh.position, size: p.size };
    states.push(st);

    getTexture(p.url, (tex, aspect) => {
      st.ready = true;
      mat.map = tex;
      mat.needsUpdate = true;
      const h = p.size;
      const w = h * (aspect || 1);
      mesh.scale.set(w, h, 1);
    });
  }

  scene.add(group);
  chunks.set(k, { group, states });
}

function removeChunk(k) {
  const c = chunks.get(k);
  if (!c) return;
  scene.remove(c.group);
  for (const s of c.states) s.mat.dispose();
  c.group.clear();
  chunks.delete(k);
}

function syncChunks(cx, cy, cz) {
  const wanted = new Set();
  for (const o of OFFSETS) wanted.add(chunkKey(cx+o.dx, cy+o.dy, cz+o.dz));
  for (const k of chunks.keys()) if (!wanted.has(k)) removeChunk(k);
  for (const o of OFFSETS) addChunk(cx+o.dx, cy+o.dy, cz+o.dz);
}

// ─── Input ─────────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => { keys[e.key] = true; });
window.addEventListener('keyup',   e => { keys[e.key] = false; });

const vel  = { x: 0, y: 0, z: 0 };
const tgt  = { x: 0, y: 0, z: 0 };
const base = { x: 0, y: 0, z: CAM_START_Z };
const drift = { x: 0, y: 0 };
const mouse = { x: 0, y: 0 };
let dragging = false, lastMX = 0, lastMY = 0, scrollAcc = 0;

const cursorEl = document.getElementById('cursor');
function moveCursor(x, y) { cursorEl.style.left = x + 'px'; cursorEl.style.top = y + 'px'; }

canvas.addEventListener('mousedown', e => { dragging = true; lastMX = e.clientX; lastMY = e.clientY; canvas.classList.add('grabbing'); cursorEl.classList.add('grabbing'); });
window.addEventListener('mouseup',   () => { dragging = false; canvas.classList.remove('grabbing'); cursorEl.classList.remove('grabbing'); });
window.addEventListener('mousemove', e => { moveCursor(e.clientX, e.clientY);
  mouse.x =  (e.clientX / window.innerWidth)  * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  if (dragging) {
    tgt.x -= (e.clientX - lastMX) * 0.024;
    tgt.y += (e.clientY - lastMY) * 0.024;
    lastMX = e.clientX; lastMY = e.clientY;
  }
});
canvas.addEventListener('wheel', e => { e.preventDefault(); scrollAcc += e.deltaY * 0.006; }, { passive: false });

// Touch
let lt = [], ltd = 0;
function td(t) { const dx = t[0].clientX - t[1].clientX, dy = t[0].clientY - t[1].clientY; return Math.sqrt(dx*dx+dy*dy); }
canvas.addEventListener('touchstart', e => { e.preventDefault(); lt = Array.from(e.touches); ltd = lt.length >= 2 ? td(lt) : 0; canvas.classList.add('grabbing'); cursorEl.classList.add('grabbing'); if (lt[0]) moveCursor(lt[0].clientX, lt[0].clientY); }, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = Array.from(e.touches);
  if (t.length === 1 && lt.length >= 1) { tgt.x -= (t[0].clientX - lt[0].clientX) * 0.02; tgt.y += (t[0].clientY - lt[0].clientY) * 0.02; }
  else if (t.length >= 2 && ltd > 0) { const d = td(t); scrollAcc += (ltd - d) * 0.006; ltd = d; }
  lt = t;
}, { passive: false });
canvas.addEventListener('touchend', e => { lt = Array.from(e.touches); canvas.classList.remove('grabbing'); cursorEl.classList.remove('grabbing'); }, { passive: false });

// ─── Lerp / clamp ──────────────────────────────────────────────────────────
const lerp  = (a, b, t) => a + (b - a) * t;
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

// ─── Chunk throttle state ─────────────────────────────────────────────────
let lastCK = '', pendingChunk = null, lastChunkT = 0;

// Initial chunks
syncChunks(0, 0, 0);
lastCK = '0,0,0';

// ─── Main loop ─────────────────────────────────────────────────────────────
function tick() {
  requestAnimationFrame(tick);
  const now = performance.now();

  // Keyboard
  if (keys['w'] || keys['W'] || keys['ArrowUp'])    tgt.z -= KB_SPEED;
  if (keys['s'] || keys['S'] || keys['ArrowDown'])  tgt.z += KB_SPEED;
  if (keys['a'] || keys['A'] || keys['ArrowLeft'])  tgt.x -= KB_SPEED;
  if (keys['d'] || keys['D'] || keys['ArrowRight']) tgt.x += KB_SPEED;
  if (keys['e'] || keys['E']) tgt.y += KB_SPEED;
  if (keys['q'] || keys['Q']) tgt.y -= KB_SPEED;

  // Scroll
  tgt.z += scrollAcc;
  scrollAcc *= 0.75;

  // Mouse drift
  if (!dragging) {
    drift.x = lerp(drift.x, mouse.x * DRIFT_AMT, 0.1);
    drift.y = lerp(drift.y, mouse.y * DRIFT_AMT, 0.1);
  }

  // Velocity
  tgt.x = clamp(tgt.x, -MAX_VEL, MAX_VEL);
  tgt.y = clamp(tgt.y, -MAX_VEL, MAX_VEL);
  tgt.z = clamp(tgt.z, -MAX_VEL, MAX_VEL);
  vel.x = lerp(vel.x, tgt.x, VEL_LERP);
  vel.y = lerp(vel.y, tgt.y, VEL_LERP);
  vel.z = lerp(vel.z, tgt.z, VEL_LERP);
  base.x += vel.x; base.y += vel.y; base.z += vel.z;
  tgt.x *= VEL_DECAY; tgt.y *= VEL_DECAY; tgt.z *= VEL_DECAY;

  camera.position.set(base.x + drift.x, base.y + drift.y, base.z);

  // Chunk update
  const cx = Math.floor(base.x / CHUNK_SIZE);
  const cy = Math.floor(base.y / CHUNK_SIZE);
  const cz = Math.floor(base.z / CHUNK_SIZE);
  const ck = chunkKey(cx, cy, cz);
  if (ck !== lastCK) { pendingChunk = { cx, cy, cz }; lastCK = ck; }
  const isZooming = Math.abs(vel.z) > 0.1;
  const throttle  = isZooming ? 450 : 120;
  if (pendingChunk && now - lastChunkT >= throttle) {
    syncChunks(pendingChunk.cx, pendingChunk.cy, pendingChunk.cz);
    pendingChunk = null;
    lastChunkT = now;
  }

  // Opacity per plane
  for (const [, chunk] of chunks) {
    for (const s of chunk.states) {
      if (!s.ready) continue;

      const cdist = Math.max(Math.abs(s.cx - cx), Math.abs(s.cy - cy), Math.abs(s.cz - cz));
      const depth = Math.abs(s.pos.z - base.z);

      if (depth > DEPTH_END + 60 && s.opacity < INVIS) { s.mesh.visible = false; continue; }

      const gridFade  = cdist <= RENDER_DIST ? 1 : Math.max(0, 1 - (cdist - RENDER_DIST) / Math.max(FADE_MARGIN, 0.0001));
      const depthFade = depth <= DEPTH_START ? 1 : Math.max(0, 1 - (depth - DEPTH_START) / Math.max(DEPTH_END - DEPTH_START, 0.0001));
      const targetOp  = Math.min(gridFade, depthFade * depthFade);

      s.opacity = lerp(s.opacity, targetOp, 0.16);

      const op = s.opacity;
      const full = op > 0.99;
      s.mat.opacity    = full ? 1 : op;
      s.mat.depthWrite = full;
      s.mesh.visible   = op > INVIS;
    }
  }

  renderer.render(scene, camera);
}

tick();

})();
</script>
</body>
</html>
