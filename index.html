<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/Draggable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/InertiaPlugin.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/CustomEase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/Flip.min.js"></script>

  <style>
    @import url("https://fonts.cdnfonts.com/css/thegoodmonolith");

    @font-face {
      font-family: "PPNeueMontreal";
      src: url("https://assets.codepen.io/7558/PPNeueMontreal-Variable.woff2") format("woff2");
      font-weight: 100 900;
      font-style: normal;
    }

    :root {
      --spacing-base: 1rem;
      --spacing-md: 1.5rem;
      --spacing-lg: 2rem;
      --color-text: #ffffff;
      --transition-medium: 0.3s ease;
      --font-size-base: 14px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

    body {
      font-family: "PPNeueMontreal", sans-serif;
      background: #000;
      overflow: hidden;
      height: 100vh;
      cursor: grab;
    }

    body.dragging  { cursor: grabbing; }
    body.zoom-mode { cursor: default; }

    /* ── Header / Footer ── */
    .header, .footer {
      position: fixed; left: 0; width: 100vw; padding: 1.5rem;
      z-index: 10000;
      display: grid; grid-template-columns: repeat(12,1fr); column-gap: var(--spacing-base);
      pointer-events: none; opacity: 0;
    }
    .header > *, .footer > * { pointer-events: auto; }
    .header { top: 0; }
    .footer  { bottom: 0; }

    .nav-section      { grid-column: 1 / span 3; }
    .values-section   { grid-column: 5 / span 2; }
    .location-section { grid-column: 7 / span 2; }
    .contact-section  { grid-column: 9 / span 2; }
    .social-section   { grid-column: 11 / span 2; text-align: right; }
    .info-section     { grid-column: 9 / span 4; text-align: right; }

    /* ── Logo ── */
    .logo-container {
      margin-bottom: var(--spacing-md); display: block;
      width: 2rem; height: 2rem; position: relative; cursor: pointer;
      transition: opacity var(--transition-medium);
    }
    .logo-container:hover { opacity: 0.7; }
    .logo-container img { width: 100%; height: 100%; object-fit: contain; display: block; }

    /* ── Filter active state ── */
    .filter-link.filter-active::after { width: 100%; }
    .filter-link.filter-active { color: black; mix-blend-mode: difference; }

    /* ── Type ── */
    a {
      position: relative; cursor: pointer; color: var(--color-text);
      padding: 0; display: inline-block; z-index: 1;
      text-decoration: none; font-size: var(--font-size-base);
      opacity: 1; transition: color var(--transition-medium); font-weight: 700;
    }
    a::after {
      content: ""; position: absolute; top: 0; left: 0;
      width: 0; height: 100%; background-color: var(--color-text);
      z-index: -1; transition: width 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    a:hover::after { width: 100%; }
    a:hover { color: black; mix-blend-mode: difference; opacity: 1; }

    p  { display: block; color: #fff; font-size: 14px; font-weight: 600; letter-spacing: -0.01rem; -webkit-font-smoothing: antialiased; }
    ul { list-style: none; }
    h3 { font-size: 14px; margin-bottom: var(--spacing-base); font-weight: 600; color: #fff; }
    .footer p { font-family: "TheGoodMonolith", monospace; }

    /* ── Viewport / Canvas ── */
    .viewport {
      position: fixed; top: 0; left: 0;
      width: 100vw; height: 100vh;
      overflow: hidden; z-index: 1; opacity: 0;
    }
    .canvas-wrapper {
      position: absolute; top: 0; left: 0;
      transform-origin: 0 0; will-change: transform; isolation: isolate;
    }
    .grid-container { position: relative; width: 100%; height: 100%; }

    /* ── Grid Items ── */
    .grid-item {
      position: absolute; width: 320px; height: 320px;
      background: #111; cursor: pointer;
      will-change: transform, opacity; z-index: 1; opacity: 1;
      transition: opacity 0.6s ease; overflow: hidden;
    }
    .grid-item.out-of-view { opacity: 0.1; }
    .grid-item.selected    { z-index: 2 !important; }

    /* ── Video in grid ── */
    .grid-item video {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      user-select: none; pointer-events: none;
    }

    /* Hover play indicator — subtle pulse ring */
    .grid-item::after {
      content: "";
      position: absolute; inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.25s ease;
      pointer-events: none;
    }
    .grid-item:hover::after {
      background: rgba(255,255,255,0.04);
    }

    /* ── Split Screen ── */
    .split-screen-container {
      position: fixed; top: 0; left: 0;
      width: 100vw; height: 100vh;
      display: flex; z-index: 2;
      opacity: 0; pointer-events: none;
    }
    .split-screen-container.active { opacity: 1; pointer-events: all; }

    .split-left, .split-right {
      position: relative; width: 50vw; height: 100vh;
      background: rgba(0,0,0,0.6);
      display: flex; justify-content: center; align-items: center;
      z-index: 1; cursor: pointer;
    }

    .zoom-target {
      width: 100%; height: 100%;
      position: relative; display: flex;
      align-items: center; justify-content: center; z-index: 1;
    }

    /* Video inside zoom target */
    .zoom-target video {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }

    .split-screen-container.active .zoom-target::before { display: none; }
    .zoom-target::before {
      content: "VIDEO TARGET";
      color: rgba(255,255,255,0.3);
      font-family: "TheGoodMonolith", monospace;
      font-size: 0.75em; font-weight: 400;
      text-transform: uppercase; letter-spacing: 2px;
    }

    /* ── Title overlay ── */
    .image-title-overlay {
      position: absolute; bottom: 40px; left: 40px;
      color: white; z-index: 4; opacity: 0; pointer-events: none;
    }
    .image-title-overlay.active { opacity: 0; }

    .image-slide-number {
      position: relative; width: 400px; height: 20px; margin-bottom: 0.5em;
      clip-path: polygon(0% 0%,100% 0%,100% 100%,0% 100%); overflow: hidden;
    }
    .image-slide-number span {
      position: absolute; top: 0; left: 0; color: white;
      font-family: "TheGoodMonolith", monospace;
      font-size: 12px; font-weight: 400; line-height: 1.5;
      transform: translateY(0); will-change: transform;
      text-transform: uppercase; letter-spacing: 0.1em;
    }

    .image-slide-title {
      position: relative; width: 400px; height: 60px; margin-bottom: 1em;
      clip-path: polygon(0% 0%,100% 0%,100% 100%,0% 100%); overflow: hidden;
    }
    .image-slide-title h1 {
      position: absolute; top: 0; left: 0; color: white;
      font-family: "PPNeueMontreal", sans-serif;
      font-size: 48px; font-weight: 500; letter-spacing: -0.02em; line-height: 1.2;
      transform: translateY(0); will-change: transform;
    }

    .image-slide-description {
      position: relative; width: 400px; min-height: 80px;
      clip-path: polygon(0% 0%,100% 0%,100% 100%,0% 100%); overflow: hidden;
    }
    .description-line {
      position: relative; display: block;
      color: rgba(255,255,255,0.8);
      font-family: "PPNeueMontreal", sans-serif;
      font-size: 16px; font-weight: 300; line-height: 1.4;
      transform: translateY(0); will-change: transform; overflow: hidden;
    }

    @media (max-width: 900px) {
      .image-title-overlay { bottom: 20px; left: 20px; }
      .image-slide-number  { width: 300px; height: 18px; }
      .image-slide-number span { font-size: 10px; }
      .image-slide-title   { width: 300px; height: 50px; }
      .image-slide-title h1 { font-size: 36px; }
      .image-slide-description { width: 300px; min-height: 70px; }
      .description-line { font-size: 14px; }
    }

    /* ── Controls ── */
    .controls-container {
      position: fixed; bottom: 1.25em; left: 50%;
      transform: translateX(-50%);
      display: flex; z-index: 6; opacity: 0;
      transition: left 1.2s cubic-bezier(0.87,0,0.13,1);
    }
    .controls-container.visible   { opacity: 1; }
    .controls-container.split-mode { left: 75%; }

    .percentage-indicator {
      background-color: #f0f0f0;
      background-image: radial-gradient(rgba(0,0,0,0.015) 1px, transparent 0);
      background-size: 0.44em 0.44em; background-position: -0.06em -0.06em;
      padding: 0.625em 1.25em; border-radius: 0.25em;
      display: flex; align-items: center; justify-content: center;
      font-family: "TheGoodMonolith", monospace;
      font-size: 0.75em; font-weight: 400; text-transform: uppercase;
      color: #333; min-width: 5em; white-space: nowrap;
    }

    .switch {
      display: flex; gap: 1.25em;
      background-color: #222;
      background-image: radial-gradient(rgba(255,255,255,0.015) 1px, transparent 0);
      background-size: 0.44em 0.44em; background-position: -0.06em -0.06em;
      padding: 0.625em 1.25em; border-radius: 0.25em;
      transition: padding 0.3s ease-in-out;
    }

    .sound-toggle {
      background-color: #f0f0f0;
      background-image: radial-gradient(rgba(0,0,0,0.015) 1px, transparent 0);
      background-size: 0.44em 0.44em; background-position: -0.06em -0.06em;
      padding: 0.5em 0.75em; border-radius: 0.25em;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.3s ease;
      min-width: 3.75em; position: relative; border-color: transparent;
    }
    .sound-wave-canvas {
      width: 2em; height: 1em;
      border: none !important; outline: none !important; background: none !important;
    }

    .switch-button {
      background: none; border: none; border-color: transparent;
      color: #666; cursor: pointer;
      font-family: "TheGoodMonolith", monospace;
      font-size: 0.75em; font-weight: 400; text-transform: uppercase;
      padding: 5px 10px; position: relative;
      transition: all 0.3s ease-in-out; white-space: nowrap;
    }
    .switch-button-current { color: #f0f0f0; }
    .indicator-dot {
      position: absolute; width: 5px; height: 5px;
      background-color: #f0f0f0; border-radius: 50%;
      opacity: 0; transition: opacity 0.3s ease-in-out;
      top: 50%; transform: translateY(-50%); left: -8px;
    }
    .switch-button:hover .indicator-dot { opacity: 1; }

    /* ── Close button ── */
    .close-button {
      position: fixed; top: 50%; right: 20px;
      width: 64px; height: 64px;
      background: none; border: none; border-color: transparent;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      z-index: 5; opacity: 0; pointer-events: none;
      transform: translate(40px,-50%);
    }
    .close-button.active { pointer-events: all; }
    .close-button:hover  { opacity: 0.7; }
    .close-button svg    { width: 64px; height: 64px; transform: rotate(180deg); }

    /* ── Scaling overlay ── */
    .scaling-image-overlay {
      position: fixed; top: 0; left: 0;
      z-index: 3; pointer-events: none; will-change: transform; opacity: 1 !important;
    }
    .scaling-image-overlay video {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }

    /* ── Vignette ── */
    .page-vignette-container {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 9998;
    }
    .page-vignette-extreme {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      mix-blend-mode: overlay;
      background: linear-gradient(to bottom,rgba(0,0,0,0.9) 0%,rgba(0,0,0,0.5) 20%,transparent 40%);
    }
  </style>

function buildMediaPool(totalCells) {
  // shuffle helper
  const shuffle = arr => { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; };
  const vids = shuffle(VIDEOS);
  const imgs = shuffle(IMAGES);
  const pool = [];
  let vi = 0, ii = 0;
  for (let i = 0; i < totalCells; i++) {
    // place a video roughly every 3 cells, otherwise image
    if (i % 3 === 1 && vi < vids.length) { pool.push(vids[vi++]); }
    else { pool.push(imgs[ii++ % imgs.length]); }
  }
  return pool;
}
const TOTAL_CELLS = 8 * 12; // rows × cols
const MEDIA_POOL  = buildMediaPool(TOTAL_CELLS);

class PreloaderManager {
  constructor() {
    this.overlay = null; this.canvas = null; this.ctx = null;
    this.animationId = null; this.startTime = null; this.duration = 2000;
    this.createLoadingScreen();
  }
  createLoadingScreen() {
    this.overlay = document.getElementById("preloader-overlay");
    this.overlay.style.cssText = `position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:flex;justify-content:center;align-items:center;z-index:100000;`;
    this.canvas = document.createElement("canvas");
    this.canvas.width = 300; this.canvas.height = 300;
    this.ctx = this.canvas.getContext("2d");
    this.overlay.appendChild(this.canvas);
    this.startAnimation();
  }
  startAnimation() {
    const cx = 150, cy = 150;
    let time = 0, lastTime = 0;
    const rings = [{r:20,n:8},{r:35,n:12},{r:50,n:16},{r:65,n:20},{r:80,n:24}];
    const h2r = h => [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
    const pri = h2r("#2C1B14"), acc = h2r("#A64B23");
    const animate = ts => {
      if (!this.startTime) this.startTime = ts;
      if (!lastTime) lastTime = ts;
      time += (ts - lastTime) * 0.001; lastTime = ts;
      this.ctx.clearRect(0,0,300,300);
      this.ctx.beginPath(); this.ctx.arc(cx,cy,3,0,Math.PI*2);
      this.ctx.fillStyle=`rgba(${pri},0.9)`; this.ctx.fill();
      rings.forEach((ring,ri) => {
        for (let i=0;i<ring.n;i++) {
          const a=(i/ring.n)*Math.PI*2;
          const rp=Math.sin(time*2-ri*0.4)*3;
          const x=cx+Math.cos(a)*(ring.r+rp), y=cy+Math.sin(a)*(ring.r+rp);
          const ow=0.4+Math.sin(time*2-ri*0.4+i*0.2)*0.6;
          const active=Math.sin(time*2-ri*0.4+i*0.2)>0.6;
          const c=active?acc:pri;
          this.ctx.beginPath(); this.ctx.moveTo(cx,cy); this.ctx.lineTo(x,y);
          this.ctx.lineWidth=0.8;
          this.ctx.strokeStyle=`rgba(${c},${ow*(active?0.7:0.5)})`; this.ctx.stroke();
          this.ctx.beginPath(); this.ctx.arc(x,y,2.5,0,Math.PI*2);
          this.ctx.fillStyle=`rgba(${c},${ow})`; this.ctx.fill();
        }
      });
      if (ts - this.startTime >= this.duration) { this.complete(); return; }
      this.animationId = requestAnimationFrame(animate);
    };
    this.animationId = requestAnimationFrame(animate);
  }
  complete(cb) {
    if (this.animationId) cancelAnimationFrame(this.animationId);
    if (this.overlay) {
      this.overlay.style.opacity="0"; this.overlay.style.transition="opacity 0.8s ease";
      setTimeout(() => { this.overlay?.remove(); if(cb) cb(); }, 800);
    }
  }
}

  // ── Sound ──
  initSoundSystem() {
    this.soundSystem = {
      enabled: false,
      sounds: {
        click:      new Audio("https://assets.codepen.io/7558/glitch-fx-001.mp3"),
        open:       new Audio("https://assets.codepen.io/7558/click-glitch-001.mp3"),
        close:      new Audio("https://assets.codepen.io/7558/click-glitch-001.mp3"),
        "zoom-in":  new Audio("https://assets.codepen.io/7558/whoosh-fx-001.mp3"),
        "zoom-out": new Audio("https://assets.codepen.io/7558/whoosh-fx-001.mp3"),
        "drag-start": new Audio("https://assets.codepen.io/7558/preloader-2s-001.mp3"),
        "drag-end":   new Audio("https://assets.codepen.io/7558/preloader-2s-001.mp3"),
      },
      play: name => {
        if (!this.soundSystem.enabled || !this.soundSystem.sounds[name]) return;
        try { const a=this.soundSystem.sounds[name]; a.currentTime=0; a.play().catch(()=>{}); } catch(e){}
      },
      toggle: () => {
        this.soundSystem.enabled = !this.soundSystem.enabled;
        this.soundToggle.classList.toggle("active", this.soundSystem.enabled);
        if (this.zoomState.isActive) return;
        if (this.soundSystem.enabled) setTimeout(()=>this.soundSystem.play("click"),50);
      }
    };
    Object.values(this.soundSystem.sounds).forEach(a=>{ a.preload="auto"; a.volume=0.3; });
    this.initSoundWave();
  }

  initSoundWave() {
    const canvas = document.getElementById("soundWaveCanvas");
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const W=32, H=16, cy=Math.floor(H/2);
    let t0 = Date.now(), amp = 0;
    const lerp = (a,b,f) => {
      const h2n = h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
      const [r1,g1,b1]=h2n(a),[r2,g2,b2]=h2n(b);
      return `#${[r1+f*(r2-r1),g1+f*(g2-g1),b1+f*(b2-b1)].map(v=>Math.round(v).toString(16).padStart(2,"0")).join("")}`;
    };
    const draw = () => {
      amp += ((this.soundSystem.enabled?1:0) - amp)*0.08;
      ctx.clearRect(0,0,W,H);
      const t=(Date.now()-t0)/1000, mf=1-amp;
      const P="#2C1B14",A="#A64B23",M="#D9C4AA";
      if (!this.soundSystem.enabled && amp<0.01) { ctx.fillStyle=M; ctx.fillRect(0,cy,W,2); }
      else {
        ctx.fillStyle=lerp(P,M,mf);
        for(let i=0;i<W;i++){const x=i-W/2,e=Math.exp(-x*x/50),y=cy+Math.cos(x*.4-t*8)*e*H*.35*amp;ctx.fillRect(i,Math.round(y),1,2);}
        ctx.fillStyle=lerp(A,M,mf);
        for(let i=0;i<W;i++){const x=i-W/2,e=Math.exp(-x*x/80),y=cy+Math.cos(x*.3-t*5)*e*H*.25*amp;ctx.fillRect(i,Math.round(y),1,2);}
      }
      requestAnimationFrame(draw);
    };
    draw();
  }

  // ── Helpers ──
  splitTextIntoLines(el, text) {
    el.innerHTML = "";
    const words = text.split(" "); const lines = [];
    const tmp = document.createElement("div");
    tmp.style.cssText=`position:absolute;visibility:hidden;width:${el.offsetWidth}px;font-family:'PPNeueMontreal',sans-serif;font-size:16px;font-weight:300;line-height:1.4;`;
    document.body.appendChild(tmp);
    let cur="";
    words.forEach(w=>{ const t=cur?`${cur} ${w}`:w; tmp.textContent=t; if(tmp.offsetWidth>el.offsetWidth&&cur){lines.push(cur);cur=w;}else cur=t; });
    if(cur) lines.push(cur);
    document.body.removeChild(tmp);
    lines.forEach(lt=>{ const s=document.createElement("span"); s.className="description-line"; s.textContent=lt; el.appendChild(s); });
    return el.querySelectorAll(".description-line");
  }

  calculateGapForZoom(z) { return z>=1.0?16:z>=0.6?32:64; }

  calculateGridDimensions(gap=this.config.currentGap) {
    const W=this.config.cols*(this.config.itemSize+gap)-gap;
    const H=this.config.rows*(this.config.itemSize+gap)-gap;
    this.gridDimensions={width:W,height:H,scaledWidth:W*this.config.currentZoom,scaledHeight:H*this.config.currentZoom,gap};
    return this.gridDimensions;
  }

  // ── Build grid — videos AND photos ──
  generateGridItems() {
    this.config.currentGap = this.calculateGapForZoom(this.config.currentZoom);
    this.calculateGridDimensions();
    this.canvasWrapper.style.width  = this.gridDimensions.width+"px";
    this.canvasWrapper.style.height = this.gridDimensions.height+"px";
    this.gridContainer.innerHTML = "";
    this.gridItems = [];

    let mi = 0;
    for (let row=0; row<this.config.rows; row++) {
      for (let col=0; col<this.config.cols; col++) {
        const item = document.createElement("div");
        item.className = "grid-item";
        const x = col*(this.config.itemSize+this.config.currentGap);
        const y = row*(this.config.itemSize+this.config.currentGap);
        item.style.left = `${x}px`;
        item.style.top  = `${y}px`;
        item.style.opacity = "0";

        const mediaData = MEDIA_POOL[mi++ % MEDIA_POOL.length];
        const isVideo   = mediaData.type === "video";

        let vid = null;
        let img = null;

        if (isVideo) {
          vid = document.createElement("video");
          vid.src         = mediaData.url;
          vid.muted       = true;
          vid.loop        = true;
          vid.playsInline = true;
          vid.preload     = "metadata";
          vid.currentTime = 0;
          vid.addEventListener("loadedmetadata", () => { vid.currentTime = 0; }, { once: true });
          item.appendChild(vid);
        } else {
          img = document.createElement("img");
          img.src   = mediaData.url;
          img.alt   = mediaData.title || "";
          img.style.cssText = "width:100%;height:100%;object-fit:cover;display:block;";
          img.loading = "lazy";
          item.appendChild(img);
        }

        const itemData = {
          element: item,
          vid,          // null for photos
          img,          // null for videos
          isVideo,
          row, col, baseX: x, baseY: y,
          videoData: mediaData,   // same shape: .url .title .number .type
          index: this.gridItems.length
        };

        // ── Hover: play video silently (photos do nothing extra) ──
        if (isVideo) {
          item.addEventListener("mouseenter", () => {
            if (this.zoomState.isActive) return;
            const t = setTimeout(() => { vid.muted = true; vid.play().catch(()=>{}); }, 120);
            this._hoverTimers.set(item, t);
          });
          item.addEventListener("mouseleave", () => {
            if (this.zoomState.isActive) return;
            const t = this._hoverTimers.get(item);
            if (t) { clearTimeout(t); this._hoverTimers.delete(item); }
            vid.pause();
            vid.currentTime = 0;
          });
        }

        // ── Click: zoom ──
        item.addEventListener("click", () => {
          if (!this.zoomState.isActive) {
            this.soundSystem.play("click");
            this.enterZoomMode(itemData);
          }
        });

        this.gridContainer.appendChild(item);
        this.gridItems.push(itemData);
      }
    }
  }

  // ── Filter: show only images, only videos, or all ──
  setFilter(type, linkEl) {
    if (this.zoomState.isActive) this.exitZoomMode();

    // update active link
    document.querySelectorAll(".filter-link").forEach(l => l.classList.remove("filter-active"));
    if (linkEl) linkEl.classList.add("filter-active");

    this.gridItems.forEach(d => {
      const show = type === "all" || d.videoData.type === type;
      gsap.to(d.element, { opacity: show ? 1 : 0, duration: 0.35, ease: "power2.out",
        onComplete: () => { d.element.style.pointerEvents = show ? "" : "none"; }
      });
    });
  }

  setupViewportObserver() {
    if (this.viewportObserver) this.viewportObserver.disconnect();
    this.viewportObserver = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (this.zoomState.selectedItem && entry.target===this.zoomState.selectedItem.element) return;
        if (entry.isIntersecting) {
          entry.target.classList.remove("out-of-view");
          gsap.to(entry.target,{opacity:1,duration:0.6,ease:"power2.out"});
        } else {
          entry.target.classList.add("out-of-view");
          gsap.to(entry.target,{opacity:0.1,duration:0.6,ease:"power2.out"});
        }
      });
    },{root:null,threshold:0.15,rootMargin:"10%"});
    this.gridItems.forEach(item=>this.viewportObserver.observe(item.element));
  }

  updateTitleOverlay(itemData) {
    const vd = itemData.videoData;
    const numberEl = document.querySelector("#imageSlideNumber span");
    const titleEl  = document.querySelector("#imageSlideTitle h1");
    const descEl   = document.getElementById("imageSlideDescription");
    if (numberEl) numberEl.textContent = vd.number;
    if (titleEl)  titleEl.textContent  = vd.title;
    // description placeholder until you add them
    if (descEl)   { descEl.innerHTML=""; this.descriptionLines = descEl.querySelectorAll(".description-line"); }
  }

  // ── Zoom: create a cloned overlay (video or image) ──
  createScalingOverlay(selectedItemData) {
    const overlay = document.createElement("div");
    overlay.className = "scaling-image-overlay";

    if (selectedItemData.isVideo) {
      const vid = document.createElement("video");
      vid.src         = selectedItemData.vid.src;
      vid.muted       = true;
      vid.loop        = true;
      vid.playsInline = true;
      vid.preload     = "metadata";
      vid.currentTime = 0;
      overlay.appendChild(vid);
      document.body.appendChild(overlay);
      const rect = selectedItemData.vid.getBoundingClientRect();
      gsap.set(overlay,{left:rect.left,top:rect.top,width:rect.width,height:rect.height,opacity:1});
      return {overlay, vid};
    } else {
      const img = document.createElement("img");
      img.src   = selectedItemData.img.src;
      img.alt   = selectedItemData.videoData.title || "";
      img.style.cssText = "width:100%;height:100%;object-fit:cover;display:block;";
      overlay.appendChild(img);
      document.body.appendChild(overlay);
      const rect = selectedItemData.img.getBoundingClientRect();
      gsap.set(overlay,{left:rect.left,top:rect.top,width:rect.width,height:rect.height,opacity:1});
      return {overlay, vid: null};
    }
  }

  enterZoomMode(selectedItemData) {
    if (this.zoomState.isActive) return;
    this.zoomState.isActive      = true;
    this.zoomState.selectedItem  = selectedItemData;

    this.soundSystem.play("open");
    if (this.draggable) this.draggable.disable();
    document.body.classList.add("zoom-mode");

    // pause hover-play if video
    if (selectedItemData.isVideo) {
      const hoverTimer = this._hoverTimers.get(selectedItemData.element);
      if (hoverTimer) { clearTimeout(hoverTimer); this._hoverTimers.delete(selectedItemData.element); }
      selectedItemData.vid.pause();
      selectedItemData.vid.currentTime = 0;
    }

    const splitContainer = this.splitScreenContainer;
    const zoomTarget     = document.getElementById("zoomTarget");
    splitContainer.classList.add("active");
    gsap.to(splitContainer,{opacity:1,duration:1.2,ease:this.customEase});

    const {overlay, vid: overlayVid} = this.createScalingOverlay(selectedItemData);
    this.zoomState.scalingOverlay = overlay;
    this.zoomState.zoomedVideo    = overlayVid;

    // hide the source element during flight
    if (selectedItemData.isVideo) gsap.set(selectedItemData.vid,{opacity:0});
    else                           gsap.set(selectedItemData.img,{opacity:0});

    this.zoomState.flipAnimation = Flip.fit(overlay, zoomTarget, {
      duration: 1.2, ease: this.customEase, absolute: true,
      onComplete: () => {
        zoomTarget.innerHTML = "";

        if (selectedItemData.isVideo) {
          // Full-res video with audio
          const zv = document.createElement("video");
          zv.src         = selectedItemData.videoData.url;
          zv.muted       = false;
          zv.loop        = true;
          zv.playsInline = true;
          zv.autoplay    = true;
          zv.style.cssText = "width:100%;height:100%;object-fit:cover;display:block;";
          zoomTarget.appendChild(zv);
          zv.play().catch(()=>{ zv.muted=true; zv.play().catch(()=>{}); });
          this.zoomState.zoomedVideo = zv;
        } else {
          // Full-res photo
          const zi = document.createElement("img");
          zi.src = selectedItemData.videoData.url;
          zi.alt = selectedItemData.videoData.title || "";
          zi.style.cssText = "width:100%;height:100%;object-fit:contain;display:block;background:#000;";
          zoomTarget.appendChild(zi);
          this.zoomState.zoomedVideo = null;
        }

        overlay.remove();
        this.zoomState.scalingOverlay = null;

        this.updateTitleOverlay(selectedItemData);
        const tlo = this.imageTitleOverlay;
        gsap.set("#imageSlideNumber span",{y:20,opacity:0});
        gsap.set("#imageSlideTitle h1",   {y:60,opacity:0});
        tlo.classList.add("active");
        gsap.to(tlo,               {opacity:1,duration:0.3,ease:"power2.out"});
        gsap.to("#imageSlideNumber span",{duration:0.8,y:0,opacity:1,ease:this.customEase,delay:0.1});
        gsap.to("#imageSlideTitle h1",   {duration:0.8,y:0,opacity:1,ease:this.customEase,delay:0.15});
      }
    });

    this.controlsContainer.classList.add("split-mode");
    gsap.fromTo(this.closeButton,{x:40,opacity:0},{x:0,opacity:1,duration:0.6,ease:"power2.out",delay:0.9});
    this.closeButton.classList.add("active");

    document.getElementById("splitLeft").addEventListener("click",  this.handleSplitAreaClick.bind(this));
    document.getElementById("splitRight").addEventListener("click", this.handleSplitAreaClick.bind(this));
    document.addEventListener("keydown", this.handleZoomKeys.bind(this));
  }

  handleSplitAreaClick(e) { if (e.target===e.currentTarget) this.exitZoomMode(); }

  exitZoomMode() {
    if (!this.zoomState.isActive || !this.zoomState.selectedItem) return;

    this.soundSystem.play("close");
    document.removeEventListener("keydown", this.handleZoomKeys);
    const sl=document.getElementById("splitLeft"), sr=document.getElementById("splitRight");
    if(sl) sl.removeEventListener("click",this.handleSplitAreaClick);
    if(sr) sr.removeEventListener("click",this.handleSplitAreaClick);

    const splitContainer  = this.splitScreenContainer;
    const selectedItemData = this.zoomState.selectedItem;
    const selectedElement = selectedItemData.element;

    // stop zoomed video if applicable
    if (this.zoomState.zoomedVideo) { this.zoomState.zoomedVideo.pause(); }

    if (this.zoomState.flipAnimation) this.zoomState.flipAnimation.kill();

    // hide title
    const tlo = this.imageTitleOverlay;
    gsap.to(tlo,{opacity:0,duration:0.3,ease:"power2.out"});
    gsap.to("#imageSlideNumber span",{duration:0.4,y:-20,opacity:0,ease:"power2.out"});
    gsap.to("#imageSlideTitle h1",   {duration:0.4,y:-60,opacity:0,ease:"power2.out",
      onComplete: ()=>{ tlo.classList.remove("active"); gsap.set("#imageSlideNumber span",{y:20,opacity:0}); gsap.set("#imageSlideTitle h1",{y:60,opacity:0}); }
    });

    gsap.to(this.closeButton,{duration:0.3,opacity:0,x:40,ease:"power2.in"});
    this.controlsContainer.classList.remove("split-mode");

    // capture zoom-target rect BEFORE clearing it (needed for return flight origin)
    const zoomTarget = document.getElementById("zoomTarget");
    const ztRect = zoomTarget.getBoundingClientRect();
    zoomTarget.innerHTML = "";

    // also remove any lingering scaling overlay from the enter flight
    if (this.zoomState.scalingOverlay) { this.zoomState.scalingOverlay.remove(); this.zoomState.scalingOverlay = null; }

    // build return-flight overlay from saved zoom-target rect back to grid item
    const returnOverlay = document.createElement("div");
    returnOverlay.className = "scaling-image-overlay";

    if (selectedItemData.isVideo) {
      const returnVid = document.createElement("video");
      returnVid.src = selectedItemData.vid.src;
      returnVid.muted = true; returnVid.loop = true; returnVid.playsInline = true; returnVid.preload = "metadata";
      returnVid.style.cssText = "width:100%;height:100%;object-fit:cover;display:block;";
      returnOverlay.appendChild(returnVid);
    } else {
      const returnImg = document.createElement("img");
      returnImg.src = selectedItemData.img.src;
      returnImg.alt = selectedItemData.videoData.title || "";
      returnImg.style.cssText = "width:100%;height:100%;object-fit:cover;display:block;";
      returnOverlay.appendChild(returnImg);
    }

    document.body.appendChild(returnOverlay);
    gsap.set(returnOverlay,{left:ztRect.left,top:ztRect.top,width:ztRect.width,height:ztRect.height,opacity:1});

    gsap.to(splitContainer,{opacity:0,duration:0.8,ease:"power2.out"});

    Flip.fit(returnOverlay, selectedElement, {
      duration: 1.2, ease: this.customEase, absolute: true,
      onComplete: () => {
        // restore source element visibility
        if (selectedItemData.isVideo) gsap.set(selectedItemData.vid,{opacity:1});
        else                           gsap.set(selectedItemData.img,{opacity:1});
        returnOverlay.remove();
        splitContainer.classList.remove("active");
        document.body.classList.remove("zoom-mode");
        this.closeButton.classList.remove("active");
        if (this.draggable) this.draggable.enable();
        this.zoomState.isActive      = false;
        this.zoomState.selectedItem  = null;
        this.zoomState.flipAnimation = null;
        this.zoomState.scalingOverlay= null;
        this.zoomState.zoomedVideo   = null;
      }
    });
  }

  handleZoomKeys(e) { if (!this.zoomState.isActive) return; if (e.key==="Escape") this.exitZoomMode(); }

  // ── Bounds / Draggable ──
  calculateBounds() {
    const vw=window.innerWidth, vh=window.innerHeight;
    const {scaledWidth,scaledHeight}=this.gridDimensions;
    const mx=this.config.currentGap*this.config.currentZoom, my=mx;
    const minX=scaledWidth<=vw?(vw-scaledWidth)/2:vw-scaledWidth-mx, maxX=scaledWidth<=vw?(vw-scaledWidth)/2:mx;
    const minY=scaledHeight<=vh?(vh-scaledHeight)/2:vh-scaledHeight-my, maxY=scaledHeight<=vh?(vh-scaledHeight)/2:my;
    return{minX,maxX,minY,maxY};
  }

  initDraggable() {
    if (this.draggable) this.draggable.kill();
    this.calculateGridDimensions(this.config.currentGap);
    const bounds = this.calculateBounds();
    this.draggable = Draggable.create(this.canvasWrapper,{
      type:"x,y", bounds, edgeResistance:0.8, inertia:true,
      throwProps:{x:{velocity:"auto",resistance:300,end:v=>Math.round(v)},y:{velocity:"auto",resistance:300,end:v=>Math.round(v)}},
      onDragStart:()=>{ document.body.classList.add("dragging"); this.soundSystem.play("drag-start"); this.lastValidPosition.x=this.draggable.x; this.lastValidPosition.y=this.draggable.y; },
      onDrag:()=>{ this.lastValidPosition.x=this.draggable.x; this.lastValidPosition.y=this.draggable.y; },
      onDragEnd:()=>{ document.body.classList.remove("dragging"); this.soundSystem.play("drag-end"); }
    })[0];
  }

  handleMouseLeave() {
    if (document.body.classList.contains("dragging")) {
      document.body.classList.remove("dragging");
      gsap.to(this.canvasWrapper,{duration:0.6,x:this.lastValidPosition.x,y:this.lastValidPosition.y,ease:"power2.out"});
      if(this.draggable) this.draggable.endDrag();
    }
  }

  calculateFitZoom() {
    const vw=window.innerWidth, vh=window.innerHeight-80;
    const gap=this.calculateGapForZoom(1.0);
    const gw=this.config.cols*(this.config.itemSize+gap)-gap;
    const gh=this.config.rows*(this.config.itemSize+gap)-gap;
    return Math.max(0.1,Math.min(2.0,Math.min((vw-80)/gw,(vh-80)/gh)));
  }

  // ── Intro ──
  playIntroAnimation() {
    const vw=window.innerWidth, vh=window.innerHeight;
    const m=new DOMMatrix(getComputedStyle(this.canvasWrapper).transform);
    const cx=(vw/2-m.m41)/m.a-this.config.itemSize/2;
    const cy=(vh/2-m.m42)/m.a-this.config.itemSize/2;
    this.gridItems.forEach((d,i)=>gsap.set(d.element,{left:cx,top:cy,scale:0.8,zIndex:this.gridItems.length-i,opacity:0}));
    gsap.to(this.gridItems.map(d=>d.element),{
      duration:0.2,
      left:i=>this.gridItems[i].baseX,
      top: i=>this.gridItems[i].baseY,
      scale:1, opacity:1, ease:"power2.out",
      stagger:{amount:1.5,from:"start",grid:[this.config.rows,this.config.cols]},
      onComplete:()=>{
        this.gridItems.forEach(d=>gsap.set(d.element,{zIndex:1}));
        const pi=this.controlsContainer.querySelector(".percentage-indicator");
        const sw=this.controlsContainer.querySelector(".switch");
        const st=this.controlsContainer.querySelector(".sound-toggle");
        gsap.set(this.controlsContainer,{opacity:0});
        gsap.set(pi,{x:"-3em"}); gsap.set(sw,{y:"2em"}); gsap.set(st,{x:"3em"});
        const tl=gsap.timeline();
        tl.to(this.controlsContainer,{opacity:1,duration:0.5,ease:"power2.out"},0);
        tl.to(pi,{x:0,duration:0.2,ease:"power2.out"},0.25);
        tl.to(sw,{y:0,duration:0.2,ease:"power2.out"},0.3);
        tl.to(st,{x:0,duration:0.2,ease:"power2.out"},0.35);
        this.controlsContainer.classList.add("visible");
      }
    });
  }

  // ── Zoom controls ──
  _zoomTo(newZoom, buttonEl, duration=1.2) {
    if (this.zoomState.isActive) { this.exitZoomMode(); return; }
    const newGap=this.calculateGapForZoom(newZoom);
    const oldZoom=this.config.currentZoom;
    this.config.currentZoom=newZoom;
    this.soundSystem.play(newZoom<oldZoom?"zoom-out":"zoom-in");
    this.calculateGridDimensions(this.config.currentGap);
    const vw=window.innerWidth, vh=window.innerHeight;
    const cX=(vw-this.gridDimensions.width*oldZoom)/2;
    const cY=(vh-this.gridDimensions.height*oldZoom)/2;
    gsap.to(this.canvasWrapper,{duration:0.6,x:cX,y:cY,ease:this.centerEase,onComplete:()=>{
      if (newGap!==this.config.currentGap) {
        this.gridItems.forEach(d=>{
          const nx=d.col*(this.config.itemSize+newGap), ny=d.row*(this.config.itemSize+newGap);
          d.baseX=nx; d.baseY=ny;
          gsap.to(d.element,{duration,left:nx,top:ny,ease:this.customEase});
        });
        const nw=this.config.cols*(this.config.itemSize+newGap)-newGap;
        const nh=this.config.rows*(this.config.itemSize+newGap)-newGap;
        gsap.to(this.canvasWrapper,{duration,width:nw,height:nh,ease:this.customEase});
        this.config.currentGap=newGap;
      }
      this.calculateGridDimensions(newGap);
      const fw=this.gridDimensions.width*newZoom, fh=this.gridDimensions.height*newZoom;
      const fx=(vw-fw)/2, fy=(vh-fh)/2;
      gsap.to(this.canvasWrapper,{duration,scale:newZoom,x:fx,y:fy,ease:this.customEase,onComplete:()=>{
        this.lastValidPosition={x:fx,y:fy};
        this.calculateGridDimensions(newGap);
        this.initDraggable();
      }});
    }});
    this.updatePercentageIndicator(newZoom);
    document.querySelectorAll(".switch-button").forEach(b=>b.classList.remove("switch-button-current"));
    if (buttonEl) buttonEl.classList.add("switch-button-current");
    else {
      const btns=document.querySelectorAll(".switch-button");
      if(newZoom===0.3) btns[0].classList.add("switch-button-current");
      else if(newZoom===0.6) btns[1].classList.add("switch-button-current");
      else if(newZoom===1.0) btns[2].classList.add("switch-button-current");
    }
  }

  setZoom(z,btn=null)  { this._zoomTo(z,btn,1.2); }
  autoFitZoom(btn=null){ this._zoomTo(this.calculateFitZoom(),btn,1.2); }

  updatePercentageIndicator(z) { document.getElementById("percentageIndicator").textContent=`${Math.round(z*100)}%`; }

  resetPosition() {
    if(this.zoomState.isActive){this.exitZoomMode();return;}
    this.calculateGridDimensions(this.config.currentGap);
    const vw=window.innerWidth,vh=window.innerHeight;
    const {scaledWidth,scaledHeight}=this.gridDimensions;
    const cx=(vw-scaledWidth)/2, cy=(vh-scaledHeight)/2;
    gsap.to(this.canvasWrapper,{duration:1.0,x:cx,y:cy,ease:this.centerEase,onComplete:()=>{
      this.lastValidPosition={x:cx,y:cy}; this.initDraggable();
    }});
  }

  // ── Init ──
  init() {
    this.config.currentGap=this.calculateGapForZoom(this.config.currentZoom);
    this.generateGridItems();
    gsap.set(this.viewport,{opacity:0});
    gsap.set(this.canvasWrapper,{scale:this.config.currentZoom});
    this.calculateGridDimensions(this.config.currentGap);
    const vw=window.innerWidth,vh=window.innerHeight;
    const {scaledWidth,scaledHeight}=this.gridDimensions;
    const cx=(vw-scaledWidth)/2, cy=(vh-scaledHeight)/2;
    gsap.set(this.canvasWrapper,{x:cx,y:cy});
    this.lastValidPosition={x:cx,y:cy};
    this.updatePercentageIndicator(this.config.currentZoom);
    this.setupEventListeners();
    gsap.to(this.viewport,{duration:0.6,opacity:1,ease:"power2.inOut",onComplete:()=>{
      this.playIntroAnimation();
      gsap.to(".header",{duration:1.2,opacity:1,ease:"power2.out",delay:0.8});
      gsap.to(".footer",{duration:1.4,opacity:1,ease:"power2.out",delay:1});
      setTimeout(()=>{ this.initDraggable(); this.setupViewportObserver(); },1500);
    }});
  }

  setupEventListeners() {
    window.addEventListener("resize",()=>setTimeout(()=>{this.resetPosition();this.initDraggable();},100));
    document.addEventListener("mouseleave",()=>this.handleMouseLeave());
    this.viewport.addEventListener("mouseleave",()=>this.handleMouseLeave());
    this.closeButton.addEventListener("click",()=>this.exitZoomMode());
    this.soundToggle.addEventListener("click",()=>this.soundSystem.toggle());
    document.addEventListener("keydown",e=>{
      if(this.zoomState.isActive) return;
      if(e.key==="1") this.setZoom(0.3);
      else if(e.key==="2") this.setZoom(0.6);
      else if(e.key==="3") this.setZoom(1.0);
      else if(e.key==="f"||e.key==="F") this.autoFitZoom();
    });
  }
}

// ─────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────
let gallery;
document.addEventListener("DOMContentLoaded", () => {
  const preloader = new PreloaderManager();
  setTimeout(()=>{
    preloader.complete(()=>{
      gallery = new FashionGallery();
      gallery.init();
    });
  }, 2000);
});
</script>
