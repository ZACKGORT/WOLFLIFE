#msheet::-webkit-scrollbar{display:none;}
#msheet.on{transform:translateY(0);}
.mshandle{width:36px;height:4px;background:rgba(218,165,32,0.20);border-radius:2px;margin:12px auto 6px;}
.mshead{padding:16px 20px 12px;border-bottom:1px solid rgba(218,165,32,0.08);}
.msera{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.22em;text-transform:uppercase;color:rgba(218,165,32,0.40);margin-bottom:6px;}

.msft{display:flex;align-items:center;justify-content:flex-end;padding:10px 20px 14px;}
.msclose{background:none;border:1px solid rgba(218,165,32,0.16);color:rgba(218,165,32,0.35);width:22px;height:22px;border-radius:2px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;}

/* TIMELINE SPINE INDICATOR */
#spine-indicator{position:fixed;left:28px;top:50%;transform:translateY(-50%);z-index:100;pointer-events:none;font-family:'DM Mono',monospace;display:flex;flex-direction:column;gap:4px;align-items:flex-start;}

.spine-dot.active{background:#daa520;width:8px;border-radius:2px;}
.spine-dot:hover{background:rgba(218,165,32,0.65);}
body.light .spine-dot{background:rgba(100,60,0,0.20);}
body.light .spine-dot.active{background:rgba(100,60,0,0.80);}

// SPIRAL GEOMETRY
// Parametric: t goes 0 → 1 across all eras
// radius grows, height climbs, angle wraps 1.6x around
// ─────────────────────────────────────────────────────────
function spiralPos(t, view) {
  if (view === 'arc') {
    // Flatten to a horizontal arc
    const angle = (t - 0.5) * Math.PI * 1.2;
    const radius = 28;
    const x = Math.cos(angle) * radius;
    const y = (t - 0.5) * 8;
    const z = Math.sin(angle) * radius * 0.3;
    return new THREE.Vector3(x, y, z);
  }
  // Spiral: expands outward and climbs
  const turns = 1.65;
  const angle = t * Math.PI * 2 * turns - Math.PI * 0.5;
  const minR = 4, maxR = 28;
  const radius = minR + (maxR - minR) * Math.pow(t, 0.7);
  const height = (t - 0.5) * 22;
  return new THREE.Vector3(
    Math.cos(angle) * radius,
    height,
    Math.sin(angle) * radius
  );
}

ERAS.forEach((era, i) => {
  const t = i / (ERAS.length - 1);
  era._t = t;
  era._spiralPos = spiralPos(t, 'spiral');
  era._arcPos = spiralPos(t, 'arc');
  era._pos = era._spiralPos.clone();
});

function applyCam() {
  const { phi, theta, radius } = camState, c = scenePivot;
  cam.position.set(
    c.x + radius * Math.sin(phi) * Math.sin(theta),
    c.y + radius * Math.cos(phi),
    c.z + radius * Math.sin(phi) * Math.cos(theta)
  );
  cam.lookAt(c);
}

const nodeObjects = [], allLines = [], allLabels = [], glowSprites = [];

function makeGlowSprite(color, radius) {
  const sz = 128, c = document.createElement('canvas'); c.width = sz; c.height = sz;
  const ctx = c.getContext('2d'), cx = sz / 2, cy = sz / 2;
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, sz / 2);
  const r = (color >> 16) & 255, g = (color >> 8) & 255, b = color & 255;
  grad.addColorStop(0, `rgba(${r},${g},${b},0.60)`);
  grad.addColorStop(0.4, `rgba(${r},${g},${b},0.18)`);
  grad.addColorStop(0.8, `rgba(${r},${g},${b},0.04)`);
  grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
  ctx.fillStyle = grad; ctx.fillRect(0, 0, sz, sz);
  const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(c), transparent: true, depthWrite: false, blending: THREE.AdditiveBlending }));
  spr.scale.set(radius * 6, radius * 6, 1);
  return spr;
}

function makeLabelCanvas(text, color, fs) {
  const c = document.createElement('canvas'); c.width = 640; c.height = 64;
  const ctx = c.getContext('2d');
  ctx.fillStyle = color;
  ctx.font = `400 ${fs * 2.2}px "DM Mono", monospace`;
  ctx.fillText(text.toUpperCase(), 10, 42);
  return c;
}

function addLabel(text, pos, dkColor, fs) {
  const c = makeLabelCanvas(text, dkColor, fs);
  const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(c), transparent: true, depthWrite: false }));
  spr.position.copy(pos).add(new THREE.Vector3(0.6, 0.5, 0));
  spr.scale.set(11, 1.1, 1);
  scene.add(spr);
  allLabels.push({ spr, text, darkColor: dkColor, fs });
  return spr;
}

function redrawLabels() {
  allLabels.forEach(({ spr, text, darkColor, fs }) => {
    const color = isLight ? 'rgba(60,30,0,0.65)' : darkColor;
    const c = makeLabelCanvas(text, color, fs);
    spr.material.map.dispose();
    spr.material.map = new THREE.CanvasTexture(c);
    spr.material.needsUpdate = true;
  });
}

// Build the spiral tube
function buildSpiralTube() {
  const pts = ERAS.map(e => e._spiralPos.clone());
  const curve = new THREE.CatmullRomCurve3(pts);
  const tubePts = curve.getPoints(200);
  const tubeMat = new THREE.LineBasicMaterial({ color: 0xdaa520, transparent: true, opacity: 0.08 });
  const tube = new THREE.Line(new THREE.BufferGeometry().setFromPoints(tubePts), tubeMat);
  scene.add(tube);
  allLines.push({ line: tube, darkOp: 0.08, lightOp: 0.20, darkColor: 0xdaa520, lightColor: 0x5a3000 });

  // Inner ghost tube (thinner, different opacity)
  const innerMat = new THREE.LineBasicMaterial({ color: 0xb87333, transparent: true, opacity: 0.04 });
  const inner = new THREE.Line(new THREE.BufferGeometry().setFromPoints(tubePts), innerMat);
  scene.add(inner);
  allLines.push({ line: inner, darkOp: 0.04, lightOp: 0.12, darkColor: 0xb87333, lightColor: 0x5a3000 });
}

function buildScene() {
  buildSpiralTube();

  // Year axis spine — a faint vertical line at center
  const spinePts = [new THREE.Vector3(0, -14, 0), new THREE.Vector3(0, 14, 0)];
  const spineMat = new THREE.LineBasicMaterial({ color: 0xdaa520, transparent: true, opacity: 0.04 });
  const spine = new THREE.Line(new THREE.BufferGeometry().setFromPoints(spinePts), spineMat);
  scene.add(spine);
  allLines.push({ line: spine, darkOp: 0.04, lightOp: 0.10, darkColor: 0xdaa520, lightColor: 0x5a3000 });

  ERAS.forEach((era, i) => {
    const pos = era._spiralPos;
    const nodeSize = era.id === 'now' ? 0.30 : 0.16 + era._t * 0.08;

    // Spoke from center axis to node
    const spokeY = new THREE.Vector3(0, pos.y, 0);
    const spokeMat = new THREE.LineBasicMaterial({ color: era.color, transparent: true, opacity: 0.06 });
    const spoke = new THREE.Line(new THREE.BufferGeometry().setFromPoints([spokeY, pos.clone()]), spokeMat);
    scene.add(spoke);
    allLines.push({ line: spoke, darkOp: 0.06, lightOp: 0.18, darkColor: era.color, lightColor: 0x5a3000 });

    // Node mesh
    const geo = new THREE.SphereGeometry(nodeSize, 16, 16);
    const mat = new THREE.MeshPhysicalMaterial({
      color: era.color,
      emissive: era.color,
      emissiveIntensity: era.id === 'now' ? 2.4 : 1.3,
      metalness: 0.3,
      roughness: 0.08,
      clearcoat: 1.0,
      transparent: true,
      opacity: 0.92
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(pos);
    mesh.userData = { era, origColor: era.color, origEI: era.id === 'now' ? 2.4 : 1.3 };
    scene.add(mesh);
    nodeObjects.push({ mesh, era });

    // Glow
    const gs = makeGlowSprite(era.color, nodeSize);
    gs.position.copy(pos);
    gs.material.opacity = 0.65;
    scene.add(gs);
    glowSprites.push(gs);

    // Label
    const shortTitle = era.title.length > 28 ? era.title.slice(0, 26) + '…' : era.title;
    addLabel(shortTitle, pos, era.hex + 'bb', 6.5);

    // Year marker near spine
    const yearPos = new THREE.Vector3(-0.8, pos.y, 0);
    addLabel(era.year, yearPos, 'rgba(218,165,32,0.35)', 5.5);
  });

  // Connection lines between consecutive eras
  for (let i = 0; i < ERAS.length - 1; i++) {
    const a = ERAS[i], b = ERAS[i + 1];
    const mid = a._spiralPos.clone().add(b._spiralPos).multiplyScalar(0.5);
    mid.y += 0.5;
    const pts = new THREE.QuadraticBezierCurve3(a._spiralPos, mid, b._spiralPos).getPoints(24);
    const connMat = new THREE.LineBasicMaterial({ color: 0xdaa520, transparent: true, opacity: 0.22 });
    const conn = new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), connMat);
    scene.add(conn);
    allLines.push({ line: conn, darkOp: 0.22, lightOp: 0.40, darkColor: 0xdaa520, lightColor: 0x5a3000 });
  }
}
buildScene();

// FOCUS
// ─────────────────────────────────────────────────────────
let isFocused = false;

function focusEra(era) {
  isFocused = true;
  focusedEra = era;
  scenePivotTgt.copy(era._pos);
  camTarget.radius = 20;
  camTarget.phi = Math.PI * 0.22;
  openPanel(era);
  highlightConnections(era);
}

function highlightConnections(era) {
  const idx = ERAS.findIndex(e => e.id === era.id);
  nodeObjects.forEach(({ mesh, era: n }, i) => {
    const near = Math.abs(i - idx) <= 2;
    mesh.material.opacity = near ? 0.96 : 0.18;
    mesh.material.emissiveIntensity = near ? (mesh.userData.origEI * 1.5) : 0.1;
  });
  allLines.forEach(({ line, darkOp }) => {
    line.material.opacity = darkOp * 0.3;
  });
}

function resetHighlights() {
  nodeObjects.forEach(({ mesh }) => {
    mesh.material.opacity = 0.92;
    mesh.material.emissiveIntensity = mesh.userData.origEI;
  });
  allLines.forEach(({ line, darkOp, lightOp }) => {
    line.material.opacity = isLight ? lightOp : darkOp;
  });
}

const tooltip = document.getElementById('tooltip');
let hoveredMesh = null, mouse = new THREE.Vector2();
let drag = false, lastDragX = 0, lastDragY = 0, isDragging = false;
let hintFaded = false, orbitPaused = false;
let lastXY = { x: 0, y: 0 };

function posTooltip(cx, cy) {
  tooltip.style.transform = `translate(${cx + 18}px,${cy - 10}px)`;
}

function checkHover() {
  raycaster.setFromCamera(mouse, cam);
  const hits = raycaster.intersectObjects(nodeObjects.map(o => o.mesh));
  if (hits.length) {
    const hit = hits[0].object;
    const obj = nodeObjects.find(o => o.mesh === hit);
    if (obj && hoveredMesh !== hit) {
      hoveredMesh = hit;
      const e = obj.era;
      document.getElementById('tt-era').textContent = e.era;
      document.getElementById('tt-title').textContent = e.title;
      document.getElementById('tt-title').style.color = isLight ? '#2a1000' : '#f5ecd5';
      document.getElementById('tt-role').textContent = e.role;
      tooltip.classList.add('vis');
    }
    document.body.style.cursor = 'pointer';
  } else {
    if (hoveredMesh) { hoveredMesh = null; tooltip.classList.remove('vis'); }
    document.body.style.cursor = 'default';
  }
}

cvs.addEventListener('pointerdown', e => {
  if (e.button === 2) return;
  isDragging = false; drag = false;
  lastDragX = e.clientX; lastDragY = e.clientY;
  cvs.setPointerCapture(e.pointerId);
});

cvs.addEventListener('pointermove', e => {
  const rect = cvs.getBoundingClientRect();
  mouse.x = (e.clientX - rect.left) / rect.width * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  lastXY = { x: e.clientX, y: e.clientY };
  posTooltip(e.clientX, e.clientY);
  if (e.buttons && e.button !== 2) {
    isDragging = true; drag = true;
    camTarget.theta -= (e.clientX - lastDragX) * 0.005;
    camTarget.phi = Math.max(0.04, Math.min(Math.PI * 0.48, camTarget.phi + (e.clientY - lastDragY) * 0.005));
    lastDragX = e.clientX; lastDragY = e.clientY;
  } else {
    checkHover();
  }
});

cvs.addEventListener('pointerup', e => {
  if (e.button === 2) return;
  if (!drag) {
    raycaster.setFromCamera(mouse, cam);
    const hits = raycaster.intersectObjects(nodeObjects.map(o => o.mesh));
    if (hits.length) {
      const obj = nodeObjects.find(o => o.mesh === hits[0].object);
      if (obj) focusEra(obj.era);
    } else if (isFocused) {
      closePanel();
    }
  }
  if (!hintFaded) { document.getElementById('hint').style.opacity = '0.05'; hintFaded = true; }
});

cvs.addEventListener('wheel', e => {
  camTarget.radius = Math.max(10, Math.min(130, camTarget.radius + e.deltaY * 0.06));
}, { passive: true });

cvs.addEventListener('contextmenu', e => { e.preventDefault(); orbitPaused = !orbitPaused; });

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closePanel(); }
  if (e.code === 'Space') { e.preventDefault(); orbitPaused = !orbitPaused; }
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    if (focusedEra) {
      const idx = ERAS.findIndex(er => er.id === focusedEra.id);
      if (idx < ERAS.length - 1) focusEra(ERAS[idx + 1]);
    }
  }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    if (focusedEra) {
      const idx = ERAS.findIndex(er => er.id === focusedEra.id);
      if (idx > 0) focusEra(ERAS[idx - 1]);
    }
  }
});

function applyTheme() {
  document.body.classList.toggle('light', isLight);

  allLines.forEach(({ line, darkColor, lightColor, darkOp, lightOp }) => {
    line.material.color.setHex(isLight ? (lightColor || 0x5a3000) : darkColor);
    line.material.opacity = isLight ? lightOp : darkOp;
  });
  nodeObjects.forEach(({ mesh }) => {
    if (isLight) {
      mesh.material.color.setHex(0x3a1a00);
      mesh.material.emissive.setHex(0x000000);
      mesh.material.emissiveIntensity = 0;
      mesh.material.metalness = 0.1;
      mesh.material.roughness = 0.6;
    } else {
      const ud = mesh.userData;
      mesh.material.color.setHex(ud.origColor);
      mesh.material.emissive.setHex(ud.origColor);
      mesh.material.emissiveIntensity = ud.origEI;
      mesh.material.metalness = 0.3;
      mesh.material.roughness = 0.08;
    }
  });
  glowSprites.forEach(gs => { gs.visible = !isLight; });
  gold1.intensity = isLight ? 0 : 5;
  gold2.intensity = isLight ? 0 : 4;
  warmTop.intensity = isLight ? 0 : 3;
  ambLight.intensity = isLight ? 1.1 : 0.12;
  pMat.opacity = isLight ? 0 : 0.12;
  scene.fog.color.setHex(isLight ? 0xf5f1ea : 0x000000);
  renderer.setClearColor(isLight ? 0xf5f1ea : 0x000000, 0);
  redrawLabels();
  drawMesh();
}

const bgCanvas = document.getElementById('bg-mesh'), bgCtx = bgCanvas.getContext('2d');
function resizeBg() { bgCanvas.width = innerWidth; bgCanvas.height = innerHeight; } resizeBg();
const BD = [
  { x: 0.12, y: 0.22, vx: 0.00007, vy: 0.00005, r: 0.65, col: [60, 30, 5] },
  { x: 0.78, y: 0.70, vx: -0.00005, vy: 0.00007, r: 0.55, col: [50, 20, 2] },
  { x: 0.85, y: 0.15, vx: -0.00006, vy: -0.00006, r: 0.45, col: [80, 45, 8] },
  { x: 0.20, y: 0.82, vx: 0.00006, vy: -0.00005, r: 0.50, col: [40, 15, 2] },
];
const BL = [
  { x: 0.12, y: 0.22, vx: 0.00007, vy: 0.00005, r: 0.65, col: [220, 200, 170] },
  { x: 0.78, y: 0.70, vx: -0.00005, vy: 0.00007, r: 0.55, col: [210, 185, 150] },
  { x: 0.85, y: 0.15, vx: -0.00006, vy: -0.00006, r: 0.45, col: [230, 215, 185] },
  { x: 0.20, y: 0.82, vx: 0.00006, vy: -0.00005, r: 0.50, col: [215, 195, 165] },
];
function drawMesh() {
  const w = bgCanvas.width, h = bgCanvas.height;
  bgCtx.clearRect(0, 0, w, h);
  const blobs = isLight ? BL : BD;
  bgCtx.fillStyle = isLight ? '#f5f1ea' : '#05030a';
  bgCtx.fillRect(0, 0, w, h);
  blobs.forEach(b => {
    const cx = b.x * w, cy = b.y * h, rad = Math.max(w, h) * b.r;
    const grd = bgCtx.createRadialGradient(cx, cy, 0, cx, cy, rad);
    const [r, g, bl] = b.col;
    grd.addColorStop(0, `rgba(${r},${g},${bl},${isLight ? 0.40 : 0.55})`);
    grd.addColorStop(0.5, `rgba(${r},${g},${bl},${isLight ? 0.12 : 0.14})`);
    grd.addColorStop(1, `rgba(${r},${g},${bl},0)`);
    bgCtx.fillStyle = grd; bgCtx.fillRect(0, 0, w, h);
  });
  const vig = bgCtx.createRadialGradient(w / 2, h / 2, h * 0.3, w / 2, h / 2, h * 0.9);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, isLight ? 'rgba(30,10,0,0.07)' : 'rgba(0,0,0,0.72)');
  bgCtx.fillStyle = vig; bgCtx.fillRect(0, 0, w, h);
}
let meshT = 0;
function tickMesh() {
  meshT++;
  [...BD, ...BL].forEach(b => {
    b.x += b.vx; b.y += b.vy;
    if (b.x < 0 || b.x > 1) b.vx *= -1;
    if (b.y < 0 || b.y > 1) b.vy *= -1;
  });
  if (meshT % 3 === 0) drawMesh();
  requestAnimationFrame(tickMesh);
}
drawMesh(); tickMesh();

// ─────────────────────────────────────────────────────────
// NODE MORPH (spiral ↔ arc)
// ─────────────────────────────────────────────────────────
function tickMorph() {
  if (!morphing) return;
  morphT = Math.min(morphT + 0.04, 1);
  const ease = morphT < 0.5 ? 2 * morphT * morphT : 1 - Math.pow(-2 * morphT + 2, 2) / 2;
  nodeObjects.forEach(({ mesh, era }) => {
    const from = currentView === 'arc' ? era._spiralPos : era._arcPos;
    const to = currentView === 'arc' ? era._arcPos : era._spiralPos;
    mesh.position.lerpVectors(from, to, ease);
    era._pos.copy(mesh.position);
    // Move glow sprites too
    const gsi = ERAS.indexOf(era);
    if (glowSprites[gsi]) glowSprites[gsi].position.copy(mesh.position);
    // Move labels
    if (allLabels[gsi]) allLabels[gsi].spr.position.set(mesh.position.x + 0.6, mesh.position.y + 0.5, mesh.position.z);
  });
  if (morphT >= 1) morphing = false;
}

// ─────────────────────────────────────────────────────────
// ANIMATE
// ─────────────────────────────────────────────────────────
let lastTime = 0, elapsed = 0;

function animate(ts) {
  requestAnimationFrame(animate);
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts; elapsed += dt;

  // Smooth camera
  camState.phi += (camTarget.phi - camState.phi) * 0.08;
  camState.theta += (camTarget.theta - camState.theta) * 0.08;
  camState.radius += (camTarget.radius - camState.radius) * 0.08;
  scenePivot.lerp(scenePivotTgt, 0.08);

  // Auto-orbit when not focused
  if (!isFocused && !isDragging && !orbitPaused) {
    camTarget.theta += dt * 0.015;
  }

  // Node pulse
  if (!isFocused) {
    nodeObjects.forEach(({ mesh, era }, i) => {
      const pulse = 1 + Math.sin(elapsed * 0.7 + era._t * Math.PI * 2) * 0.025;
      mesh.scale.setScalar(pulse);
    });
  }

  // Particles
  const pa = pGeo.attributes.position.array;
  for (let i = 0; i < PC; i++) {
    pa[i * 3 + 1] = pOrig[i * 3 + 1] + Math.sin(elapsed * pSp[i] + pPh[i]) * 0.35;
  }
  pGeo.attributes.position.needsUpdate = true;

  // Morph
  tickMorph();

  // Gold light pulse
  gold1.intensity = (isLight ? 0 : 5) + Math.sin(elapsed * 0.8) * 0.5;
  gold2.intensity = (isLight ? 0 : 4) + Math.sin(elapsed * 0.6 + 1.2) * 0.4;

  applyCam();
  renderer.render(scene, cam);
  isDragging = false;
}
requestAnimationFrame(animate);

window.addEventListener('resize', () => {
  cam.aspect = innerWidth / innerHeight;
  cam.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  resizeBg(); drawMesh();
});
</script>
</body>
