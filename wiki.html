<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Three-Body Problem · Spatial Knowledge Surface</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#030308;transition:background 0.6s;}
body.light{background:#f0ece4;}
#bg-mesh{position:fixed;inset:0;z-index:0;pointer-events:none;}
canvas{display:block;width:100vw;height:100vh;position:relative;z-index:1;}
#brand{position:fixed;top:24px;left:28px;z-index:100;pointer-events:none;font-family:'DM Mono',monospace;}
#brand-name{font-size:10px;letter-spacing:0.26em;text-transform:uppercase;color:rgba(180,210,255,0.65);transition:color 0.5s;}
#brand-sub{font-size:7.5px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(180,210,255,0.24);margin-top:5px;transition:color 0.5s;}
body.light #brand-name{color:rgba(10,14,30,0.72);}
body.light #brand-sub{color:rgba(10,14,30,0.34);}
#hud{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);display:flex;gap:1px;background:rgba(180,210,255,0.03);border:1px solid rgba(180,210,255,0.10);border-radius:4px;overflow:hidden;z-index:100;transition:background 0.5s,border-color 0.5s;}
.hud-btn{background:none;border:none;cursor:pointer;color:rgba(180,210,255,0.32);font-family:'DM Mono',monospace;font-size:8px;letter-spacing:0.18em;text-transform:uppercase;padding:9px 18px;border-right:1px solid rgba(180,210,255,0.08);transition:color 0.2s,background 0.2s;}
.hud-btn:last-child{border-right:none;}
.hud-btn:hover{color:rgba(180,210,255,0.75);background:rgba(180,210,255,0.05);}
.hud-btn.active{color:#b4d2ff;background:rgba(180,210,255,0.08);}
body.light #hud{background:rgba(10,14,30,0.04);border-color:rgba(10,14,30,0.16);}
body.light .hud-btn{color:rgba(10,14,30,0.36);border-right-color:rgba(10,14,30,0.10);}
body.light .hud-btn:hover{color:rgba(10,14,30,0.80);background:rgba(10,14,30,0.06);}
body.light .hud-btn.active{color:#0a0e1e;background:rgba(10,14,30,0.10);}
#hint{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.16em;text-transform:uppercase;color:rgba(180,210,255,0.14);z-index:100;pointer-events:none;white-space:nowrap;transition:opacity 1.2s,color 0.5s;}
#focus-hint{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.22em;text-transform:uppercase;color:rgba(180,210,255,0.24);z-index:100;pointer-events:none;white-space:nowrap;opacity:0;transition:opacity 0.5s;}
#focus-hint.vis{opacity:1;}
body.light #hint{color:rgba(10,14,30,0.22);}
body.light #focus-hint{color:rgba(10,14,30,0.32);}
#theme-toggle{position:fixed;top:24px;left:50%;transform:translateX(-50%);z-index:100;background:none;border:1px solid rgba(180,210,255,0.14);color:rgba(180,210,255,0.28);font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.20em;text-transform:uppercase;padding:6px 14px;border-radius:2px;cursor:pointer;transition:all 0.2s;}
#theme-toggle:hover{color:rgba(180,210,255,0.65);border-color:rgba(180,210,255,0.38);}
body.light #theme-toggle{border-color:rgba(10,14,30,0.20);color:rgba(10,14,30,0.40);}
body.light #theme-toggle:hover{color:rgba(10,14,30,0.78);border-color:rgba(10,14,30,0.55);}
#tooltip{position:fixed;top:0;left:0;pointer-events:none;opacity:0;transition:opacity 0.15s;z-index:200;}
#tooltip.vis{opacity:1;}
#tt-inner{background:rgba(4,6,14,0.96);border:1px solid rgba(180,210,255,0.14);border-radius:4px;padding:12px 16px;backdrop-filter:blur(12px);max-width:240px;}
.tt-ring{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(180,210,255,0.32);margin-bottom:5px;}
.tt-title{font-family:'DM Serif Display',serif;font-size:15px;color:#dcecff;line-height:1.2;margin-bottom:5px;letter-spacing:-0.01em;}
.tt-type{font-family:'DM Mono',monospace;font-size:6.5px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(180,210,255,0.40);}
body.light #tt-inner{background:rgba(240,236,228,0.98);border-color:rgba(10,14,30,0.20);box-shadow:2px 3px 0 rgba(10,14,30,0.10);}
body.light .tt-ring{color:rgba(10,14,30,0.40);}
body.light .tt-title{color:#0a0e1e;}
body.light .tt-type{color:rgba(10,14,30,0.45);}
#ghost{position:fixed;z-index:700;width:320px;pointer-events:none;opacity:0;right:28px;top:50%;transform:translateY(-50%) translateX(18px) scale(0.97);transition:opacity 0.30s,transform 0.30s,width 0.30s;}
#ghost.on{opacity:1;transform:translateY(-50%) translateX(0) scale(1);pointer-events:all;}
#ghost.expanded{width:520px;}
#ghost.expanded .gcbody{font-size:12.5px;line-height:2.0;}
#ghost.expanded .gctitle{font-size:20px;}
#ghost.expanded .gcscroll{max-height:88vh;}
#ghost.expanded .gc-moons{columns:2;column-gap:12px;}
.gcexpand{background:none;border:1px solid rgba(180,210,255,0.14);color:rgba(180,210,255,0.30);width:22px;height:22px;border-radius:2px;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;transition:all 0.2s;pointer-events:all;margin-right:6px;}
.gcexpand:hover{color:#dcecff;border-color:rgba(180,210,255,0.45);}
body.light .gcexpand{border-color:rgba(10,14,30,0.20);color:rgba(10,14,30,0.38);}
body.light .gcexpand:hover{color:#0a0e1e;border-color:rgba(10,14,30,0.65);}
.gc-moons{padding:10px 16px 12px;border-bottom:1px solid rgba(180,210,255,0.06);}
.gc-moon-label{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.22em;text-transform:uppercase;color:rgba(180,210,255,0.22);margin-bottom:8px;}
.gc-moon-item{display:flex;align-items:flex-start;gap:7px;margin-bottom:7px;break-inside:avoid;}
.gc-moon-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:4px;opacity:0.7;}
.gc-moon-text{font-family:'DM Mono',monospace;font-size:9px;line-height:1.65;color:rgba(180,210,255,0.45);}
.gc-moon-tag{font-family:'DM Mono',monospace;font-size:6.5px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(180,210,255,0.22);display:block;margin-top:1px;}
body.light .gc-moons{border-color:rgba(10,14,30,0.10);}
body.light .gc-moon-label{color:rgba(10,14,30,0.30);}
body.light .gc-moon-text{color:rgba(10,14,30,0.55);}
body.light .gc-moon-tag{color:rgba(10,14,30,0.32);}
.gc{background:rgba(4,6,18,0.97);border:1px solid rgba(180,210,255,0.10);border-radius:6px;box-shadow:0 18px 62px rgba(0,0,0,0.9),0 0 0 1px rgba(180,210,255,0.03);backdrop-filter:blur(26px);overflow:hidden;}
.gcscroll{max-height:82vh;overflow-y:auto;scrollbar-width:none;}
.gcscroll::-webkit-scrollbar{display:none;}
.gcbar{height:2px;width:100%;transition:background 0.4s;}
.gchead{padding:16px 16px 12px;border-bottom:1px solid rgba(180,210,255,0.06);}
.gcring{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.22em;text-transform:uppercase;color:rgba(180,210,255,0.28);margin-bottom:6px;}
.gctitle{font-family:'DM Serif Display',serif;font-size:17px;letter-spacing:-0.02em;color:#dcecff;line-height:1.2;margin-bottom:5px;}
.gcrole{font-family:'DM Mono',monospace;font-size:7.5px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(180,210,255,0.30);}
.gcbody{padding:14px 16px 14px;font-family:'DM Mono',monospace;font-size:11px;line-height:1.88;color:rgba(180,210,255,0.52);border-bottom:1px solid rgba(180,210,255,0.06);}
.gcstat{display:flex;border-bottom:1px solid rgba(180,210,255,0.06);}
.gcst{flex:1;padding:10px 12px;border-right:1px solid rgba(180,210,255,0.06);text-align:center;}
.gcst:last-child{border-right:none;}
.gcsv{font-family:'DM Serif Display',serif;font-size:14px;color:rgba(180,210,255,0.72);display:block;letter-spacing:-0.01em;}
.gcsk{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(180,210,255,0.22);display:block;margin-top:2px;}
.gc-connections{padding:12px 16px;border-bottom:1px solid rgba(180,210,255,0.06);}
.gc-conn-label{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.22em;text-transform:uppercase;color:rgba(180,210,255,0.22);margin-bottom:8px;}
.gc-conn-item{display:flex;align-items:center;gap:8px;margin-bottom:6px;cursor:pointer;padding:4px 6px;border-radius:3px;transition:background 0.15s;}
.gc-conn-item:hover{background:rgba(180,210,255,0.05);}
.gc-conn-type{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.14em;text-transform:uppercase;padding:2px 7px;border-radius:8px;border:1px solid currentColor;opacity:0.7;white-space:nowrap;}
.gc-conn-target{font-family:'DM Mono',monospace;font-size:10px;color:rgba(180,210,255,0.55);flex:1;}
.gcft{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 12px;}
.gctag{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.16em;text-transform:uppercase;padding:3px 9px;border-radius:9px;border:1px solid currentColor;opacity:0.55;}
.gcclose{background:none;border:1px solid rgba(180,210,255,0.14);color:rgba(180,210,255,0.30);width:22px;height:22px;border-radius:2px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;transition:all 0.2s;pointer-events:all;}
.gcclose:hover{color:#dcecff;border-color:rgba(180,210,255,0.45);}
body.light .gc{background:rgba(240,236,228,0.99);border-color:rgba(10,14,30,0.18);box-shadow:3px 4px 0 rgba(10,14,30,0.10),0 0 0 1px rgba(10,14,30,0.06);}
body.light .gchead,body.light .gcbody,body.light .gcstat,body.light .gcst,body.light .gc-connections{border-color:rgba(10,14,30,0.10);}
body.light .gcring{color:rgba(10,14,30,0.38);}
body.light .gctitle{color:#0a0e1e;}
body.light .gcrole{color:rgba(10,14,30,0.44);}
body.light .gcbody{color:rgba(10,14,30,0.62);}
body.light .gcsv{color:rgba(10,14,30,0.82);}
body.light .gcsk{color:rgba(10,14,30,0.32);}
body.light .gc-conn-label{color:rgba(10,14,30,0.30);}
body.light .gc-conn-target{color:rgba(10,14,30,0.58);}
body.light .gc-conn-item:hover{background:rgba(10,14,30,0.04);}
body.light .gcclose{border-color:rgba(10,14,30,0.20);color:rgba(10,14,30,0.38);}
body.light .gcclose:hover{color:#0a0e1e;border-color:rgba(10,14,30,0.65);}
#legend{position:fixed;top:24px;right:28px;z-index:100;font-family:'DM Mono',monospace;pointer-events:none;}
.leg-title{font-size:7px;letter-spacing:0.22em;text-transform:uppercase;color:rgba(180,210,255,0.22);margin-bottom:8px;transition:color 0.5s;}
.leg-item{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.leg-line{width:22px;height:1px;}
.leg-label{font-size:7px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(180,210,255,0.30);transition:color 0.5s;}
body.light .leg-title{color:rgba(10,14,30,0.30);}
body.light .leg-label{color:rgba(10,14,30,0.48);}
#msheet{display:none;position:fixed;bottom:0;left:0;right:0;z-index:700;background:rgba(4,6,18,0.98);border-top:1px solid rgba(180,210,255,0.08);border-radius:14px 14px 0 0;max-height:72vh;overflow-y:auto;scrollbar-width:none;transform:translateY(100%);transition:transform 0.38s cubic-bezier(0.22,1,0.36,1);backdrop-filter:blur(28px);}
#msheet::-webkit-scrollbar{display:none;}
#msheet.on{transform:translateY(0);}
.mshandle{width:36px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;margin:12px auto 6px;}
.msbar{height:2px;width:100%;transition:background 0.4s;}
.mshead{padding:16px 20px 12px;border-bottom:1px solid rgba(180,210,255,0.06);}
.msring{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.22em;text-transform:uppercase;color:rgba(180,210,255,0.28);margin-bottom:6px;}
.mstitle{font-family:'DM Serif Display',serif;font-size:20px;letter-spacing:-0.02em;color:#dcecff;line-height:1.15;margin-bottom:4px;}
.msbody{padding:13px 20px 14px;font-family:'DM Mono',monospace;font-size:11.5px;line-height:1.82;color:rgba(180,210,255,0.52);}
.msft{display:flex;align-items:center;justify-content:space-between;padding:10px 20px 14px;}
.mstag{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.16em;text-transform:uppercase;padding:3px 9px;border-radius:9px;border:1px solid currentColor;opacity:0.55;}
.msclose{background:none;border:1px solid rgba(180,210,255,0.14);color:rgba(180,210,255,0.30);width:22px;height:22px;border-radius:2px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;transition:all 0.2s;}
.msclose:hover{color:#dcecff;border-color:rgba(180,210,255,0.45);}
body.light #msheet{background:rgba(240,236,228,0.99);border-top-color:rgba(10,14,30,0.14);}
body.light .mshandle{background:rgba(10,14,30,0.18);}
body.light .msring{color:rgba(10,14,30,0.38);}
body.light .mstitle{color:#0a0e1e;}
body.light .msbody{color:rgba(10,14,30,0.62);}
body.light .msclose{border-color:rgba(10,14,30,0.20);color:rgba(10,14,30,0.38);}
body.light .msclose:hover{color:#0a0e1e;border-color:rgba(10,14,30,0.65);}
body.light .mshead{border-bottom-color:rgba(10,14,30,0.10);}
@media(max-width:768px){#ghost{display:none;}#legend{display:none;}#msheet{display:block;}}
</style>

<body>
<canvas id="bg-mesh"></canvas>
<canvas id="canvas"></canvas>
<div id="brand">
  <div id="brand-name">Three-Body Problem</div>
  <div id="brand-sub">Spatial Knowledge Surface · Prototype I</div>
</div>
<button id="theme-toggle">Light</button>
<div id="legend">
  <div class="leg-title">Connections</div>
  <div class="leg-item"><div class="leg-line" style="background:rgba(74,138,220,0.75);"></div><div class="leg-label" style="color:rgba(74,138,220,0.80);">Preceded</div></div>
  <div class="leg-item"><div class="leg-line" style="background:rgba(154,112,204,0.75);"></div><div class="leg-label" style="color:rgba(154,112,204,0.80);">Same Structure</div></div>
  <div class="leg-item"><div class="leg-line" style="background:rgba(80,216,176,0.75);"></div><div class="leg-label" style="color:rgba(80,216,176,0.80);">Enabled</div></div>
  <div class="leg-item"><div class="leg-line" style="border-top:1px dashed rgba(216,176,80,0.70);height:0;"></div><div class="leg-label" style="color:rgba(216,176,80,0.75);">Lives In</div></div>
</div>
<div id="hud">
  <button class="hud-btn" data-view="iso">ISO</button>
  <button class="hud-btn active" data-view="top">SKY</button>
  <button class="hud-btn" data-view="side">ORBIT</button>
</div>
<div id="hint">drag to orbit · scroll to zoom · click any node</div>
<div id="focus-hint">— right-click or space to pause · esc to release —</div>
<div id="tooltip"><div id="tt-inner">
  <div class="tt-ring" id="tt-ring"></div>
  <div class="tt-title" id="tt-title"></div>
  <div class="tt-type" id="tt-type"></div>
</div></div>
<div id="ghost"><div class="gc">
  <div class="gcbar" id="gc-bar"></div>
  <div class="gcscroll">
    <div class="gchead">
      <div class="gcring" id="gc-ring"></div>
      <div class="gctitle" id="gc-title"></div>
      <div class="gcrole" id="gc-role"></div>
    </div>
    <div class="gcbody" id="gc-body"></div>
    <div class="gcstat">
      <div class="gcst"><span class="gcsv" id="gc-ring-v"></span><span class="gcsk">Ring</span></div>
      <div class="gcst"><span class="gcsv" id="gc-domain"></span><span class="gcsk">Domain</span></div>
    </div>
    <div class="gc-connections" id="gc-connections"></div>
    <div class="gc-moons" id="gc-moons" style="display:none"></div>
    <div class="gcft">
      <span class="gctag" id="gc-tag"></span>
      <div style="display:flex;align-items:center;">
        <button class="gcexpand" id="gc-expand" title="Expand panel">⤢</button>
        <button class="gcclose" onclick="closePanel()">✕</button>
      </div>
    </div>
  </div>
</div></div>
<div id="msheet">
  <div class="mshandle"></div>
  <div class="msbar" id="ms-bar"></div>

    <div class="msring" id="ms-ring"></div>
    <div class="mstitle" id="ms-title"></div>
  </div>
  <div class="msbody" id="ms-body"></div>
  <div class="msft">
    <span class="mstag" id="ms-tag"></span>
    <button class="msclose" onclick="closePanel()">✕</button>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── State variables declared first to avoid ReferenceError ──────────────────
let isFocused = false;
let focusNode = null;
let isLight = false;

const DOMAIN_CFG={
  statement:{color:0xf0f4ff,lightColor:0x0a0e1e,size:0.36,label:'Statement',hex:'#f0f4ff',lightHex:'#0a0e1e'},
  formalism:{color:0x4a8adc,lightColor:0x1a3a6c,size:0.14,label:'Formalism',hex:'#4a8adc',lightHex:'#1a3a6c'},
  history:  {color:0x9a70cc,lightColor:0x4a2880,size:0.13,label:'History',  hex:'#9a70cc',lightHex:'#4a2880'},
  analogue: {color:0x50d8b0,lightColor:0x0a6048,size:0.13,label:'Analogue', hex:'#50d8b0',lightHex:'#0a6048'},
  cultural: {color:0xd8b050,lightColor:0x7a5c08,size:0.12,label:'Cultural', hex:'#d8b050',lightHex:'#7a5c08'},
};
const dcfg=d=>DOMAIN_CFG[d]||DOMAIN_CFG.formalism;
const dhex=d=>isLight?dcfg(d).lightHex:dcfg(d).hex;

const NODES=[
  {id:'problem',tier:'center',angle:0,domain:'statement',title:'Three bodies, no formula',role:'The Problem Statement',era:'Statement',
   body:'Three gravitating bodies produce motion that cannot be predicted analytically. This is not a gap in human knowledge — it is a structural property of the system. Add one body to a solvable problem, and solvability disappears.',
   moons:[
     {text:'First posed by Isaac Newton in Principia Mathematica, 1687',tag:'origin'},
     {text:'König Oscar II of Sweden offered a prize in 1887 for its solution — which Poincaré won by finding it unsolvable',tag:'prize'},
     {text:'The two-body problem is exactly solvable; three bodies destroys this property permanently',tag:'contrast'},
   ]},
  {id:'newton',tier:'inner',angle:0.04,domain:'formalism',title:"Newton's equations of motion",role:'Mathematical Foundation',era:'Ring 1 · Formalism',
   body:"Each body exerts a gravitational force on every other. F = Gm₁m₂/r². In two bodies, the forces balance into solvable conic sections. In three, the forces interact recursively — each position depends on all others simultaneously.",
   moons:[
     {text:'Published in Principia Mathematica (1687) as a set of geometric proofs, not the algebraic form used today',tag:'history'},
     {text:"Newton himself struggled with the Moon's motion — an early three-body problem (Sun–Earth–Moon)",tag:'struggle'},
     {text:"The inverse-square law was partly inferred from Kepler's third law, not derived from first principles",tag:'derivation'},
   ]},
  {id:'hamilton',tier:'inner',angle:0.20,domain:'formalism',title:'Hamiltonian formulation',role:'Phase Space Representation',era:'Ring 1 · Formalism',
   body:'Reformulates the problem in phase space — position and momentum as conjugate variables. The Hamiltonian H = T + V is conserved but insufficient for a closed-form solution. Energy conservation alone does not constrain the trajectory.',
   moons:[
     {text:'William Rowan Hamilton introduced the formulation in 1833, building on Lagrangian mechanics (1788)',tag:'1833'},
     {text:'Phase space for three bodies has 18 dimensions — 3 position + 3 momentum coordinates per body',tag:'dimensions'},
     {text:"Hamiltonian mechanics is the natural language of quantum mechanics; Schrödinger's equation is its quantum analogue",tag:'quantum link'},
   ]},
  {id:'jacobi',tier:'inner',angle:0.36,domain:'formalism',title:'The Jacobi integral',role:'Restricted Problem Conserved Quantity',era:'Ring 1 · Formalism',
   body:'In the restricted three-body problem — two massive bodies, one massless test particle — the Jacobi integral is conserved. It defines Hill regions the test particle cannot cross. The only exactly conserved quantity in the general problem.',
   moons:[
     {text:'Named after Carl Gustav Jacob Jacobi, who derived it in 1836 for the circular restricted problem',tag:'1836'},
     {text:'Hill regions — forbidden zones — are used in spacecraft trajectory design to rule out collision paths',tag:'application'},
     {text:'George William Hill used the Jacobi integral in 1878 to prove the Moon cannot escape the Earth\'s gravitational domain',tag:'moon stability'},
   ]},
  {id:'restricted',tier:'inner',angle:0.52,domain:'formalism',title:'The restricted problem',role:'Tractable Simplification',era:'Ring 1 · Formalism',

  const grad=ctx.createRadialGradient(cx,cy,0,cx,cy,sz/2);
  const r=(color>>16)&255,g=(color>>8)&255,b=color&255;
  grad.addColorStop(0,`rgba(${r},${g},${b},0.55)`);grad.addColorStop(0.3,`rgba(${r},${g},${b},0.18)`);grad.addColorStop(0.7,`rgba(${r},${g},${b},0.04)`);grad.addColorStop(1,`rgba(${r},${g},${b},0)`);
  ctx.fillStyle=grad;ctx.fillRect(0,0,sz,sz);
  const spr=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c),transparent:true,depthWrite:false,blending:THREE.AdditiveBlending}));
  spr.scale.set(radius*6,radius*6,1);return spr;
}

function buildScene(){
  drawEllipse(ELLIPSES.inner.rx, ELLIPSES.inner.rz, 0.24,0x4a8adc,0.04, 0x1a3a6c,0.55);
  drawEllipse(ELLIPSES.mid.rx,   ELLIPSES.mid.rz,   0.22,0x9a70cc,0.18, 0x5a2896,0.55);
  drawEllipse(ELLIPSES.outer.rx, ELLIPSES.outer.rz,  0.18,0x50d8b0,0.35, 0x0a6048,0.55);
  drawEllipse(ELLIPSES.outer2.rx,ELLIPSES.outer2.rz, 0.14,0xd8b050,0.55, 0x7a5c08,0.55);
  const gM=new THREE.LineBasicMaterial({color:0x4a8adc,transparent:true,opacity:0.010});
  for(let i=-10;i<=10;i++){[new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(i*4,-0.5,-50),new THREE.Vector3(i*4,-0.5,50)]),gM.clone()),new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-50,-0.5,i*4),new THREE.Vector3(50,-0.5,i*4)]),gM.clone())].forEach(l=>{scene.add(l);allLines.push({line:l,darkColor:0x4a8adc,lightColor:0x0a0e1e,darkOp:0.010,lightOp:0.055});});}

  const cN=NODES.find(n=>n.id==='problem');
  const cM=new THREE.Mesh(new THREE.SphereGeometry(0.36,20,20),new THREE.MeshPhysicalMaterial({color:0xf0f4ff,emissive:0xf0f4ff,emissiveIntensity:2.2,metalness:0,roughness:0.04,clearcoat:1.0}));
  cM.position.copy(cN._pos);cM.userData={node:cN,origColor:0xf0f4ff,origEI:2.2,lightOrigColor:0x0a0e1e};
  scene.add(cM);nodeObjects.push({mesh:cM,node:cN});
  [3.4,2.1,1.2].forEach((sc,i)=>{const gs=makeGlowSprite(0xc0d8ff,0.36);gs.scale.setScalar(sc);gs.position.copy(cN._pos);gs.material.opacity=[0.20,0.36,0.52][i];scene.add(gs);glowSprites.push(gs);});

  NODES.filter(n=>n.id!=='problem').forEach(n=>{
    const pos=n._pos,cfg=dcfg(n.domain);
    const spokeM=new THREE.LineBasicMaterial({color:cfg.color,transparent:true,opacity:0.04});
    const spoke=new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0),pos.clone()]),spokeM);
    scene.add(spoke);allLines.push({line:spoke,darkColor:cfg.color,lightColor:cfg.lightColor,darkOp:0.04,lightOp:0.18});
    const e=ELLIPSES[n.tier]||ELLIPSES.mid,da=0.018;
    const a1=((n.angle||0)-da)*Math.PI*2,a2=((n.angle||0)+da)*Math.PI*2;
    function eP(a){const lx=e.rx*Math.cos(a),lz=e.rz*Math.sin(a);return new THREE.Vector3(lx*Math.cos(TILT)-lz*Math.sin(TILT),pos.y,lx*Math.sin(TILT)+lz*Math.cos(TILT));}
    const tang=eP(a2).sub(eP(a1)).normalize(),tL=0.36;
    const tM=new THREE.LineBasicMaterial({color:cfg.color,transparent:true,opacity:0.55});
    const tLine=new THREE.Line(new THREE.BufferGeometry().setFromPoints([pos.clone().addScaledVector(tang,-tL),pos.clone().addScaledVector(tang,tL)]),tM);
    scene.add(tLine);allLines.push({line:tLine,darkColor:cfg.color,lightColor:cfg.lightColor,darkOp:0.55,lightOp:0.90});
    const mesh=new THREE.Mesh(new THREE.SphereGeometry(cfg.size,16,16),new THREE.MeshPhysicalMaterial({color:cfg.color,emissive:cfg.color,emissiveIntensity:1.4,metalness:0.2,roughness:0.08,clearcoat:1.0,transparent:true,opacity:0.95}));
    mesh.position.copy(pos);mesh.userData={node:n,origColor:cfg.color,origEI:1.4,lightOrigColor:cfg.lightColor};
    scene.add(mesh);nodeObjects.push({mesh,node:n});
    const gs=makeGlowSprite(cfg.color,cfg.size);gs.position.copy(pos);gs.material.opacity=0.72;scene.add(gs);glowSprites.push(gs);
    const short=n.title.length>24?n.title.slice(0,22)+'…':n.title;
    addLabel(short,pos.x+0.5,pos.y+0.45,pos.z,cfg.hex+'cc',7.0,cfg.lightHex+'dd');
  });

  function rlp(tier,af){const e=ELLIPSES[tier],a=(af||0)*Math.PI*2;const lx=e.rx*Math.cos(a),lz=e.rz*Math.sin(a);return new THREE.Vector3(lx*Math.cos(TILT)-lz*Math.sin(TILT)+0.4,0.1,lx*Math.sin(TILT)+lz*Math.cos(TILT));}
  addLabel('Ring 1 · Formalism',rlp('inner',0.93).x,0.1,rlp('inner',0.93).z,'rgba(74,138,220,0.42)',6.5,'rgba(26,58,108,0.65)');
  addLabel('Ring 2 · History',  rlp('mid',0.93).x,  0.1,rlp('mid',0.93).z,  'rgba(154,112,204,0.42)',6.5,'rgba(90,40,150,0.65)');
  addLabel('Ring 3 · Analogues',rlp('outer',0.93).x, 0.1,rlp('outer',0.93).z,'rgba(80,216,176,0.42)',6.5,'rgba(10,112,88,0.65)');
  addLabel('Ring 4 · Cultural', rlp('outer2',0.93).x,0.1,rlp('outer2',0.93).z,'rgba(216,176,80,0.42)',6.5,'rgba(138,100,16,0.65)');

  CONNECTIONS.forEach(conn=>{
    const fN=NODE_BY_ID[conn.from],tN=NODE_BY_ID[conn.to];if(!fN||!tN)return;
    const cf=cc(conn.type),isDash=conn.type==='lives-in';
    const p1=fN._pos.clone(),p2=tN._pos.clone(),mid=p1.clone().add(p2).multiplyScalar(0.5);
    mid.y+=2.2+Math.random()*1.5;
    const pts=new THREE.QuadraticBezierCurve3(p1,mid,p2).getPoints(48);
    if(isDash){
      for(let i=0;i<pts.length-1;i+=2){
        const sg=new THREE.BufferGeometry().setFromPoints([pts[i],pts[Math.min(i+1,pts.length-1)]]);
        const sm=new THREE.LineBasicMaterial({color:cf.dkH,transparent:true,opacity:cf.dkO});
        const sl=new THREE.Line(sg,sm);scene.add(sl);
        connLineObjects.push({line:sl,conn,darkOp:cf.dkO,lightOp:cf.lkO,darkColor:cf.dkH,lightColor:cf.lkH});
        allLines.push({line:sl,darkColor:cf.dkH,lightColor:cf.lkH,darkOp:cf.dkO,lightOp:cf.lkO});
      }
    } else {
      const geo=new THREE.BufferGeometry().setFromPoints(pts);
      const mat=new THREE.LineBasicMaterial({color:cf.dkH,transparent:true,opacity:cf.dkO});
      const line=new THREE.Line(geo,mat);scene.add(line);
      connLineObjects.push({line,conn,darkOp:cf.dkO,lightOp:cf.lkO,darkColor:cf.dkH,lightColor:cf.lkH});
      allLines.push({line,darkColor:cf.dkH,lightColor:cf.lkH,darkOp:cf.dkO,lightOp:cf.lkO});
    }
  });
}
buildScene();

function applyTheme(){
  document.body.classList.toggle('light',isLight);
  document.getElementById('theme-toggle').textContent=isLight?'Dark':'Light';
  allLines.forEach(({line,darkColor,lightColor,darkOp,lightOp})=>{line.material.color.setHex(isLight?lightColor:darkColor);line.material.opacity=isLight?lightOp:darkOp;});
  nodeObjects.forEach(({mesh})=>{
    const ud=mesh.userData;
    if(isLight){mesh.material.color.setHex(ud.lightOrigColor||0x0a0e1e);mesh.material.emissive.setHex(ud.lightOrigColor||0x0a0e1e);mesh.material.emissiveIntensity=0;mesh.material.metalness=0;mesh.material.roughness=0.55;mesh.material.clearcoat=0;}
    else{mesh.material.color.setHex(ud.origColor);mesh.material.emissive.setHex(ud.origColor);mesh.material.emissiveIntensity=ud.origEI||1.4;mesh.material.metalness=0.2;mesh.material.roughness=0.08;mesh.material.clearcoat=1.0;}
  });
  glowSprites.forEach(gs=>{gs.visible=!isLight;});
  neonA.intensity=isLight?0:6;neonB.intensity=isLight?0:5;neonC.intensity=isLight?0:4;
  ambLight.intensity=isLight?0.85:0.15;
  pMat.opacity=isLight?0:0.14;
  scene.fog.color.setHex(isLight?LIGHT_FOG:DARK_FOG);
  renderer.setClearColor(isLight?LIGHT_FOG:0x000000,0);
  redrawLabels();drawMesh();
}
document.getElementById('theme-toggle').addEventListener('click',()=>{isLight=!isLight;applyTheme();});

const bgCanvas=document.getElementById('bg-mesh'),bgCtx=bgCanvas.getContext('2d');
function resizeBg(){bgCanvas.width=innerWidth;bgCanvas.height=innerHeight;}resizeBg();
const BD=[{x:0.15,y:0.20,vx:0.00008,vy:0.00006,r:0.60,col:[8,18,44]},{x:0.72,y:0.68,vx:-0.00006,vy:0.00008,r:0.52,col:[14,28,52]},{x:0.80,y:0.12,vx:-0.00005,vy:-0.00007,r:0.46,col:[6,20,36]},{x:0.22,y:0.80,vx:0.00007,vy:-0.00006,r:0.48,col:[4,24,42]}];
const BL=[{x:0.15,y:0.20,vx:0.00008,vy:0.00006,r:0.60,col:[215,208,195]},{x:0.72,y:0.68,vx:-0.00006,vy:0.00008,r:0.52,col:[225,218,205]},{x:0.80,y:0.12,vx:-0.00005,vy:-0.00007,r:0.46,col:[208,202,192]},{x:0.22,y:0.80,vx:0.00007,vy:-0.00006,r:0.48,col:[218,210,198]}];
function drawMesh(){
  const w=bgCanvas.width,h=bgCanvas.height;bgCtx.clearRect(0,0,w,h);
  const blobs=isLight?BL:BD;
  bgCtx.fillStyle=isLight?'#f0ece4':'#030308';bgCtx.fillRect(0,0,w,h);
  blobs.forEach(b=>{const cx=b.x*w,cy=b.y*h,rad=Math.max(w,h)*b.r;const grd=bgCtx.createRadialGradient(cx,cy,0,cx,cy,rad);const[r,g,bl]=b.col;grd.addColorStop(0,`rgba(${r},${g},${bl},${isLight?0.45:0.55})`);grd.addColorStop(0.5,`rgba(${r},${g},${bl},${isLight?0.14:0.16})`);grd.addColorStop(1,`rgba(${r},${g},${bl},0)`);bgCtx.fillStyle=grd;bgCtx.fillRect(0,0,w,h);});
  const vig=bgCtx.createRadialGradient(w/2,h/2,h*0.3,w/2,h/2,isLight?h*0.88:h*0.92);vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,isLight?'rgba(10,14,30,0.08)':'rgba(0,0,0,0.75)');bgCtx.fillStyle=vig;bgCtx.fillRect(0,0,w,h);
}
let meshT=0;
function tickMesh(){meshT++;[...BD,...BL].forEach(b=>{b.x+=b.vx;b.y+=b.vy;if(b.x<0||b.x>1)b.vx*=-1;if(b.y<0||b.y>1)b.vy*=-1;});if(meshT%3===0)drawMesh();requestAnimationFrame(tickMesh);}
drawMesh();tickMesh();

const RING_NAMES={center:'Center',inner:'Ring 1 · Formalism',mid:'Ring 2 · History',outer:'Ring 3 · Analogues',outer2:'Ring 4 · Cultural'};
const CONN_TYPE_LABELS={'preceded':'Preceded','same-structure':'Same Structure','enabled':'Enabled','lives-in':'Lives In'};
const CONN_TYPE_CSS_DK={'preceded':'rgba(74,138,220,0.82)','same-structure':'rgba(154,112,204,0.82)','enabled':'rgba(80,216,176,0.82)','lives-in':'rgba(216,176,80,0.82)'};
const CONN_TYPE_CSS_LK={'preceded':'rgba(26,58,128,0.82)','same-structure':'rgba(90,40,150,0.82)','enabled':'rgba(10,112,88,0.82)','lives-in':'rgba(138,100,16,0.82)'};

function openPanel(node){
  const cfg=dcfg(node.domain),col=isLight?cfg.lightHex:cfg.hex;
  document.getElementById('gc-bar').style.background=col;
  document.getElementById('gc-ring').textContent=node.era||RING_NAMES[node.tier];
  document.getElementById('gc-title').textContent=node.title||'';
  document.getElementById('gc-role').textContent=node.role||'';
  document.getElementById('gc-body').textContent=node.body||'';
  document.getElementById('gc-ring-v').textContent=RING_NAMES[node.tier]||node.tier;
  document.getElementById('gc-domain').textContent=cfg.label;
  const gcTag=document.getElementById('gc-tag');gcTag.textContent=cfg.label;gcTag.style.color=col;
  const conns=CONNECTIONS.filter(c=>c.from===node.id||c.to===node.id);
  const gcConn=document.getElementById('gc-connections');
  if(conns.length){
    gcConn.style.display='';
    const cssDef=isLight?CONN_TYPE_CSS_LK:CONN_TYPE_CSS_DK;
    let html='<div class="gc-conn-label">Connections</div>';
    conns.forEach(c=>{const otherId=c.from===node.id?c.to:c.from,other=NODE_BY_ID[otherId];if(!other)return;html+=`<div class="gc-conn-item" data-ct="${other.id}"><span class="gc-conn-type" style="color:${cssDef[c.type]||cssDef['preceded']}">${CONN_TYPE_LABELS[c.type]||c.type}</span><span class="gc-conn-target">${other.title}</span></div>`;});
    gcConn.innerHTML=html;
    gcConn.querySelectorAll('.gc-conn-item').forEach(item=>{item.addEventListener('click',()=>{const t=NODE_BY_ID[item.dataset.ct];if(t)enterFocus(t);});});
  } else {gcConn.style.display='none';}
  const gcMoons=document.getElementById('gc-moons');
  if(node.moons&&node.moons.length){
    gcMoons.style.display='';
    let mHtml='<div class="gc-moon-label">Satellite Facts</div>';
    node.moons.forEach(m=>{
      mHtml+=`<div class="gc-moon-item"><div class="gc-moon-dot" style="background:${col}"></div><div><div class="gc-moon-text">${m.text}</div><span class="gc-moon-tag">${m.tag}</span></div></div>`;
    });
    gcMoons.innerHTML=mHtml;
  } else {gcMoons.style.display='none';}
  document.getElementById('ghost').classList.add('on');
  document.getElementById('ms-bar').style.background=col;
  document.getElementById('ms-ring').textContent=node.era||RING_NAMES[node.tier];
  document.getElementById('ms-title').textContent=node.title||'';
  document.getElementById('ms-body').textContent=node.body||'';
  const msTag=document.getElementById('ms-tag');msTag.textContent=cfg.label;msTag.style.color=col;
  document.getElementById('msheet').classList.add('on');
}

let ghostExpanded=false;
document.getElementById('gc-expand').addEventListener('click',()=>{
  ghostExpanded=!ghostExpanded;
  const ghost=document.getElementById('ghost');
  ghost.classList.toggle('expanded',ghostExpanded);
  document.getElementById('gc-expand').textContent=ghostExpanded?'⤡':'⤢';
  document.getElementById('gc-expand').title=ghostExpanded?'Collapse panel':'Expand panel';
});

const moonObjects=[];
function buildMoonOrbits(){
  NODES.filter(n=>n.id!=='problem'&&n.moons&&n.moons.length).forEach(n=>{
    const cfg=dcfg(n.domain);
    const moonCount=n.moons.length;
    const orbitR=cfg.size*4.5+0.25;
    for(let mi=0;mi<moonCount;mi++){
      const phase=(mi/moonCount)*Math.PI*2;
      const moonMesh=new THREE.Mesh(
        new THREE.SphereGeometry(0.022,6,6),
        new THREE.MeshBasicMaterial({color:cfg.color,transparent:true,opacity:0.55})
      );
      moonMesh.userData={nodeId:n.id,phase,orbitR,speed:0.28+mi*0.07,tilt:Math.PI*(0.12+mi*0.09)};
      scene.add(moonMesh);
      moonObjects.push({mesh:moonMesh,node:n,phase,orbitR,speed:0.28+mi*0.07,tilt:Math.PI*(0.12+mi*0.09)});
    }
  });
}
buildMoonOrbits();

function highlightConnections(node){
  const rIds=new Set(CONNECTIONS.filter(c=>c.from===node.id||c.to===node.id).flatMap(c=>[c.from,c.to]));
  connLineObjects.forEach(obj=>{const rel=obj.conn.from===node.id||obj.conn.to===node.id;const bOp=isLight?obj.lightOp:obj.darkOp;obj.line.material.opacity=rel?Math.min(bOp*2.8,0.95):bOp*0.18;});
  nodeObjects.forEach(({mesh,node:n})=>{mesh.material.opacity=rIds.has(n.id)||n.id===node.id?0.95:0.20;if(mesh.userData.origEI!==undefined)mesh.material.emissiveIntensity=rIds.has(n.id)||n.id===node.id?(isLight?0:mesh.userData.origEI*1.8):0.15;});
}
function resetConnectionHighlights(){connLineObjects.forEach(obj=>{obj.line.material.opacity=isLight?obj.lightOp:obj.darkOp;});nodeObjects.forEach(({mesh})=>{mesh.material.opacity=0.95;if(mesh.userData.origEI!==undefined)mesh.material.emissiveIntensity=isLight?0:mesh.userData.origEI;});}

function enterFocus(node){
  isFocused=true;focusNode=node;scenePivotTgt.copy(node._pos);
  const zm={center:5,inner:8,mid:10,outer:13,outer2:16};
  camTarget.radius=zm[node.tier]||10;camTarget.phi=Math.PI*0.22;
  document.getElementById('focus-hint').classList.add('vis');
  document.getElementById('hint').style.opacity='0';
  openPanel(node);highlightConnections(node);
}
function exitFocus(){
  isFocused=false;focusNode=null;scenePivotTgt.set(0,0,0);
  camTarget.radius=VIEWS.top.radius;camTarget.phi=VIEWS.top.phi;
  document.getElementById('focus-hint').classList.remove('vis');
  document.getElementById('hint').style.opacity='1';
  document.getElementById('ghost').classList.remove('on');
  document.getElementById('msheet').classList.remove('on');
  resetConnectionHighlights();
}
window.closePanel=function(){exitFocus();};

const tooltip=document.getElementById('tooltip');
let hoveredMesh=null,mouse=new THREE.Vector2(),drag=false,lastDragX=0,lastDragY=0,isDragging=false,hintFaded=false;
function posTooltip(cx,cy){tooltip.style.transform=`translate(${cx+18}px,${cy-10}px)`;}
function checkHover(){
  raycaster.setFromCamera(mouse,cam);
  const hits=raycaster.intersectObjects(nodeObjects.map(o=>o.mesh));
  if(hits.length){
    const hit=hits[0].object,obj=nodeObjects.find(o=>o.mesh===hit);
    if(obj&&hoveredMesh!==hit){hoveredMesh=hit;const n=obj.node,cfg=dcfg(n.domain);document.getElementById('tt-ring').textContent=n.era||RING_NAMES[n.tier];document.getElementById('tt-title').textContent=n.title;document.getElementById('tt-title').style.color=isLight?cfg.lightHex:cfg.hex;document.getElementById('tt-type').textContent=cfg.label;tooltip.classList.add('vis');}
    document.body.style.cursor='pointer';
  } else {if(hoveredMesh){hoveredMesh=null;tooltip.classList.remove('vis');}document.body.style.cursor='default';}
}
cvs.addEventListener('pointerdown',e=>{isDragging=false;drag=false;lastDragX=e.clientX;lastDragY=e.clientY;cvs.setPointerCapture(e.pointerId);});
cvs.addEventListener('pointermove',e=>{const rect=cvs.getBoundingClientRect();mouse.x=(e.clientX-rect.left)/rect.width*2-1;mouse.y=-((e.clientY-rect.top)/rect.height)*2+1;posTooltip(e.clientX,e.clientY);if(e.buttons){isDragging=true;drag=true;camTarget.theta-=(e.clientX-lastDragX)*0.005;camTarget.phi=Math.max(0.02,Math.min(Math.PI*0.48,camTarget.phi+(e.clientY-lastDragY)*0.005));lastDragX=e.clientX;lastDragY=e.clientY;}else{checkHover();}});
cvs.addEventListener('pointerup',e=>{if(!drag){raycaster.setFromCamera(mouse,cam);const hits=raycaster.intersectObjects(nodeObjects.map(o=>o.mesh));if(hits.length){const obj=nodeObjects.find(o=>o.mesh===hits[0].object);if(obj)enterFocus(obj.node);}else if(isFocused)exitFocus();}if(!hintFaded){document.getElementById('hint').style.opacity='0.06';hintFaded=true;}});
cvs.addEventListener('wheel',e=>{camTarget.radius=Math.max(4,Math.min(80,camTarget.radius+e.deltaY*0.04));},{passive:true});
let orbitPaused=false;
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){exitFocus();return;}
  if(e.code==='Space'){e.preventDefault();orbitPaused=!orbitPaused;}
});
cvs.addEventListener('contextmenu',e=>{e.preventDefault();orbitPaused=!orbitPaused;});
document.querySelectorAll('.hud-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.hud-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');const v=VIEWS[btn.dataset.view];if(v){camTarget.phi=v.phi;camTarget.theta=v.theta;camTarget.radius=v.radius;}});});

let lastTime=0,elapsed=0;
function animate(ts){
  requestAnimationFrame(animate);
  const dt=Math.min((ts-lastTime)/1000,0.05);lastTime=ts;elapsed+=dt;
  camState.phi+=(camTarget.phi-camState.phi)*0.08;camState.theta+=(camTarget.theta-camState.theta)*0.08;camState.radius+=(camTarget.radius-camState.radius)*0.08;
  scenePivot.lerp(scenePivotTgt,0.08);
  if(!isFocused&&!isDragging&&!orbitPaused)camTarget.theta+=dt*0.018;
  const pa=pGeo.attributes.position.array;
  for(let i=0;i<PC;i++)pa[i*3+1]=pOrig[i*3+1]+Math.sin(elapsed*pSp[i]+pPh[i])*0.4;
  pGeo.attributes.position.needsUpdate=true;
  nodeObjects.forEach(({mesh,node:n})=>{mesh.scale.setScalar(1+Math.sin(elapsed*(n.id==='problem'?1.2:0.7+n.angle)*0.5)*(n.id==='problem'?0.04:0.022));});
  moonObjects.forEach(obj=>{
    const t=elapsed*obj.speed+obj.phase;
    const cx=obj.node._pos.x,cy=obj.node._pos.y,cz=obj.node._pos.z;
    const r=obj.orbitR,tilt=obj.tilt;
    obj.mesh.position.set(
      cx+r*Math.cos(t),
      cy+r*Math.sin(t)*Math.sin(tilt),
      cz+r*Math.sin(t)*Math.cos(tilt)
    );
  });
  applyCam();renderer.render(scene,cam);isDragging=false;
}
requestAnimationFrame(animate);
window.addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);resizeBg();drawMesh();});
</script>
