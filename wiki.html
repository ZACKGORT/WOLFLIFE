<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Zack Gort · Spatial Resume</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;}
canvas{display:block;width:100vw;height:100vh;}

#brand{
  position:fixed;top:24px;left:28px;z-index:100;pointer-events:none;
  font-family:'DM Mono',monospace;
}
#brand-name{font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:rgba(240,236,226,0.55);}
#brand-sub{font-size:7px;letter-spacing:0.16em;text-transform:uppercase;color:rgba(240,236,226,0.18);margin-top:4px;}

#hud{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  display:flex;gap:1px;
  background:rgba(240,236,226,0.03);border:1px solid rgba(240,236,226,0.08);
  border-radius:4px;overflow:hidden;z-index:100;
}
.hud-btn{
  background:none;border:none;cursor:pointer;
  color:rgba(240,236,226,0.3);font-family:'DM Mono',monospace;
  font-size:8px;letter-spacing:0.18em;text-transform:uppercase;
  padding:9px 18px;border-right:1px solid rgba(240,236,226,0.06);
  transition:color 0.2s,background 0.2s;
}
.hud-btn:last-child{border-right:none;}
.hud-btn:hover{color:rgba(240,236,226,0.7);background:rgba(240,236,226,0.04);}
.hud-btn.active{color:#f0ece2;background:rgba(240,236,226,0.07);}

#hint{
  position:fixed;bottom:72px;left:50%;transform:translateX(-50%);
  font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.16em;
  text-transform:uppercase;color:rgba(240,236,226,0.12);
  z-index:100;pointer-events:none;white-space:nowrap;transition:opacity 1.2s;
}
#focus-hint{
  position:fixed;bottom:72px;left:50%;transform:translateX(-50%);
  font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.22em;
  text-transform:uppercase;color:rgba(240,236,226,0.22);
  z-index:100;pointer-events:none;white-space:nowrap;
  opacity:0;transition:opacity 0.5s;
}
#focus-hint.vis{opacity:1;}

#tooltip{
  position:fixed;top:0;left:0;pointer-events:none;opacity:0;transition:opacity 0.15s;z-index:200;
}
#tooltip.vis{opacity:1;}
#tt-inner{
  background:rgba(8,7,6,0.93);border:1px solid rgba(240,236,226,0.1);
  border-radius:4px;padding:10px 14px;backdrop-filter:blur(8px);max-width:220px;
}
.tt-era{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(240,236,226,0.3);margin-bottom:4px;}
.tt-title{font-family:'DM Serif Display',serif;font-size:13px;color:#f0ece2;line-height:1.25;margin-bottom:4px;}
.tt-type{font-family:'DM Mono',monospace;font-size:6.5px;letter-spacing:0.14em;text-transform:uppercase;}

#panel{
  position:fixed;bottom:0;left:0;right:0;
  background:linear-gradient(to top,rgba(4,3,2,0.98) 0%,rgba(4,3,2,0.92) 70%,transparent 100%);
  padding:36px 40px 52px;
  transform:translateY(100%);transition:transform 0.55s cubic-bezier(0.16,1,0.3,1);
  z-index:90;pointer-events:none;border-top:1px solid rgba(240,236,226,0.07);
}
#panel.open{transform:translateY(0);pointer-events:all;}
#panel-close{
  position:absolute;top:28px;right:36px;
  background:none;border:1px solid rgba(240,236,226,0.15);color:rgba(240,236,226,0.35);
  width:26px;height:26px;border-radius:2px;cursor:pointer;font-size:13px;
  display:flex;align-items:center;justify-content:center;
  font-family:'DM Mono',monospace;transition:all 0.2s;
}
#panel-close:hover{color:#f0ece2;border-color:rgba(240,236,226,0.45);}
#panel-era{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(240,236,226,0.28);margin-bottom:8px;}
#panel-title{font-family:'DM Serif Display',serif;font-size:22px;color:#f0ece2;letter-spacing:-0.01em;margin-bottom:6px;line-height:1.2;}
#panel-role{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:0.16em;text-transform:uppercase;color:rgba(240,236,226,0.28);margin-bottom:16px;}
#panel-body{font-family:'DM Mono',monospace;font-size:11.5px;color:rgba(240,236,226,0.58);line-height:1.9;max-width:560px;}
#panel-tag{display:inline-block;margin-top:14px;font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.16em;text-transform:uppercase;padding:4px 10px;border-radius:20px;border:1px solid currentColor;opacity:0.5;}

#contact{
  position:fixed;top:24px;right:28px;z-index:100;
  display:flex;flex-direction:column;align-items:flex-end;gap:5px;
  font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.14em;text-transform:uppercase;
}
.cl{color:rgba(240,236,226,0.18);}
.cl a{color:inherit;text-decoration:none;pointer-events:all;transition:color 0.2s;}
.cl a:hover{color:rgba(240,236,226,0.55);}

@media(max-width:600px){
  #panel{padding:24px 20px 40px;}
  #panel-title{font-size:17px;}
  #contact{display:none;}
}
</style>
</head>

<div id="brand">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ══════════════════════════════════════════════════════════
// NODE DATA — three tiers on concentric ellipses
// ══════════════════════════════════════════════════════════
const NODES = [
  // ── ORIGIN ──
  {
    id:'origin', tier:'center', angle:0,
    type:'intro', era:'Declaration',
    title:'I think deeply about human-to-human interaction.',
    role:'',
    body:'Not about tools. Not about deliverables. About the thing underneath — how we communicate, and what it costs when the interface gets in the way.'
  },

  // ── INNER — case studies ──
  { id:'gnc-cs',    tier:'inner', angle:0.08, type:'deck',    era:'Case Study · 2021',    title:'GNC · The Rebuild',           role:'Discovery → Delivery · 12 weeks',   body:'Mobile-first Shopify redesign — strategy and execution in the same hands, shipped in 12 weeks, ~$500M in influenced revenue.' },
  { id:'tiktok-cs', tier:'inner', angle:0.20, type:'deck',    era:'Case Study · 2021–22', title:'TikTok For Business',          role:'DRI · ACD · Code & Theory',          body:'From Senior Designer to ACD to Directly Responsible Individual on one of the fastest-growing advertising platforms in the world.' },
  { id:'bny-cs',    tier:'inner', angle:0.33, type:'deck',    era:'Case Study · 2022',    title:'BNY Mellon · Wove',           role:'Interim PO · Design Architect',      body:'Three Agile tracks. One design architect. I centralized a sprawling product ecosystem into a modular design system nobody asked me to build.' },
  { id:'phenom-cs', tier:'inner', angle:0.48, type:'deck',    era:'Case Study · 2025',    title:'Phenom · Web Presence',       role:'UX Strategist',                      body:'Named operational silos nobody else had mapped. Owned the corporate web presence end-to-end across Marketing, Sales, and Product.' },
  { id:'pfs-cs',    tier:'inner', angle:0.63, type:'deck',    era:'Case Study · 2020–21', title:'PFSWeb LiveArea',             role:'Manager, UX',                        body:'Full-spectrum Salesforce Commerce Cloud builds across B2C and B2B. Ran UX strategy and design function throughout every project lifecycle.' },
  { id:'workarea-cs',tier:'inner',angle:0.76, type:'deck',    era:'Case Study · 2017–18', title:'Workarea · SaaS Platform',    role:'Senior UX Designer',                 body:'No mockup theater — napkin sketches and real conversations with engineers until the thing was right.' },
  { id:'160-cs',    tier:'inner', angle:0.90, type:'deck',    era:'Case Study · 2014–16', title:'One Sixty Over Ninety',       role:'Interaction Designer',               body:'ADA-compliant interaction design for Comcast, Kent State, Philadelphia Eagles. This is where I learned what design culture could be.' },

  // ── MIDDLE — career timeline ──
  { id:'160over90', tier:'mid', angle:0.02, type:'work',   era:'2014–2016', title:'One Sixty Over Ninety',          role:'Interaction Designer',        body:'Full-service interaction design for .EDU clients. This is where I learned what design culture could be.' },
  { id:'o3',        tier:'mid', angle:0.11, type:'work',   era:'2016–2017', title:'O3 World',                       role:'UX Designer',                 body:'Lean UX for FinTech and iOS products in Fishtown. Whiteboards, wireframes, sprint cycles, shipped. Certified Scrum Master.' },
  { id:'workarea',  tier:'mid', angle:0.20, type:'work',   era:'2017–2018', title:'Workarea',                       role:'Senior UX Designer',          body:'Shaped a proprietary SaaS e-commerce platform through direct client relationships and data-informed iteration. No mockup theater.' },
  { id:'pfs',       tier:'mid', angle:0.30, type:'work',   era:'2020–2021', title:'PFSWeb LiveArea',                role:'Manager, UX',                 body:'Ran UX strategy and design function throughout every Salesforce Commerce Cloud project lifecycle.' },
  { id:'huge',      tier:'mid', angle:0.39, type:'work',   era:'2021',      title:'HUGE Inc.',                      role:'Senior UX Designer',          body:'End-to-end UX and booking flow for Sentral Lifestyle Apartments — delivered under constrained conditions.' },
  { id:'elva',      tier:'mid', angle:0.47, type:'work',   era:'2021',      title:'Elva · GNC',                     role:'Senior UX Designer',          body:'Owned discovery through delivery for GNC\'s Shopify redesign — mobile-first, component-based, 12 weeks.' },
  { id:'ct',        tier:'mid', angle:0.56, type:'work',   era:'2021–2022', title:'Code & Theory · TikTok',         role:'Senior Interaction Designer', body:'Led UX for TikTok For Business. Moved from Senior Designer to ACD to DRI in under a year.' },
  { id:'sapient',   tier:'mid', angle:0.66, type:'work',   era:'2022–2023', title:'Publicis Sapient · BNY Mellon', role:'Senior UX Designer',          body:'Embedded as interim Product Owner and primary client liaison — a role I wasn\'t hired for and became anyway.' },
  { id:'phenom',    tier:'mid', angle:0.76, type:'work',   era:'2025',      title:'Phenom',                         role:'UX Strategist',               body:'Owned the corporate web presence end-to-end. Named operational silos nobody else had mapped.' },
  { id:'wolfgang',  tier:'mid', angle:0.88, type:'launch', era:'Current',   title:'Wolfgang & Co.',                 role:'Concept Studio · Founder',    body:'A concept studio focused on craft, language, and human intent — as realized through a bespoke narrative-as-nodes engine. My answer is The Sentence.' },

  // ── OUTER — independent work ──
  { id:'selfcurriculum', tier:'outer', angle:0.02, type:'reflect', era:'2006–2012', title:'The Self-Curriculum',        role:'Personal',           body:'Six years of reading, building, and breaking things before anyone paid me to. The gaps in my resume come with receipts.' },
  { id:'flightpath',     tier:'outer', angle:0.12, type:'launch',  era:'2016',      title:'FlightPath · Co-Founded',    role:'Co-Founder',         body:'Co-founded a design studio before I had the language for what I was doing. The independent thinking started here.' },
  { id:'haiku',          tier:'outer', angle:0.22, type:'story',   era:'2016',      title:'The Clavicle & The Haiku',   role:'Personal',           body:'A broken clavicle, three weeks flat. I wrote a haiku every day. Constraints are a design tool, not a design problem.' },
  { id:'wolfie-origin',  tier:'outer', angle:0.33, type:'reflect', era:'2020',      title:'wolfie.love · Origin',       role:'Self-directed',       body:'The pandemic year. I started building tools for myself because the ones that existed didn\'t think the way I think.' },
  { id:'sentence',       tier:'outer', angle:0.44, type:'concept', era:'2023',      title:'The Sentence Engine',        role:'Wolfgang & Co.',     body:'The conviction at the center of everything: a single, complete sentence is the most honest unit of human thought.' },
  { id:'frank',          tier:'outer', angle:0.54, type:'launch',  era:'2023',      title:'ifimaybefrank.com',           role:'A writing model',    body:'A model for writing that doesn\'t apologize for having a point of view. The name says everything about the intent.' },
  { id:'reasonably',     tier:'outer', angle:0.63, type:'launch',  era:'2023',      title:'reasonably.cc',              role:'A thinking model',   body:'A structured way to hold a position without becoming it. Reasoning as craft, not as performance.' },
  { id:'intoview',       tier:'outer', angle:0.72, type:'launch',  era:'2023–',     title:'intoview.pro',               role:'My model',           body:'The one I send instead of a resume when I want to be taken seriously. A living document that thinks back.' },
  { id:'wolfie-life',    tier:'outer', angle:0.82, type:'launch',  era:'2024',      title:'wolfie.life',                role:'A new category',     body:'Not a blog. Not a portfolio. A spatial record of a life — moments as nodes, mood as infrastructure, memory as navigation.' },
  { id:'this-map',       tier:'outer', angle:0.92, type:'concept', era:'2024–',     title:'This Map',                   role:'Declaration',        body:'A resume should serve as a declaration, not a statement. This is the declaration. The PDF is the fallback — for bots.' },
];

// ══════════════════════════════════════════════════════════
// TYPE CONFIG
// ══════════════════════════════════════════════════════════
const TYPE_CFG = {
  intro:   { color:0xf0ece2, size:0.30, label:'Origin'    },
  work:    { color:0xc8704a, size:0.13, label:'Role'       },
  launch:  { color:0xd4a84a, size:0.15, label:'Launch'     },
  story:   { color:0xc87060, size:0.11, label:'Story'      },
  reflect: { color:0x9a8070, size:0.11, label:'Reflect'    },
  concept: { color:0x7a8ecc, size:0.13, label:'Concept'    },
  deck:    { color:0xb07acc, size:0.14, label:'Case Study' },
  default: { color:0x8a8680, size:0.10, label:''           },
};
const tcfg = t => TYPE_CFG[t] || TYPE_CFG.default;
const tcol = t => tcfg(t).color;
const thex = t => '#' + tcol(t).toString(16).padStart(6,'0');

// ══════════════════════════════════════════════════════════
// ELLIPSE LAYOUT — 17° tilt off horizontal
// ══════════════════════════════════════════════════════════
const TILT = 17 * Math.PI / 180;
const ELLIPSES = {
  inner: { rx:9,  rz:5.5 },
  mid:   { rx:16, rz:9.5 },
  outer: { rx:23, rz:14  },
};
const TIER_Y = { inner:0.05, mid:0.2, outer:0.5 };

function ellipsePos(tier, angleFrac){
  if(tier === 'center') return new THREE.Vector3(0,0,0);
  const e  = ELLIPSES[tier];
  const a  = (angleFrac || 0) * Math.PI * 2;
  const lx = e.rx * Math.cos(a);
  const lz = e.rz * Math.sin(a);
  const x  = lx*Math.cos(TILT) - lz*Math.sin(TILT);
  const z  = lx*Math.sin(TILT) + lz*Math.cos(TILT);
  return new THREE.Vector3(x, TIER_Y[tier] || 0, z);
}

NODES.forEach(n => { n._pos = ellipsePos(n.tier, n.angle); });

// ══════════════════════════════════════════════════════════
// THREE.JS SETUP
// ══════════════════════════════════════════════════════════
const canvas   = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x000000);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000000, 0.0032);

const cam = new THREE.PerspectiveCamera(52, innerWidth/innerHeight, 0.1, 2000);

// ── Camera state (spherical, with lerped center) ──
const VIEWS = {
  iso:  { phi:Math.PI*0.26,  theta:-Math.PI*0.12, radius:42 },
  top:  { phi:Math.PI*0.018, theta:0,              radius:52 },
  side: { phi:Math.PI*0.18,  theta:Math.PI*0.5,   radius:46 },
};
let camState  = { ...VIEWS.top };
let camTarget = { ...VIEWS.top };

// Scene pivot — smoothly shifts to focused node's world pos
const scenePivot    = new THREE.Vector3(0,0,0);
const scenePivotTgt = new THREE.Vector3(0,0,0);

function applyCam(){
  const { phi, theta, radius } = camState;
  const c = scenePivot;
  cam.position.set(
    c.x + radius * Math.sin(phi) * Math.sin(theta),
    c.y + radius * Math.cos(phi),
    c.z + radius * Math.sin(phi) * Math.cos(theta)
  );
  cam.lookAt(c);
}
applyCam();

scene.add(new THREE.AmbientLight(0xffffff, 0.1));
const dLight = new THREE.DirectionalLight(0xf0ece2, 0.25);
dLight.position.set(10,40,10); scene.add(dLight);

// ══════════════════════════════════════════════════════════
// BUILD SCENE
// ══════════════════════════════════════════════════════════
const nodeObjects = [];
const raycaster   = new THREE.Raycaster();

function drawEllipse(rx, rz, opacity, color, yOff){
  const segs = 128;
  const pts  = [];
  for(let i=0; i<=segs; i++){
    const a  = (i/segs)*Math.PI*2;
    const lx = rx*Math.cos(a), lz = rz*Math.sin(a);
    const x  = lx*Math.cos(TILT)-lz*Math.sin(TILT);
    const z  = lx*Math.sin(TILT)+lz*Math.cos(TILT);
    pts.push(new THREE.Vector3(x, yOff || -0.1, z));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  scene.add(new THREE.Line(geo,
    new THREE.LineBasicMaterial({ color, transparent:true, opacity })));
}

function buildScene(){
  // Ellipse rings
  drawEllipse(ELLIPSES.inner.rx, ELLIPSES.inner.rz, 0.20, 0xb07acc, 0.04);
  drawEllipse(ELLIPSES.mid.rx,   ELLIPSES.mid.rz,   0.24, 0xc8704a, 0.18);
  drawEllipse(ELLIPSES.outer.rx, ELLIPSES.outer.rz, 0.17, 0xd4a84a, 0.45);

  // Subtle grid
  const gMat = new THREE.LineBasicMaterial({ color:0xf0ece2, transparent:true, opacity:0.013 });
  for(let i=-7;i<=7;i++){
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(i*4,-0.5,-36), new THREE.Vector3(i*4,-0.5,36)]), gMat));
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(-36,-0.5,i*4), new THREE.Vector3(36,-0.5,i*4)]), gMat));
  }

  // Origin
  const originNode = NODES.find(n=>n.id==='origin');
  const oMesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.32,16,16),
    new THREE.MeshBasicMaterial({ color:0xf0ece2 })
  );
  oMesh.position.copy(originNode._pos);
  oMesh.userData = { node:originNode, origColor:0xf0ece2, origOpacity:1 };
  scene.add(oMesh);
  nodeObjects.push({ mesh:oMesh, node:originNode });

  // Glow ring at origin
  const grPts = [];
  for(let i=0;i<=64;i++){
    const a=(i/64)*Math.PI*2;
    grPts.push(new THREE.Vector3(Math.cos(a)*1.1, 0, Math.sin(a)*1.1));
  }
  scene.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(grPts),
    new THREE.LineBasicMaterial({ color:0xf0ece2, transparent:true, opacity:0.14 })
  ));

  // Radial spokes (very faint)
  NODES.filter(n=>n.id!=='origin').forEach(n => {
    scene.add(new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), n._pos.clone()]),
      new THREE.LineBasicMaterial({ color:tcol(n.type), transparent:true, opacity:0.05 })
    ));
  });

  // Per-node geometry
  NODES.filter(n=>n.id!=='origin').forEach(n => {
    const pos = n._pos;
    const cfg = tcfg(n.type);

    // Tangent tick at this node's angle on its ellipse
    const da   = 0.018;
    const a1   = ((n.angle||0) - da) * Math.PI*2;
    const a2   = ((n.angle||0) + da) * Math.PI*2;
    const e    = ELLIPSES[n.tier] || ELLIPSES.mid;
    function ePoint(a){
      const lx=e.rx*Math.cos(a), lz=e.rz*Math.sin(a);
      return new THREE.Vector3(
        lx*Math.cos(TILT)-lz*Math.sin(TILT),
        pos.y,
        lx*Math.sin(TILT)+lz*Math.cos(TILT)
      );
    }
    const tangent = ePoint(a2).sub(ePoint(a1)).normalize();
    const tLen = 0.36;

    // Main tick
    scene.add(new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([
        pos.clone().addScaledVector(tangent,-tLen),
        pos.clone().addScaledVector(tangent, tLen),
      ]),
      new THREE.LineBasicMaterial({ color:cfg.color, transparent:true, opacity:0.55 })
    ));

    // Sub-ticks
    ;[-0.55, 0.55].forEach(off => {
      const mid = pos.clone().addScaledVector(tangent, off*0.18);
      scene.add(new THREE.Line(
        new THREE.BufferGeometry().setFromPoints([
          mid.clone().addScaledVector(tangent,-tLen*0.38),
          mid.clone().addScaledVector(tangent, tLen*0.38),
        ]),
        new THREE.LineBasicMaterial({ color:cfg.color, transparent:true, opacity:0.18 })
      ));
    });

    // Sphere
    const mesh = new THREE.Mesh(
      new THREE.SphereGeometry(cfg.size, 12, 12),
      new THREE.MeshBasicMaterial({ color:cfg.color, transparent:true, opacity:0.82 })
    );
    mesh.position.copy(pos);
    mesh.userData = { node:n, origColor:cfg.color, origOpacity:0.82 };
    scene.add(mesh);
    nodeObjects.push({ mesh, node:n });

    // Label
    addLabel(
      n.title.length > 26 ? n.title.slice(0,24)+'…' : n.title,
      pos.x+0.5, pos.y+0.4, pos.z,
      thex(n.type)+'99', 6.2
    );
  });

  // Tier labels (at the rightmost point of each ellipse, rotated by tilt)
  const ilx = ELLIPSES.inner.rx*Math.cos(TILT), ilz = ELLIPSES.inner.rx*Math.sin(TILT);
  const mlx = ELLIPSES.mid.rx  *Math.cos(TILT), mlz = ELLIPSES.mid.rx  *Math.sin(TILT);
  const olx = ELLIPSES.outer.rx*Math.cos(TILT), olz = ELLIPSES.outer.rx*Math.sin(TILT);
  addLabel('Case Studies', ilx+0.4, 0.1, ilz, 'rgba(176,122,204,0.32)', 6);
  addLabel('Career',       mlx+0.4, 0.1, mlz, 'rgba(200,112,74,0.32)',  6);
  addLabel('Independent',  olx+0.4, 0.1, olz, 'rgba(212,168,74,0.32)',  6);
}

function addLabel(text, x, y, z, color, fs){
  const c = document.createElement('canvas');
  c.width=512; c.height=64;
  const ctx=c.getContext('2d');
  ctx.fillStyle=color;
  ctx.font=`${fs*2.4}px "DM Mono",monospace`;
  ctx.fillText(text.toUpperCase(),10,42);
  const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map:new THREE.CanvasTexture(c), transparent:true }));
  spr.position.set(x,y,z);
  spr.scale.set(9,1.15,1);
  scene.add(spr);
}

buildScene();

// ══════════════════════════════════════════════════════════
// CAMERA FOCUS
// ══════════════════════════════════════════════════════════
let isFocused   = false;
let focusNode   = null;
let focusOrbit  = 0;

function enterFocus(node){
  isFocused  = true;
  focusNode  = node;
  focusOrbit = camTarget.theta;
  scenePivotTgt.copy(node._pos);
  camTarget.radius = node.tier==='center' ? 5 : node.tier==='inner' ? 8 : node.tier==='mid' ? 10 : 12;
  camTarget.phi    = Math.PI * 0.22;
  document.getElementById('focus-hint').classList.add('vis');
  document.getElementById('hint').style.opacity = '0';
  openPanel(node);
}

function exitFocus(){
  isFocused = false;
  focusNode = null;
  scenePivotTgt.set(0,0,0);
  camTarget.radius = VIEWS.top.radius;
  camTarget.phi    = VIEWS.top.phi;
  document.getElementById('focus-hint').classList.remove('vis');
  document.getElementById('panel').classList.remove('open');
}

// ══════════════════════════════════════════════════════════
// PANEL
// ══════════════════════════════════════════════════════════
function openPanel(node){
  document.getElementById('panel-era').textContent   = node.era   || '';
  document.getElementById('panel-title').textContent  = node.title || '';
  document.getElementById('panel-role').textContent   = node.role  || '';
  document.getElementById('panel-body').textContent   = node.body  || '';
  const tag = document.getElementById('panel-tag');
  tag.textContent = tcfg(node.type).label;
  tag.style.color = thex(node.type);
  document.getElementById('panel').classList.add('open');
}

window.closePanel = function(){ exitFocus(); };

// ══════════════════════════════════════════════════════════
// INTERACTION
// ══════════════════════════════════════════════════════════
const tooltip   = document.getElementById('tooltip');
let hoveredMesh = null;
let mouse       = new THREE.Vector2();
let drag        = false;
let pointerStart= { x:0, y:0 };
let lastMouse   = { x:0, y:0 };
let autoRotate  = false;
let autoTimer   = null;
let hintFaded   = false;

function posTooltip(cx,cy){
  tooltip.style.transform=`translate(${cx+18}px,${cy-10}px)`;
}

function checkHover(){
  raycaster.setFromCamera(mouse, cam);
  const hits = raycaster.intersectObjects(nodeObjects.map(o=>o.mesh));
  if(hits.length){
    const obj = nodeObjects.find(o=>o.mesh===hits[0].object);
    if(obj && obj.mesh!==hoveredMesh){
      if(hoveredMesh){
        hoveredMesh.material.color.setHex(hoveredMesh.userData.origColor);
        hoveredMesh.material.opacity=hoveredMesh.userData.origOpacity;
        hoveredMesh.scale.setScalar(1);
      }
      hoveredMesh=obj.mesh;
      hoveredMesh.material.color.setHex(0xffffff);
      hoveredMesh.material.opacity=1;
      hoveredMesh.scale.setScalar(2.6);
      const n=obj.node;
      document.getElementById('tt-era').textContent   = n.era||'';
      document.getElementById('tt-title').textContent  = n.title;
      document.getElementById('tt-type').style.color   = thex(n.type);
      document.getElementById('tt-type').textContent   = tcfg(n.type).label;
      tooltip.classList.add('vis');
      canvas.style.cursor='pointer';
    }
  } else {
    if(hoveredMesh){
      hoveredMesh.material.color.setHex(hoveredMesh.userData.origColor);
      hoveredMesh.material.opacity=hoveredMesh.userData.origOpacity;
      hoveredMesh.scale.setScalar(1);
      hoveredMesh=null;
    }
    tooltip.classList.remove('vis');
    canvas.style.cursor='default';
  }
}

canvas.addEventListener('pointerdown', e => {
  drag=true;
  pointerStart={x:e.clientX,y:e.clientY};
  lastMouse={x:e.clientX,y:e.clientY};
  if(!hintFaded){ document.getElementById('hint').style.opacity='0'; hintFaded=true; }
});

window.addEventListener('pointerup', e => {
  const dx=Math.abs(e.clientX-pointerStart.x);
  const dy=Math.abs(e.clientY-pointerStart.y);
  if(drag && dx<5 && dy<5){
    if(hoveredMesh){
      const node=hoveredMesh.userData.node;
      if(isFocused && focusNode===node){ exitFocus(); }
      else { enterFocus(node); }
    } else if(isFocused){
      exitFocus();
    }
  }
  drag=false;
  if(!isFocused){
    clearTimeout(autoTimer);
    autoTimer=setTimeout(()=>{ autoRotate=true; },9000);
  }
});

window.addEventListener('pointermove', e => {
  mouse.set((e.clientX/innerWidth)*2-1, -(e.clientY/innerHeight)*2+1);
  posTooltip(e.clientX,e.clientY);
  if(!drag||isFocused) return;
  const dx=e.clientX-lastMouse.x, dy=e.clientY-lastMouse.y;
  lastMouse={x:e.clientX,y:e.clientY};
  autoRotate=false; clearTimeout(autoTimer);
  camTarget.theta -= dx*0.006;
  camTarget.phi    = Math.max(0.01,Math.min(Math.PI*0.48, camTarget.phi+dy*0.005));
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  camTarget.radius=Math.max(5,Math.min(150,camTarget.radius+e.deltaY*0.06));
  if(!isFocused){ autoRotate=false; clearTimeout(autoTimer); autoTimer=setTimeout(()=>{ autoRotate=true; },5000); }
},{passive:false});

let lastPinch=null;
canvas.addEventListener('touchstart',e=>{ if(e.touches.length===2){ const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY; lastPinch=Math.sqrt(dx*dx+dy*dy); } },{passive:true});
canvas.addEventListener('touchmove',e=>{ if(e.touches.length===2&&lastPinch){ const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY,d=Math.sqrt(dx*dx+dy*dy); camTarget.radius=Math.max(5,Math.min(150,camTarget.radius*(lastPinch/d))); lastPinch=d; } },{passive:true});

document.querySelectorAll('.hud-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const v=btn.dataset.view;
    if(!VIEWS[v]) return;
    if(isFocused) exitFocus();
    camTarget={...VIEWS[v]};
    document.querySelectorAll('.hud-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    autoRotate=false; clearTimeout(autoTimer);
    autoTimer=setTimeout(()=>{ autoRotate=true; },9000);
  });
});

// ══════════════════════════════════════════════════════════
// RENDER LOOP
// ══════════════════════════════════════════════════════════
const LERP=0.065, PIVOT_LERP=0.055;
let lt=0;

function tick(t){
  requestAnimationFrame(tick);
  const dt=Math.min((t-lt)/1000,0.05); lt=t;

  if(isFocused){
    focusOrbit += dt * 0.30;
    camTarget.theta = focusOrbit;
  } else if(autoRotate){
    camTarget.theta += dt*0.032;
  }

  camState.phi    +=(camTarget.phi    -camState.phi)   *LERP;
  camState.theta  +=(camTarget.theta  -camState.theta) *LERP;
  camState.radius +=(camTarget.radius -camState.radius)*LERP;

  // Lerp scene pivot toward target
  scenePivot.lerp(scenePivotTgt, PIVOT_LERP);

  applyCam();
  checkHover();
  renderer.render(scene,cam);
}
requestAnimationFrame(tick);

window.addEventListener('resize',()=>{
  cam.aspect=innerWidth/innerHeight;
  cam.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
});
</script>
</body>
</html>
